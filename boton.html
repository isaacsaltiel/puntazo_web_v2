<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<base href="/" />
<title>Botón · Puntazo</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />
<link rel="manifest" href="/assets/icons/manifest.json" />
<meta name="theme-color" content="#050914" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />

<!-- R4 + R6: Firebase compat SDK + helpers Puntazo (BreakPoint → Firestore directo) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- F144: auth en boton.html. Sin esto, PuntazoAuth no existía y los pulsos
     del botón salían con uid_creator=null (anónimos) → nunca aparecían como
     "pendientes" del usuario ni en "Mis clips". auth.js se auto-inicializa
     (initAuth() al final del módulo) y restaura la sesión; pulses.js lee
     currentUser al enviar, así que el pulso queda ligado a tu cuenta. -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="/assets/firebase-core.js"></script>
<script src="/assets/auth.js"></script>
<script src="/assets/clubs-catalog.js"></script>
<script src="/assets/pulses.js"></script>
<!-- F129: heartbeat-watcher para banner "cámaras fuera de línea". -->
<script src="/assets/heartbeat-watcher.js"></script>

<style>
:root{
  --bg:#050914; --text:#eaf2ff; --muted:rgba(234,242,255,.55);
  --blue:#004FC8; --blue2:#0B7CFF; --green:#22c55e;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%; overflow:hidden;
  font-family:'Montserrat', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ── Fondo ── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(900px 600px at 18% 8%, rgba(0,79,200,.32), transparent 55%),
    radial-gradient(1000px 700px at 85% 12%, rgba(11,124,255,.18), transparent 55%),
    radial-gradient(800px 700px at 45% 95%, rgba(34,197,94,.06), transparent 55%),
    linear-gradient(180deg, #050914, #060b1a 55%, #050914);
}
/* F111-C: fondo con icono de la cancha (B1..B8) según el número.
   Se inyecta vía JS una vez resolvemos canNum del query param.
   Overlay oscuro arriba para mantener legibilidad del botón central. */
.bg-court {
  position:fixed; inset:0; z-index:0;
  background-position:center; background-size:cover; background-repeat:no-repeat;
  opacity:0; transition:opacity .6s ease;
  animation:botonBgBreathe 18s ease-in-out infinite;
  pointer-events:none;
}
.bg-court.ready { opacity:1; }
.bg-court::after {
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg,
    rgba(2,6,16,0.78) 0%,
    rgba(2,6,16,0.55) 40%,
    rgba(2,6,16,0.85) 100%);
}
@keyframes botonBgBreathe {
  0%, 100% { transform:scale(1.00); }
  50%      { transform:scale(1.04); }
}
.bg-grid {
  position:fixed; inset:-40px; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:44px 44px;
  transform:rotate(12deg) scale(1.2);
  pointer-events:none;
  mask-image:radial-gradient(circle at 50% 40%, black 0%, rgba(0,0,0,.8) 35%, transparent 68%);
}

/* ── App layout (1 vista única) ── */
.app {
  position:fixed; inset:0; z-index:2;
  padding:calc(14px + var(--safe-top)) 16px calc(14px + var(--safe-bottom));
  display:flex; flex-direction:column;
  justify-content:space-between; align-items:stretch;
  gap:10px;
}

/* ── HUD top: logo + contexto ── */
.hud { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.hud-logo {
  display:flex; align-items:center; gap:10px;
  text-decoration:none; color:inherit;
}
.hud-logo img {
  height:30px; width:auto;
  filter:drop-shadow(0 0 12px rgba(0,79,200,.30));
}
.hud-context {
  display:flex; flex-direction:column; gap:1px;
  min-width:0;
}
.hud-where {
  font-size:.86rem; color:#fff; font-weight:800;
  letter-spacing:-.2px; line-height:1.2;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.hud-where .sep { color:rgba(234,242,255,.40); font-weight:500; margin:0 6px; }
.hud-where .court { color:rgba(234,242,255,.78); font-weight:600; }
.hud-edit {
  font-size:.78rem; padding:9px 14px; border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.18); color:var(--text);
  cursor:pointer; font-family:inherit; font-weight:700;
  white-space:nowrap; text-decoration:none;
  transition:all .18s ease;
}
.hud-edit:hover { background:rgba(0,79,200,.16); border-color:rgba(11,124,255,.45); }

/* ── Botón central ── */
.btn-center {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding:8px 0;
  width:100%;
}
.btn-wrap {
  position:relative;
  width:min(74vw, 360px);
  aspect-ratio:1/1;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto;
}

/* Cooldown ring (SVG, alrededor del botón cuando esperando) */
.btn-cooldown-ring {
  position:absolute; inset:-16px; border-radius:999px;
  pointer-events:none; opacity:0;
  transition:opacity .3s;
}
.btn-cooldown-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
.btn-cooldown-ring circle {
  fill:none; stroke:rgba(34,197,94,.55); stroke-width:4;
  stroke-dasharray:var(--circumference); stroke-dashoffset:0;
  stroke-linecap:round;
  transition:stroke-dashoffset .1s linear, stroke .3s;
}
.btn-cooldown-ring.active { opacity:1; }

/* Botón principal (solo la imagen P, sin halos extra asimétricos) */
.big-btn {
  position:relative;
  width:100%; height:100%;
  border-radius:999px; border:none;
  background:transparent;
  color:#fff; cursor:pointer; user-select:none;
  transition:transform .14s ease, filter .14s ease;
  font-family:inherit;
  padding:0;
}
.big-btn.pressed { transform:scale(.93); filter:brightness(.88); }
.big-btn.success { filter:drop-shadow(0 0 36px rgba(34,197,94,.62)); }
.big-btn.disabled-cooldown { cursor:not-allowed; filter:grayscale(.45) brightness(.78); }

.btn-puntazo-img {
  width:100%; height:100%;
  object-fit:contain; display:block;
  /* F75: glow centrado (sin offset Y) para que no se vea círculo
     asimétrico atrás del P. */
  filter: drop-shadow(0 0 28px rgba(11,124,255,.45));
  pointer-events:none;
}

/* Ripple cuando se presiona */
.btn-ripple {
  position:absolute; inset:0; border-radius:999px;
  overflow:hidden; pointer-events:none;
}
.btn-ripple span {
  position:absolute; width:16px; height:16px;
  border-radius:999px; background:rgba(255,255,255,.30);
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut 600ms ease-out;
}
@keyframes rippleOut { to { transform:translate(-50%,-50%) scale(22); opacity:0; } }

/* Countdown (cooldown) flotando en la parte baja interna del botón */
.btn-countdown {
  position:absolute; left:0; right:0; bottom:8%;
  text-align:center;
  font-size:clamp(13px, 3.2vw, 17px);
  font-weight:900; color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.75), 0 0 14px rgba(11,124,255,.55);
  letter-spacing:.5px;
  pointer-events:none;
  display:none;
}

/* Flash de éxito */
.flash {
  position:fixed; inset:0; z-index:50;
  background:radial-gradient(circle at 50% 45%, rgba(34,197,94,.55), rgba(34,197,94,0) 70%);
  opacity:0; pointer-events:none;
  transition:opacity .35s;
}
.flash.on { opacity:1; }

/* Confetti */
.confetti {
  position:fixed; inset:0; z-index:51;
  pointer-events:none; overflow:hidden;
}
.confetti i {
  position:absolute; width:9px; height:15px;
  border-radius:3px; opacity:.95;
  animation:cfFly 1.35s cubic-bezier(.18,.9,.2,1) forwards;
  transform:translate(-50%,-50%);
}
@keyframes cfFly {
  0%   { transform:translate(-50%,-50%) rotate(0deg); opacity:1; }
  75%  { opacity:1; }
  100% { transform:translate(-50%,-50%) translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity:0; }
}

/* ── Bottom: feedback + acceso a clips ── */
.btn-bottom {
  display:flex; flex-direction:column;
  gap:10px; align-items:center;
}

/* F75: bloquecitos con los puntazos de la sesión actual.
   Lista horizontal scrolleable, chips chicos aesthetic, máx 10 visibles. */
.puntazos-log {
  width:100%;
  max-width:560px;
  display:flex; flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  min-height:28px;
}
.puntazo-chip {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 11px;
  border-radius:999px;
  background:rgba(11,124,255,.14);
  border:1px solid rgba(11,124,255,.32);
  color:rgba(234,242,255,.92);
  font-size:.72rem; font-weight:700;
  letter-spacing:.2px;
  white-space:nowrap;
  animation:chipIn .35s cubic-bezier(.2,.8,.2,1);
}
.puntazo-chip .chip-ord { color:#fff; font-weight:900; }
.puntazo-chip .chip-time { color:rgba(234,242,255,.72); font-weight:600; font-variant-numeric:tabular-nums; }
@keyframes chipIn {
  from { opacity:0; transform:scale(.7) translateY(6px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.confirm-text {
  min-height:20px;
  font-size:.92rem; font-weight:700;
  text-align:center; color:var(--muted);
  transition:color .18s;
}
.confirm-text.ok  { color:rgba(34,197,94,.95); }
.confirm-text.bad { color:#ef4444; }

.btn-see-videos {
  width:min(460px, 100%);
  padding:13px 18px;
  border-radius:14px;
  border:1px solid rgba(11,124,255,.40);
  background:linear-gradient(180deg, rgba(11,124,255,.18), rgba(0,0,0,.10));
  color:var(--text); font-family:inherit;
  font-size:.95rem; font-weight:900;
  cursor:pointer; text-decoration:none;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 14px 40px rgba(0,79,200,.12);
  transition:transform .08s, background .18s, border-color .18s;
}
.btn-see-videos:hover {
  background:linear-gradient(180deg, rgba(11,124,255,.28), rgba(0,0,0,.12));
  border-color:rgba(11,124,255,.55);
}
.btn-see-videos:active { transform:scale(.98); }

/* ── Loader simple mientras resolvemos contexto/redirect ── */
.boot-loader {
  position:fixed; inset:0; z-index:5;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  font-size:.9rem; color:var(--muted);
}
.boot-loader.is-hidden { display:none; }
</style>
</head>
<body>

<div class="bg"></div>
<div id="bgCourt" class="bg-court"></div>
<div class="bg-grid"></div>
<div id="flash" class="flash"></div>
<div id="confetti" class="confetti"></div>

<div id="bootLoader" class="boot-loader">Cargando…</div>

<div class="app" id="appRoot" style="visibility:hidden">

  <!-- HUD top -->
  <div class="hud">
    <a class="hud-logo" href="/entrada.html">
      <img src="/assets/logo.png" alt="Puntazo" onerror="this.style.display='none'" />
      <div class="hud-context">
        <div id="hudWhere" class="hud-where">—</div>
      </div>
    </a>
    <!-- F127: copy más explícito (era "Cambiar"). El user en boton.html
         ya seleccionó club + cancha; este botón sirve para volver al
         selector si está en la cancha equivocada o quiere otra. -->
    <a class="hud-edit" id="btnEdit" href="/entrada.html?modo=boton">← Cambiar cancha</a>
  </div>

  <!-- F129: banner pasivo "cámaras del club fuera de línea" si nuc_heartbeat
       lleva >5 min sin actualizar. Solo aparece cuando aplica. -->
  <div id="pz-hb-host" style="padding: 0 16px;"></div>

  <!-- Botón grande -->
  <div class="btn-center">
    <div class="btn-wrap">

      <!-- Cooldown progress ring (solo aparece durante el wait) -->
      <div class="btn-cooldown-ring" id="cooldownRing">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="96" />
        </svg>
      </div>

      <button id="bigBtn" class="big-btn" aria-label="Registrar Puntazo">
        <img class="btn-puntazo-img" src="/assets/img/puntazo_boton_redondo.png" alt="Puntazo" />
        <div id="btnCountdown" class="btn-countdown"></div>
      </button>

      <div class="btn-ripple" id="ripple"></div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="btn-bottom">
    <div id="confirmText" class="confirm-text">Toca el botón para registrar tu Puntazo</div>
    <div id="puntazosLog" class="puntazos-log"></div>
    <a id="btnSeeVideos" class="btn-see-videos" href="#">▶ Ver mis puntazos en esta cancha</a>
  </div>

</div>

<script>
(function () {
  'use strict';

  const COOLDOWN_MS = 9000;

  // ── DOM ──
  const $loader        = document.getElementById('bootLoader');
  const $app           = document.getElementById('appRoot');
  const $hudWhere      = document.getElementById('hudWhere');
  const $btnEdit       = document.getElementById('btnEdit');
  const $bigBtn        = document.getElementById('bigBtn');
  const $btnCountdown  = document.getElementById('btnCountdown');
  const $confirm       = document.getElementById('confirmText');
  const $flash         = document.getElementById('flash');
  const $confetti      = document.getElementById('confetti');
  const $ripple        = document.getElementById('ripple');
  const $cooldownRing  = document.getElementById('cooldownRing');
  const $btnSeeVideos  = document.getElementById('btnSeeVideos');
  const $puntazosLog   = document.getElementById('puntazosLog');

  // ── Context (siempre via query params; si faltan, redirect al selector) ──
  function getQueryParam(name) {
    try { return new URLSearchParams(window.location.search).get(name); }
    catch (_) { return null; }
  }
  const LOC = (getQueryParam('loc') || '').trim();
  const CAN = (getQueryParam('can') || '').trim();

  if (!LOC || !CAN) {
    // Sin contexto → al selector que SÍ sabe pre-llenar.
    window.location.replace('/entrada.html?modo=boton');
    return;
  }

  // F111-C: número de cancha (1..N) → icono B{n}.png como fondo. Mapeo 1..8
  // con módulo para canchas >8 (mismo criterio que entrada.html).
  const _canMatch = CAN.match(/(\d+)/);
  const _canNum = _canMatch ? parseInt(_canMatch[1], 10) : 1;
  const _iconNum = (((_canNum - 1) % 8) + 8) % 8 + 1; // [1..8] safe
  (function applyCourtBg() {
    try {
      const el = document.getElementById('bgCourt');
      if (!el) return;
      // Íconos por club: intenta /assets/court-icons/{LOC}/B{n}.png (ej. canchas
      // de pickleball con arte propio); si no existe, cae al global B{n}.png.
      // F122: WebP (94% más liviano que PNG).
      const globalUrl = '/assets/court-icons/B' + _iconNum + '.webp';
      const clubUrl = '/assets/court-icons/' + encodeURIComponent(LOC) + '/B' + _iconNum + '.webp';
      function setBg(url) {
        el.style.backgroundImage = "url('" + url + "')";
        el.classList.add('ready');
      }
      const club = new Image();
      club.onload = function () { setBg(clubUrl); };
      club.onerror = function () {
        const g = new Image();
        g.onload = function () { setBg(globalUrl); };
        g.src = globalUrl;
      };
      club.src = clubUrl;
    } catch (_) {}
  })();

  // ── Estado ──
  let busy = false;
  let cooldownTimer = null;
  let cooldownStart = 0;

  // Precompute SVG circle circumference
  const R = 96;
  const CIRC = 2 * Math.PI * R;
  document.documentElement.style.setProperty('--circumference', CIRC);
  const $circle = $cooldownRing.querySelector('circle');
  $circle.style.strokeDasharray = CIRC;
  $circle.style.strokeDashoffset = CIRC;

  // ── Helpers ──
  function setConfirm(msg, cls) {
    $confirm.className = 'confirm-text ' + (cls || '');
    $confirm.textContent = msg || '';
  }

  function setState(state) {
    $bigBtn.classList.remove('pressed', 'success', 'disabled-cooldown');
    $btnCountdown.style.display = 'none';

    if (state === 'idle') {
      setConfirm('Toca el botón para registrar tu Puntazo', '');
    } else if (state === 'loading') {
      setConfirm('Guardando…', '');
    } else if (state === 'success') {
      $bigBtn.classList.add('success');
      setConfirm('¡Puntazo guardado!', 'ok');
    } else if (state === 'error') {
      setConfirm('No se pudo guardar. Intenta otra vez.', 'bad');
    } else if (state === 'cooldown') {
      $bigBtn.classList.add('disabled-cooldown');
      $btnCountdown.style.display = 'block';
    }
  }

  // ── Cooldown ring ──
  function startCooldown() {
    $cooldownRing.classList.add('active');
    cooldownStart = Date.now();
    setState('cooldown');
    $bigBtn.disabled = true;

    const tick = () => {
      const elapsed = Date.now() - cooldownStart;
      const pct = Math.min(elapsed / COOLDOWN_MS, 1);
      $circle.style.strokeDashoffset = CIRC * (1 - pct);

      const remaining = Math.max(0, Math.ceil((COOLDOWN_MS - elapsed) / 1000));
      $btnCountdown.textContent = remaining > 0 ? remaining + 's' : '';

      if (elapsed < COOLDOWN_MS) {
        cooldownTimer = requestAnimationFrame(tick);
      } else {
        endCooldown();
      }
    };
    cooldownTimer = requestAnimationFrame(tick);
  }

  function endCooldown() {
    $cooldownRing.classList.remove('active');
    $circle.style.strokeDashoffset = CIRC;
    $bigBtn.disabled = false;
    busy = false;
    setState('idle');
  }

  // ── Press feel ──
  $bigBtn.addEventListener('pointerdown', () => { if (!busy) $bigBtn.classList.add('pressed'); });
  const unpress = () => { setTimeout(() => $bigBtn.classList.remove('pressed'), 90); };
  $bigBtn.addEventListener('pointerup', unpress);
  $bigBtn.addEventListener('pointercancel', unpress);

  // ── Ripple ──
  function rippleAt(evt) {
    const rect = $bigBtn.getBoundingClientRect();
    const x = (evt && evt.clientX != null ? evt.clientX : (rect.left + rect.width / 2)) - rect.left;
    const y = (evt && evt.clientY != null ? evt.clientY : (rect.top + rect.height / 2)) - rect.top;
    const s = document.createElement('span');
    s.style.left = x + 'px'; s.style.top = y + 'px';
    $ripple.appendChild(s);
    setTimeout(() => s.remove(), 650);
  }

  // ── Sonido ── (Acorde de éxito C maj)
  function playSuccess() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99];
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, ctx.currentTime + i * 0.07);
        g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + i * 0.07 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.45);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + i * 0.07);
        o.stop(ctx.currentTime + i * 0.07 + 0.5);
      });
      setTimeout(() => ctx.close(), 800);
    } catch (_) {}
  }
  function playError() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = 200;
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.3);
      setTimeout(() => ctx.close(), 500);
    } catch (_) {}
  }
  function vibe(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern || 40); } catch (_) {} }

  // ── Flash + confetti ──
  function showFlash() {
    $flash.classList.add('on');
    setTimeout(() => $flash.classList.remove('on'), 420);
  }
  function confettiBurst() {
    $confetti.innerHTML = '';
    const rect = $bigBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const colors = ['rgba(255,255,255,.95)', 'rgba(0,79,200,.95)', 'rgba(11,124,255,.95)', 'rgba(34,197,94,.95)', 'rgba(255,190,0,.95)'];
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('i');
      const ang = Math.random() * Math.PI * 2, dist = 240 + Math.random() * 340;
      el.style.left = cx + 'px'; el.style.top = cy + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.setProperty('--dx', (Math.cos(ang) * dist).toFixed(1) + 'px');
      el.style.setProperty('--dy', (Math.sin(ang) * dist).toFixed(1) + 'px');
      el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      el.style.animationDelay = (Math.random() * 100) + 'ms';
      $confetti.appendChild(el);
    }
    setTimeout(() => { $confetti.innerHTML = ''; }, 1600);
  }

  // ── Puntazos log (chips de sesión, persistido en localStorage 6h) ──
  const LOG_KEY = 'pz_btn_log_' + LOC + '_' + CAN;
  const LOG_TTL_MS = 6 * 60 * 60 * 1000; // 6h
  const LOG_MAX = 30;

  function ordinal(n) {
    const map = {1:'1er',2:'2do',3:'3er',4:'4to',5:'5to',6:'6to',7:'7mo',8:'8vo',9:'9no',10:'10mo'};
    return map[n] || (n + 'o');
  }
  function pad2(n) { return String(n).padStart(2, '0'); }
  function fmtHM(ts) {
    const d = new Date(ts);
    return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }
  function loadLog() {
    try {
      const raw = localStorage.getItem(LOG_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return [];
      const cutoff = Date.now() - LOG_TTL_MS;
      const filtered = arr.filter(t => typeof t === 'number' && t >= cutoff);
      if (filtered.length !== arr.length) saveLog(filtered);
      return filtered;
    } catch (_) { return []; }
  }
  function saveLog(arr) {
    try { localStorage.setItem(LOG_KEY, JSON.stringify(arr.slice(-LOG_MAX))); } catch (_) {}
  }
  function pushLog(ts) {
    const arr = loadLog();
    arr.push(ts);
    saveLog(arr);
    renderLog();
  }
  function renderLog() {
    if (!$puntazosLog) return;
    const arr = loadLog();
    if (!arr.length) { $puntazosLog.innerHTML = ''; return; }
    $puntazosLog.innerHTML = arr.map((ts, i) =>
      '<span class="puntazo-chip">' +
        '<span class="chip-ord">' + ordinal(i + 1) + ' Puntazo</span>' +
        '<span class="chip-time">' + fmtHM(ts) + '</span>' +
      '</span>'
    ).join('');
  }

  // ── Click principal ──
  $bigBtn.addEventListener('click', async function (evt) {
    if (busy) return;
    busy = true;

    rippleAt(evt);
    vibe(50);

    $bigBtn.classList.add('pressed');
    setTimeout(() => $bigBtn.classList.remove('pressed'), 120);

    setState('loading');
    $bigBtn.disabled = true;

    try {
      if (!window.PuntazoPulses || typeof PuntazoPulses.requestPulse !== 'function') {
        throw new Error('PuntazoPulses no disponible');
      }
      await PuntazoPulses.requestPulse({
        loc: LOC,
        can: CAN,
        source: 'web_boton',
      });

      showFlash();
      confettiBurst();
      playSuccess();
      vibe([40, 60, 40]);
      setState('success');
      pushLog(Date.now());
      setTimeout(startCooldown, 800);
    } catch (err) {
      console.error('[boton]', err);
      playError();
      vibe([80, 40, 80]);
      setState('error');
      $bigBtn.disabled = false;
      busy = false;
      setTimeout(() => setState('idle'), 2500);
    }
  });

  // ── Ver mis clips de esta cancha ──
  $btnSeeVideos.addEventListener('click', function (e) {
    e.preventDefault();
    // lado.html espera ?loc=&can=&lado=&pg=. Asumimos LadoA (boton.html no
    // tiene contexto de lado; recovery/botón siempre asocian a LadoA o la
    // NUC decide en pipeline).
    const canFull = /^Cancha/i.test(CAN) ? CAN : 'Cancha' + CAN.replace(/^\D+/, '');
    const qs = '?loc=' + encodeURIComponent(LOC)
             + '&can=' + encodeURIComponent(canFull)
             + '&lado=LadoA&pg=0';
    window.location.href = '/lado.html' + qs;
  });

  // ── Resolver display names (club nombre + cancha N) via catálogo ──
  async function resolveHud() {
    let clubName = LOC;
    let canchaName = /^Cancha/i.test(CAN) ? CAN : ('Cancha ' + CAN.replace(/^\D+/, ''));
    try {
      if (window.PuntazoClubs && typeof PuntazoClubs.getCatalog === 'function') {
        const cat = await PuntazoClubs.getCatalog();
        const club = (cat.clubs || []).find(x => x.id === LOC);
        if (club) {
          clubName = club.nombre || LOC;
          const cancha = (club.canchas || []).find(x => x.id === CAN);
          if (cancha) canchaName = cancha.nombre || canchaName;
        }
      }
    } catch (e) {
      console.warn('[boton] no se pudo resolver display names:', e);
    }
    $hudWhere.innerHTML =
      '<span class="club">' + escapeHtml(clubName) + '</span>' +
      '<span class="sep">·</span>' +
      '<span class="court">' + escapeHtml(canchaName) + '</span>';
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ── Boot ──
  // F129: banner pasivo "cámaras fuera de línea" leyendo nuc_heartbeat/{LOC}.
  try {
    var _hbHost = document.getElementById("pz-hb-host");
    if (_hbHost && window.PuntazoHeartbeatWatcher) {
      window.PuntazoHeartbeatWatcher.watch(LOC, _hbHost);
    }
  } catch (_) {}

  (async function boot() {
    await resolveHud();
    renderLog();
    setState('idle');
    $loader.classList.add('is-hidden');
    $app.style.visibility = 'visible';
  })();
})();
</script>
</body>
</html>
