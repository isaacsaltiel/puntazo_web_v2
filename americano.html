<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<base href="/" />
<title>Americano · Puntazo</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#050914; --text:#eaf2ff; --muted:rgba(234,242,255,.55);
    --line:rgba(255,255,255,.10);
    --t1:#0b7cff; --t1d:#004FC8;
    --t2:#c8e835; --t2d:#9ec628;
    --gold:#ffd75a; --undo:#f06845;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;background:var(--bg);color:var(--text);
    font-family:'Montserrat',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .wrap{max-width:560px;margin:0 auto;padding:20px 14px 80px;}
  .back{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
    background:rgba(11,124,255,.10);border:1px solid rgba(11,124,255,.30);
    border-radius:999px;color:#6fb2ff;text-decoration:none;
    font-size:.78rem;font-weight:700;margin-bottom:14px;cursor:pointer;
    border:1px solid rgba(11,124,255,.30);}
  h1{font-size:1.45rem;font-weight:900;margin:0 0 4px;color:#fff;letter-spacing:-.3px;}
  .sub{font-size:.86rem;color:var(--muted);margin-bottom:18px;line-height:1.45;}
  .hero{margin-bottom:18px;}
  .hero .tag{
    display:inline-block;padding:4px 10px;font-size:.66rem;font-weight:900;
    letter-spacing:.6px;text-transform:uppercase;
    background:rgba(11,124,255,.14);border:1px solid rgba(11,124,255,.35);
    color:#9fc7ff;border-radius:999px;margin-bottom:8px;
  }

  .card{
    background:rgba(255,255,255,.03);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:14px;
  }
  .card h2{font-size:1rem;font-weight:900;color:#fff;margin:0 0 10px;}
  .card .help{font-size:.8rem;color:var(--muted);margin-top:8px;line-height:1.4;}

  .player-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .player-row{display:flex;gap:8px;align-items:center;}
  .player-row .num{
    width:28px;height:28px;flex:0 0 28px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:.74rem;font-weight:900;color:#fff;
    background:rgba(11,124,255,.20);border:1px solid rgba(11,124,255,.45);
  }
  .player-row input{
    flex:1;min-width:0;padding:10px 12px;border-radius:10px;
    border:1px solid var(--line);background:rgba(0,0,0,.20);
    color:#fff;font-family:inherit;font-size:.92rem;font-weight:700;
  }
  .player-row input:focus{outline:none;border-color:rgba(11,124,255,.55);}

  .config-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px;}
  .config-grid label{font-size:.78rem;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
  .config-grid select{
    width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);
    background:rgba(0,0,0,.20);color:#fff;font-family:inherit;
    font-size:.9rem;font-weight:700;
  }

  .btn-primary{
    width:100%;padding:14px;border-radius:12px;border:none;
    background:linear-gradient(180deg,var(--t1),var(--t1d));
    color:#fff;font-family:inherit;font-weight:900;font-size:1rem;
    letter-spacing:.3px;cursor:pointer;
    box-shadow:0 12px 32px rgba(0,79,200,.30);
    transition:transform .1s;
  }
  .btn-primary:active{transform:scale(.97);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}

  /* Round view */
  .round-tabs{
    display:flex;gap:6px;margin-bottom:14px;
  }
  .round-tab{
    flex:1;padding:8px;border-radius:8px;text-align:center;
    background:rgba(255,255,255,.03);border:1px solid var(--line);
    font-size:.76rem;font-weight:800;color:var(--muted);
    cursor:pointer;transition:all .15s;
  }
  .round-tab.active{
    background:rgba(11,124,255,.18);border-color:rgba(11,124,255,.55);
    color:#fff;
  }
  .round-tab.done::before{content:"✓ ";color:#22c55e;}
  .round-tab[disabled]{cursor:not-allowed;opacity:.5;}

  .matchup{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;
    border:1px solid var(--line);border-radius:14px;overflow:hidden;
  }
  .team{
    padding:14px 10px;display:flex;flex-direction:column;gap:8px;
    align-items:center;text-align:center;
  }
  .team[data-side="A"]{background:linear-gradient(180deg,rgba(11,124,255,.10),transparent);}
  .team[data-side="B"]{background:linear-gradient(180deg,rgba(200,232,53,.10),transparent);}
  .team .label{
    font-size:.7rem;font-weight:900;color:var(--muted);
    letter-spacing:.5px;text-transform:uppercase;
  }
  .team .players{display:flex;flex-direction:column;gap:4px;width:100%;}
  .team .player{
    padding:8px 6px;border-radius:8px;font-size:.92rem;font-weight:800;
    color:#fff;background:rgba(0,0,0,.20);
  }
  .team[data-side="A"] .player{background:rgba(11,124,255,.18);}
  .team[data-side="B"] .player{background:rgba(200,232,53,.18);color:#1a2210;}
  .team .stepper{
    display:flex;align-items:center;gap:6px;
  }
  .team .stepper button{
    width:34px;height:34px;border-radius:8px;border:none;
    background:rgba(255,255,255,.10);color:#fff;
    font-family:inherit;font-weight:900;font-size:1.1rem;cursor:pointer;
  }
  .team .stepper button:active{transform:scale(.92);}
  .team .stepper input{
    width:60px;text-align:center;padding:8px 4px;border-radius:8px;
    background:rgba(0,0,0,.30);border:1px solid var(--line);
    color:#fff;font-family:inherit;font-weight:900;font-size:1.3rem;
    font-variant-numeric:tabular-nums;
  }

  .vs{
    text-align:center;font-size:.86rem;font-weight:900;color:var(--muted);
    margin:-4px 0 10px;letter-spacing:.5px;text-transform:uppercase;
  }
  .target-info{
    text-align:center;font-size:.84rem;color:var(--muted);
    margin-bottom:14px;font-weight:600;
  }
  .target-info strong{color:#fff;font-weight:900;}

  .actbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .actbar button{
    flex:1;min-width:140px;padding:11px;border-radius:10px;
    background:rgba(255,255,255,.04);border:1px solid var(--line);
    color:var(--text);font-family:inherit;font-weight:700;font-size:.84rem;
    cursor:pointer;
  }
  .actbar button.primary{
    background:linear-gradient(180deg,var(--t1),var(--t1d));
    border:none;color:#fff;font-weight:900;
  }
  .actbar button.danger{
    background:rgba(240,104,69,.10);border-color:rgba(240,104,69,.45);
    color:#ffb09a;
  }
  .actbar button:disabled{opacity:.45;cursor:not-allowed;}

  /* Leaderboard */
  .lb{
    border:1px solid var(--line);border-radius:14px;overflow:hidden;
    background:rgba(255,255,255,.02);margin-bottom:14px;
  }
  .lb .row{
    display:grid;grid-template-columns:32px 1fr 80px;
    padding:11px 12px;border-bottom:1px solid var(--line);
    font-size:.88rem;align-items:center;
  }
  .lb .row.head{
    background:rgba(0,0,0,.18);font-size:.72rem;font-weight:900;
    color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  }
  .lb .row:last-child{border-bottom:none;}
  .lb .pos{font-weight:900;color:#fff;}
  .lb .nm{font-weight:800;color:#fff;}
  .lb .pts{text-align:right;font-weight:900;color:var(--gold);
    font-variant-numeric:tabular-nums;font-size:1rem;}
  .lb .row.first .nm{color:var(--gold);}
  .lb .row.first .pos::before{content:"👑 ";}
</style>
</head>
<body>

<div class="wrap" id="root"></div>

<script>
(function () {
  'use strict';

  const LS_KEY = "pz.americano.v1";
  let S = load() || defaultState();

  // Para N=4 jugadores: 3 rondas con todas las combinaciones de pares.
  // SCHEDULES[N] = array of rounds; each round = [[a1,a2],[b1,b2]]
  const SCHEDULES = {
    4: [
      [[0, 1], [2, 3]],
      [[0, 2], [1, 3]],
      [[0, 3], [1, 2]],
    ],
  };

  function defaultState() {
    return {
      view: "setup",                // setup | rounds | final
      players: ["", "", "", ""],    // names (4)
      target: 24,                   // points per mini
      rounds: [],                   // [{ scoreA, scoreB, finished:bool } x 3]
      currentRound: 0,
    };
  }

  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch (_) {} }
  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (_) { return null; }
  }
  function escHTML(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(k => {
      if (k === "class") e.className = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === "html") e.innerHTML = attrs[k];
      else if (attrs[k] != null) e.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(c => {
      if (c == null) return;
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }

  function startSession() {
    if (S.players.filter(n => n && n.trim()).length < 4) {
      alert("Necesitas 4 nombres."); return;
    }
    S.rounds = SCHEDULES[4].map(() => ({ scoreA: 0, scoreB: 0, finished: false }));
    S.currentRound = 0;
    S.view = "rounds";
    save(); render();
  }

  function finishRound() {
    const r = S.rounds[S.currentRound];
    if (r.scoreA + r.scoreB === 0) {
      alert("Mete un marcador antes de terminar la ronda."); return;
    }
    r.finished = true;
    // Avanza si hay más rondas
    const next = S.rounds.findIndex(rr => !rr.finished);
    if (next === -1) {
      S.view = "final";
    } else {
      S.currentRound = next;
    }
    save(); render();
  }

  function fullReset() {
    if (!confirm("¿Reiniciar todo? Se pierden nombres y rondas.")) return;
    S = defaultState();
    save(); render();
  }

  function computePoints() {
    const pts = S.players.map(() => 0);
    SCHEDULES[4].forEach((sched, i) => {
      const r = S.rounds[i];
      if (!r || !r.finished) return;
      const [teamA, teamB] = sched;
      pts[teamA[0]] += r.scoreA;
      pts[teamA[1]] += r.scoreA;
      pts[teamB[0]] += r.scoreB;
      pts[teamB[1]] += r.scoreB;
    });
    return pts;
  }

  // ── Render ──
  function render() {
    const root = document.getElementById("root");
    root.innerHTML = "";
    if (S.view === "setup") root.appendChild(viewSetup());
    else if (S.view === "rounds") root.appendChild(viewRounds());
    else if (S.view === "final") root.appendChild(viewFinal());
  }

  function viewSetup() {
    const r = el("div");
    r.appendChild(el("a", { class: "back", href: "/herramientas.html" }, ["← Volver"]));
    r.appendChild(el("div", { class: "hero" }, [
      el("span", { class: "tag" }, ["Modo de juego"]),
      el("h1", null, ["Americano (4 jugadores)"]),
      el("p", { class: "sub" }, [
        "3 rondas con todas las combinaciones de parejas. Cada quien suma los puntos de su equipo. Al final gana el del puntaje individual más alto."
      ]),
    ]));

    const card = el("div", { class: "card" });
    card.appendChild(el("h2", null, ["Jugadores"]));
    const rows = el("div", { class: "player-rows" });
    for (let i = 0; i < 4; i++) {
      const row = el("div", { class: "player-row" });
      row.appendChild(el("div", { class: "num" }, [String(i + 1)]));
      row.appendChild(el("input", {
        type: "text", maxlength: "20",
        placeholder: "Jugador " + (i + 1),
        value: S.players[i] || "",
        onInput: (e) => { S.players[i] = e.target.value.trim(); save(); updateStart(); },
      }));
      rows.appendChild(row);
    }
    card.appendChild(rows);

    const cfg = el("div", { class: "config-grid" });
    const tCol = el("div");
    tCol.appendChild(el("label", null, ["Puntos por ronda"]));
    const sel = el("select", {
      onChange: (e) => { S.target = parseInt(e.target.value, 10) || 24; save(); },
    });
    [16, 21, 24, 32].forEach(v => {
      const opt = el("option", { value: String(v) }, [v + " puntos"]);
      if (v === S.target) opt.setAttribute("selected", "");
      sel.appendChild(opt);
    });
    tCol.appendChild(sel);
    cfg.appendChild(tCol);
    card.appendChild(cfg);

    card.appendChild(el("div", { class: "help" }, [
      "Sugerido: 24 puntos (estándar mundial). En cada ronda, el equipo registra el marcador final (ej. 24-18). Cada jugador suma el puntaje de SU equipo a su total individual."
    ]));
    r.appendChild(card);

    const btn = el("button", {
      class: "btn-primary", id: "btnStart", type: "button",
      onClick: startSession,
    }, ["Empezar (3 rondas)"]);
    r.appendChild(btn);

    function updateStart() {
      const valid = S.players.filter(n => n && n.trim()).length;
      const b = document.getElementById("btnStart");
      if (b) b.disabled = valid < 4 ? "" : null;
    }
    setTimeout(updateStart, 0);

    return r;
  }

  function viewRounds() {
    const r = el("div");
    r.appendChild(el("a", { class: "back", href: "#", onClick: (e) => {
      e.preventDefault();
      if (confirm("¿Salir al setup? El progreso se mantiene en localStorage.")) {
        S.view = "setup"; save(); render();
      }
    } }, ["← Setup"]));

    r.appendChild(el("div", { class: "hero" }, [
      el("span", { class: "tag" }, ["Americano · Ronda " + (S.currentRound + 1) + " de 3"]),
      el("h1", null, ["En juego"]),
    ]));

    // Tabs de rondas
    const tabs = el("div", { class: "round-tabs" });
    S.rounds.forEach((rr, i) => {
      const cls = "round-tab" +
        (i === S.currentRound ? " active" : "") +
        (rr.finished ? " done" : "");
      tabs.appendChild(el("div", {
        class: cls,
        onClick: () => { S.currentRound = i; save(); render(); },
      }, ["Ronda " + (i + 1)]));
    });
    r.appendChild(tabs);

    const sched = SCHEDULES[4][S.currentRound];
    const [a, b] = sched;
    const round = S.rounds[S.currentRound];

    const m = el("div", { class: "matchup" });
    const teamA = el("div", { class: "team", "data-side": "A" });
    teamA.appendChild(el("span", { class: "label" }, ["Equipo A"]));
    teamA.appendChild(el("div", { class: "players" }, [
      el("div", { class: "player" }, [S.players[a[0]] || "Jugador " + (a[0] + 1)]),
      el("div", { class: "player" }, [S.players[a[1]] || "Jugador " + (a[1] + 1)]),
    ]));
    teamA.appendChild(makeStepper("A", round));
    const teamB = el("div", { class: "team", "data-side": "B" });
    teamB.appendChild(el("span", { class: "label" }, ["Equipo B"]));
    teamB.appendChild(el("div", { class: "players" }, [
      el("div", { class: "player" }, [S.players[b[0]] || "Jugador " + (b[0] + 1)]),
      el("div", { class: "player" }, [S.players[b[1]] || "Jugador " + (b[1] + 1)]),
    ]));
    teamB.appendChild(makeStepper("B", round));
    m.appendChild(teamA);
    m.appendChild(teamB);
    r.appendChild(m);

    r.appendChild(el("div", { class: "target-info" }, [
      "Sugerido: ",
      el("strong", null, [String(S.target) + " puntos"]),
      " (puedes registrar cualquier marcador)."
    ]));

    const bar = el("div", { class: "actbar" });
    bar.appendChild(el("button", {
      class: "primary", type: "button",
      onClick: finishRound,
      disabled: round.finished ? "" : null,
    }, [round.finished ? "✓ Ronda registrada" : "Terminar ronda"]));
    bar.appendChild(el("button", {
      type: "button",
      onClick: () => {
        if (confirm("¿Resetear marcador de esta ronda?")) {
          round.scoreA = 0; round.scoreB = 0; round.finished = false;
          save(); render();
        }
      },
    }, ["↺ Reset ronda"]));
    r.appendChild(bar);

    // Leaderboard parcial
    r.appendChild(el("h2", { class: "" , style:"font-size:.86rem;font-weight:900;color:rgba(234,242,255,.55);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;" }, ["Leaderboard parcial"]));
    r.appendChild(renderLeaderboard());

    const bottom = el("div", { class: "actbar" });
    bottom.appendChild(el("button", {
      class: "danger", type: "button", onClick: fullReset,
    }, ["↺ Reset completo"]));
    r.appendChild(bottom);

    return r;
  }

  function makeStepper(side, round) {
    const wrap = el("div", { class: "stepper" });
    const minus = el("button", { type: "button" }, ["−"]);
    const input = el("input", {
      type: "number", min: "0", max: "99",
      value: String(round[side === "A" ? "scoreA" : "scoreB"]),
    });
    const plus = el("button", { type: "button" }, ["+"]);
    function updateUI() {
      input.value = round[side === "A" ? "scoreA" : "scoreB"];
    }
    function setVal(v) {
      v = Math.max(0, Math.min(99, parseInt(v, 10) || 0));
      round[side === "A" ? "scoreA" : "scoreB"] = v;
      round.finished = false; // si edito, se vuelve a abrir
      save();
      updateUI();
      // re-render tab states + bar
      render();
    }
    minus.addEventListener("click", () => setVal(round[side === "A" ? "scoreA" : "scoreB"] - 1));
    plus.addEventListener("click", () => setVal(round[side === "A" ? "scoreA" : "scoreB"] + 1));
    input.addEventListener("input", (e) => {
      const raw = e.target.value.replace(/[^0-9]/g, "");
      round[side === "A" ? "scoreA" : "scoreB"] = Math.max(0, Math.min(99, parseInt(raw, 10) || 0));
      round.finished = false;
      save();
    });
    input.addEventListener("blur", () => { render(); });
    wrap.appendChild(minus);
    wrap.appendChild(input);
    wrap.appendChild(plus);
    return wrap;
  }

  function renderLeaderboard() {
    const pts = computePoints();
    const ranked = S.players.map((nm, i) => ({ idx: i, name: nm || "Jugador " + (i + 1), pts: pts[i] }))
      .sort((a, b) => b.pts - a.pts);
    const lb = el("div", { class: "lb" });
    lb.appendChild(el("div", { class: "row head" }, [
      el("div", { class: "pos" }, ["#"]),
      el("div", { class: "nm" }, ["Jugador"]),
      el("div", { class: "pts" }, ["Pts"]),
    ]));
    ranked.forEach((p, i) => {
      const cls = "row" + (i === 0 && p.pts > 0 ? " first" : "");
      lb.appendChild(el("div", { class: cls }, [
        el("div", { class: "pos" }, [String(i + 1)]),
        el("div", { class: "nm" }, [p.name]),
        el("div", { class: "pts" }, [String(p.pts)]),
      ]));
    });
    return lb;
  }

  function viewFinal() {
    const r = el("div");
    r.appendChild(el("div", { class: "hero" }, [
      el("span", { class: "tag" }, ["Americano terminado"]),
      el("h1", null, ["Resumen final"]),
      el("p", { class: "sub" }, [
        "Las 3 rondas se jugaron. Aquí el ranking final por puntos totales."
      ]),
    ]));
    r.appendChild(renderLeaderboard());

    // Detalle de rondas
    const det = el("div", { class: "card" });
    det.appendChild(el("h2", null, ["Detalle por ronda"]));
    S.rounds.forEach((rr, i) => {
      const sched = SCHEDULES[4][i];
      const [a, b] = sched;
      const txt = `R${i + 1}: ${S.players[a[0]] || "?"}+${S.players[a[1]] || "?"} ${rr.scoreA}–${rr.scoreB} ${S.players[b[0]] || "?"}+${S.players[b[1]] || "?"}`;
      det.appendChild(el("div", { style:"padding:6px 0;font-size:.84rem;color:rgba(234,242,255,.78);font-weight:600;" }, [txt]));
    });
    r.appendChild(det);

    const bar = el("div", { class: "actbar" });
    bar.appendChild(el("button", {
      type: "button",
      onClick: () => { S.view = "rounds"; S.currentRound = 0; save(); render(); },
    }, ["← Editar rondas"]));
    bar.appendChild(el("button", {
      class: "danger", type: "button", onClick: fullReset,
    }, ["Empezar nueva sesión"]));
    r.appendChild(bar);

    return r;
  }

  render();
})();
</script>
</body>
</html>
