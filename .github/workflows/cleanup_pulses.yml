name: Cleanup pending_pulses

on:
  schedule:
    - cron: "13 * * * *"        # cada hora, minuto 13 (evita choque con otros workflows en :00)
  workflow_dispatch: {}          # disparo manual desde Actions UI

concurrency:
  group: cleanup-pulses
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      CONSUMED_TTL_HOURS: "24"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin

      - name: Cleanup
        run: python cleanup_pulses_ci.py
