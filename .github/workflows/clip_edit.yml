name: Render ediciones de clip

on:
  schedule:
    - cron: "*/5 * * * *"          # poll de la cola cada ~5 min
  workflow_dispatch: {}            # disparo manual
  repository_dispatch:
    types: [clip_edit]             # disparo inmediato (futuro: vía Cloud Function)

concurrency:
  group: clip-edit
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      DROPBOX_APP_KEY:          ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET:       ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN:    ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      PAT_GITHUB:               ${{ secrets.PAT_GITHUB }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin dropbox requests

      - name: Procesar cola clip_edits
        run: python clip_edit_ci.py
