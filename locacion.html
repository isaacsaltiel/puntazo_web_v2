<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<base href="/" />
<title>Puntazo · Canchas</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />

<!-- F111-B: locacion.html legacy redirect → selector visual nuevo en
     entrada.html?modo=clips (mismo selector que usa entrada para iniciar
     partido, pero termina en lado.html). Preserva ?loc= si vino. -->
<script>
(function () {
  try {
    var p = new URLSearchParams(window.location.search);
    var qs = "?modo=clips";
    if (p.get("loc")) qs += "&loc=" + encodeURIComponent(p.get("loc"));
    if (p.get("can")) qs += "&can=" + encodeURIComponent(p.get("can"));
    window.location.replace("/entrada.html" + qs);
  } catch (e) {
    window.location.replace("/entrada.html?modo=clips");
  }
})();
</script>
<meta http-equiv="refresh" content="0; url=/entrada.html?modo=clips" />
</head>
<body style="background:#050914;color:#eaf2ff;font-family:system-ui;text-align:center;padding:60px 20px;">
  <p>Redirigiendo… si no carga, <a href="/entrada.html?modo=clips" style="color:#6fb2ff">toca aquí</a>.</p>
</body>
</html>
