<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/" />
<title>Jugador · Puntazo</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/estilo.css" />
<link rel="stylesheet" href="/assets/card.css" />
<link rel="stylesheet" href="/assets/reactions.css" />

<!-- Firebase PRIMERO, antes que cualquier otro script -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-core.js"></script>

<!-- card y reactions DESPUÉS de firebase -->
<script src="/assets/reactions.js"></script>
<script src="/assets/card.js"></script>

<style>
  .player-wrap { max-width:860px; margin:0 auto; padding:24px 16px 60px; }

  .diag-box {
    padding:14px 16px; border-radius:12px; margin-bottom:16px;
    border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.25);
    font-size:.78rem; font-family:monospace; color:rgba(234,242,255,.70);
    line-height:1.7; word-break:break-all;
  }
  .diag-box .ok  { color:#86efac; }
  .diag-box .err { color:#fca5a5; }
  .diag-box .warn{ color:#fde68a; }

  .player-header {
    display:flex; align-items:center; gap:18px; margin-bottom:28px;
    padding:20px; border-radius:18px;
    background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.10);
  }
  .player-avatar {
    width:72px; height:72px; border-radius:50%;
    background:rgba(0,79,200,.35); border:2px solid rgba(255,255,255,.14);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; font-weight:900; color:#fff; overflow:hidden;
  }
  .player-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .player-name { font-size:1.35rem; font-weight:900; color:#fff; margin-bottom:4px; }
  .player-sub  { color:rgba(234,242,255,.55); font-size:.84rem; }
  .section-title { font-size:1rem; font-weight:800; color:rgba(234,242,255,.75); margin-bottom:16px; }
  @media(max-width:480px) { .player-header{flex-direction:column;text-align:center;align-items:center;} }
</style>
</head>
<body>
<div class="page-bg"></div>
<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="site-content fade-in">
  <div class="player-wrap">

    <!-- Diagnóstico — siempre visible durante carga -->
    <div id="diagBox" class="diag-box" style="display:none">⏳ Iniciando…</div>

    <div id="playerHeader" class="player-header" style="display:none">
      <div id="playerAvatar" class="player-avatar"></div>
      <div>
        <div id="playerName" class="player-name">Jugador</div>
        <div id="playerSub"  class="player-sub">Perfil público · Puntazo</div>
      </div>
    </div>

    <div id="mainError" class="empty-state" style="display:none">
      <div class="empty-icon">⚠️</div>
      <h3 id="errTitle">Error</h3>
      <p id="errMsg"></p>
    </div>

    <div id="appearancesSection" style="display:none">
      <p class="section-title">🥷 Apariciones</p>
      <div id="appearancesGrid" class="cards-grid"></div>
    </div>

  </div>
</main>

<footer class="site-footer"><p class="footer-copy">© 2026 Puntazo</p></footer>

<script>
(async function () {
  'use strict';

  const $diag    = document.getElementById('diagBox');
  const $header  = document.getElementById('playerHeader');
  const $avatar  = document.getElementById('playerAvatar');
  const $name    = document.getElementById('playerName');
  const $sub     = document.getElementById('playerSub');
  const $errBox  = document.getElementById('mainError');
  const $errTitle= document.getElementById('errTitle');
  const $errMsg  = document.getElementById('errMsg');
  const $section = document.getElementById('appearancesSection');
  const $grid    = document.getElementById('appearancesGrid');

  function log(msg, type) {
    const span = document.createElement('span');
    span.className = type || '';
    span.textContent = msg;
    $diag.appendChild(document.createElement('br'));
    $diag.appendChild(span);
    console.log('[jugador]', msg);
  }

  function showError(title, msg) {
    $errTitle.textContent = title;
    $errMsg.textContent   = msg;
    $errBox.style.display = 'block';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 1. Leer UID ──────────────────────────────────────────────
  const uid = new URLSearchParams(location.search).get('uid') || '';
  log('UID: ' + (uid ? uid.slice(0,20)+'…' : '⚠️ VACÍO'), uid ? 'ok' : 'err');

  if (!uid) {
    showError('Sin UID', 'No se encontró el identificador del jugador en la URL (?uid=...).');
    return;
  }

  // ── 2. Esperar Firebase ──────────────────────────────────────
  log('Esperando Firebase…');
  let fbWait = 0;
  while (fbWait < 50) {
    if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) break;
    await new Promise(r => setTimeout(r, 200));
    fbWait++;
  }

  const fbOk = !!(window.firebase && window.firebase.apps && window.firebase.apps.length > 0);
  log('Firebase app: ' + (fbOk ? '✓' : '✗ NO inicializado'), fbOk ? 'ok' : 'err');

  if (!fbOk) {
    showError('Firebase no inicializado', 'Revisa que firebase-core.js cargue correctamente y que las credenciales sean válidas.');
    return;
  }

  // ── 3. Obtener db ────────────────────────────────────────────
  let db;
  try {
    if (window.PuntazoFirebase && typeof window.PuntazoFirebase.db === 'function') {
      db = window.PuntazoFirebase.db();
      log('db() via PuntazoFirebase: ✓', 'ok');
    } else {
      db = firebase.firestore();
      log('db() via firebase.firestore(): ✓', 'ok');
    }
  } catch(e) {
    log('Error obteniendo db: ' + e.message, 'err');
    showError('Error de Firestore', e.message);
    return;
  }

  // ── 4. Cargar videos_index.json ──────────────────────────────
  let videoIndex = {};
  try {
    const res = await fetch('/data/videos_index.json?cb='+Date.now(), { cache:'no-store' });
    if (res.ok) { const idx = await res.json(); videoIndex = idx.videos || {}; log('videos_index.json: ✓ (' + Object.keys(videoIndex).length + ' videos)', 'ok'); }
    else         { log('videos_index.json: HTTP ' + res.status, 'warn'); }
  } catch(e) { log('videos_index.json: no disponible (' + e.message + ')', 'warn'); }

  // ── 5. Query Firestore ───────────────────────────────────────
    log('Consultando participants uid==' + uid.slice(0,12));
  let snap;
  try {
    snap = await Promise.race([
      db.collectionGroup('participants').where('uid', '==', uid).orderBy('claimedAt', 'desc').limit(30).get(),
      new Promise(function(_, rej){ setTimeout(function(){ rej(new Error('TIMEOUT')); }, 8000); })
    ]);
    log('Query OK: ' + snap.size + ' docs', snap.size > 0 ? 'ok' : 'warn');
  } catch(e) {
    const msg = String(e.message || e);
    log('Error query: ' + msg, 'err');
    if (msg === 'TIMEOUT') {
      log('Timeout: participants vacio o red lenta.', 'warn');
      showError('Sin apariciones', 'Este jugador no ha reclamado ningun video con Soy yo todavia.');
    } else {
      showError('Error Firestore', msg);
    }
    return;
  }

  // ── 6. Sin resultados ────────────────────────────────────────
  if (snap.empty) {
    log('0 apariciones encontradas para este uid', 'warn');
    showError('Sin apariciones', 'Este jugador no ha reclamado ningún video con "🥷 Soy yo" todavía.');
    return;
  }

  // ── 7. Render header ─────────────────────────────────────────
  const docs = [];
  snap.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));
  docs.sort((a, b) => (b.data.claimedAt?.seconds||0) - (a.data.claimedAt?.seconds||0));

  const firstData  = docs[0].data;
  const playerName = firstData.displayName || 'Jugador';
  const playerPhoto= firstData.photoURL    || '';

  document.title = `${playerName} · Puntazo`;

  if (playerPhoto) {
    $avatar.innerHTML = `<img src="${esc(playerPhoto)}" alt="${esc(playerName)}" />`;
  } else {
    $avatar.textContent = playerName.charAt(0).toUpperCase();
  }
  $name.textContent = playerName;
  $sub.textContent  = `${docs.length} aparición${docs.length!==1?'es':''} · Perfil público`;
  $header.style.display = 'flex';

  // Ocultar diag después de éxito
  setTimeout(() => { $diag.style.display = 'none'; }, 3000);

  // ── 8. Render cards ──────────────────────────────────────────
  $section.style.display = 'block';
  log('Cargando ' + docs.length + ' cards…');

  // Esperar card.js si aún no está
  let cardWait = 0;
  while (!window.PuntazoCard && cardWait < 20) {
    await new Promise(r => setTimeout(r, 200));
    cardWait++;
  }
  log('PuntazoCard: ' + (window.PuntazoCard ? '✓' : '✗ no disponible'), window.PuntazoCard ? 'ok' : 'warn');

  let cardsBuilt = 0;
  for (const doc of docs) {
    const p = doc.data;
    if (!p.videoId) { log('Doc sin videoId, saltando', 'warn'); continue; }

    let url='', club='', cancha='', lado='', fecha='';

    // Índice global
    const hit = videoIndex[p.videoId];
    if (hit && hit.url) {
      url=hit.url; club=hit.club||''; cancha=hit.cancha||''; lado=hit.lado||''; fecha=hit.fecha||'';
    } else {
      // Fallback Firestore
      try {
        const rxDoc = await db.collection('reactions').doc(p.videoId).get();
        if (rxDoc.exists) {
          const d = rxDoc.data();
          url=d.videoUrl||''; club=d.club||''; cancha=d.cancha||''; lado=d.lado||''; fecha=d.fecha||'';
        }
      } catch(e2) { log('Error leyendo reactions/' + p.videoId + ': ' + e2.message, 'err'); }
    }

    if (!url) { log('Sin URL para ' + p.videoId.slice(0,30) + '…, saltando', 'warn'); continue; }

    const entry = { nombre:p.videoId, url, club, cancha, lado, fecha };

    if (window.PuntazoCard) {
      const card = window.PuntazoCard.build(entry, {
        showSave:true, showShare:true, showFullscreen:true,
        showClaim:false, showReactions:true, showComments:false,
        showClubInfo:true, showHeroName:false,
        topLabel: club || '',
      });
      $grid.appendChild(card);
      window.PuntazoCard.attachReactions(card, entry);
    } else {
      // Fallback HTML puro
      const div = document.createElement('div');
      div.className = 'video-card';
      div.innerHTML = `
        <div class="card-top"><span class="card-time">${esc(club||'Puntazo')}</span></div>
        <div class="video-wrap"><video src="${esc(url)}" controls playsinline preload="metadata" style="width:100%;border-radius:10px"></video></div>`;
      $grid.appendChild(div);
    }
    cardsBuilt++;
  }

  log('Cards construidas: ' + cardsBuilt, cardsBuilt > 0 ? 'ok' : 'warn');

  if (!$grid.children.length) {
    showError('Sin clips disponibles', 'No encontramos videos con URL disponible para este jugador.');
  }

})();
</script>
</body>
</html>
