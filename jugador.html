<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/" />
<title>Jugador · Puntazo</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="assets/estilo.css" />
<link rel="stylesheet" href="/assets/card.css" />
<link rel="stylesheet" href="/assets/reactions.css" />

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-core.js"></script>
<script src="/assets/reactions.js"></script>
<script src="/assets/card.js"></script>

<style>
  .player-wrap { max-width:860px; margin:0 auto; padding:24px 16px 60px; }

  .player-header {
    display:flex; align-items:center; gap:18px; margin-bottom:28px;
    padding:20px; border-radius:18px;
    background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.10);
  }

  .player-avatar {
    width:72px; height:72px; border-radius:50%; object-fit:cover;
    background:rgba(0,79,200,.35); border:2px solid rgba(255,255,255,.14);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; font-weight:900; color:#fff; overflow:hidden;
  }
  .player-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .player-name { font-size:1.35rem; font-weight:900; color:#fff; margin-bottom:4px; }
  .player-sub  { color:rgba(234,242,255,.55); font-size:.84rem; }

  .section-title {
    font-size:1rem; font-weight:800; color:rgba(234,242,255,.75); margin-bottom:16px;
  }

  /* Skeleton */
  .player-header-skeleton {
    display:flex; align-items:center; gap:18px; padding:20px; border-radius:18px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    animation:pz-shimmer 1.6s infinite; margin-bottom:28px;
  }
  .player-header-skeleton .sk-av { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.07); flex-shrink:0; }
  .player-header-skeleton .sk-lines { flex:1; }
  .player-header-skeleton .sk-line { height:14px; border-radius:6px; background:rgba(255,255,255,.07); margin-bottom:10px; }
  .player-header-skeleton .sk-line.short { width:55%; }

  @media(max-width:480px) { .player-header{flex-direction:column;text-align:center;align-items:center;} }
</style>
</head>
<body>

<div class="page-bg"></div>
<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="site-content fade-in">
  <div class="player-wrap">

    <div id="headerSkeleton" class="player-header-skeleton">
      <div class="sk-av"></div>
      <div class="sk-lines"><div class="sk-line"></div><div class="sk-line short"></div></div>
    </div>

    <div id="playerHeader" class="player-header" style="display:none">
      <div id="playerAvatar" class="player-avatar"></div>
      <div>
        <div id="playerName" class="player-name">Jugador</div>
        <div id="playerSub"  class="player-sub">Perfil público · Puntazo</div>
      </div>
    </div>

    <div id="playerError" class="empty-state" style="display:none">
      <div class="empty-icon">🕵️</div>
      <h3>Perfil no encontrado</h3>
      <p id="errorMsg">Este jugador no tiene apariciones públicas todavía.</p>
    </div>

    <div id="appearancesSection" style="display:none">
      <p class="section-title">🥷 Apariciones</p>
      <div id="appearancesGrid" class="cards-grid"></div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <p class="footer-copy">© 2026 Puntazo</p>
</footer>

<script>
(async function () {
  'use strict';

  const uid = new URLSearchParams(location.search).get('uid') || '';

  const $skeleton  = document.getElementById('headerSkeleton');
  const $header    = document.getElementById('playerHeader');
  const $avatar    = document.getElementById('playerAvatar');
  const $name      = document.getElementById('playerName');
  const $sub       = document.getElementById('playerSub');
  const $error     = document.getElementById('playerError');
  const $errorMsg  = document.getElementById('errorMsg');
  const $section   = document.getElementById('appearancesSection');
  const $grid      = document.getElementById('appearancesGrid');

  function showError(msg) {
    $skeleton.style.display = 'none';
    if (msg) $errorMsg.textContent = msg;
    $error.style.display = 'block';
  }

  if (!uid) { showError('UID no especificado'); return; }

  async function waitFor(check, retries) {
    for (let i=0; i<(retries||40); i++) {
      if (check()) return true;
      await new Promise(r=>setTimeout(r,200));
    }
    return false;
  }

  const ready = await waitFor(()=> window.PuntazoCard && window.PuntazoFirebase?.db, 40);
  if (!ready) { showError('Error cargando dependencias'); return; }

  const db = PuntazoCard.getDb();
  if (!db) { showError('Sin conexión a base de datos'); return; }

  try {
    // ── Query sin orderBy para evitar necesidad de índice compuesto ──
    // Firestore permite where sin orderBy sin índice adicional.
    // Si queremos orderBy más adelante, agregar índice en Firebase Console:
    //   Collection group: participants
    //   uid ASC + claimedAt DESC
    const snap = await db.collectionGroup('participants')
      .where('uid', '==', uid)
      .limit(30)
      .get();

    $skeleton.style.display = 'none';

    if (snap.empty) {
      showError('Este jugador no tiene apariciones públicas todavía.');
      return;
    }

    // Ordenar client-side por claimedAt desc (evita requerir índice compuesto)
    const docs = [];
    snap.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));
    docs.sort((a, b) => {
      const ta = a.data.claimedAt?.seconds || 0;
      const tb = b.data.claimedAt?.seconds || 0;
      return tb - ta;
    });

    // Datos del jugador
    const firstData  = docs[0].data;
    const playerName = firstData.displayName || 'Jugador';
    const playerPhoto= firstData.photoURL    || '';

    document.title = `${playerName} · Puntazo`;

    if (playerPhoto) {
      $avatar.innerHTML = `<img src="${PuntazoCard.escapeHTML(playerPhoto)}" alt="${PuntazoCard.escapeHTML(playerName)}" />`;
    } else {
      $avatar.textContent = playerName.charAt(0).toUpperCase();
    }
    $name.textContent = playerName;
    $sub.textContent  = `${docs.length} aparición${docs.length!==1?'es':''} · Perfil público`;
    $header.style.display = 'flex';

    // Intentar cargar videos desde videos_index.json primero
    let videoIndex = {};
    try {
      const res = await fetch('/data/videos_index.json?cb='+Date.now(), { cache:'no-store' });
      if (res.ok) {
        const idx = await res.json();
        videoIndex = idx.videos || {};
      }
    } catch {}

    $section.style.display = 'block';

    for (const doc of docs) {
      const p = doc.data;
      if (!p.videoId) continue;

      let entry = {
        nombre:  p.videoId,
        url:     '',
        club:    '',
        cancha:  '',
        lado:    '',
        fecha:   '',
      };

      // 1. Buscar en índice global
      const hit = videoIndex[p.videoId];
      if (hit && hit.url) {
        entry.url    = hit.url;
        entry.club   = hit.club   || '';
        entry.cancha = hit.cancha || '';
        entry.lado   = hit.lado   || '';
        entry.fecha  = hit.fecha  || '';
      } else {
        // 2. Fallback Firestore
        try {
          const rxDoc = await db.collection('reactions').doc(p.videoId).get();
          if (rxDoc.exists) {
            const d    = rxDoc.data();
            entry.url    = d.videoUrl || '';
            entry.club   = d.club     || '';
            entry.cancha = d.cancha   || '';
            entry.lado   = d.lado     || '';
            entry.fecha  = d.fecha    || '';
          }
        } catch {}
      }

      if (!entry.url) continue;

      PuntazoCard.buildAndAppend(entry, {
        showSave:true, showShare:true, showFullscreen:true,
        showClaim:false, showReactions:true, showComments:false,
        showClubInfo:true, showHeroName:false,
      }, $grid);
    }

    if (!$grid.children.length) {
      showError('No encontramos clips disponibles para este jugador.');
    }

  } catch (err) {
    console.error('[jugador]', err);
    // Si el error menciona "requires an index", dar hint específico
    if (String(err).includes('index') || String(err).includes('índice')) {
      showError('Falta configurar un índice en Firestore. Consulta la consola para el link directo.');
    } else {
      showError('Error cargando el perfil. Intenta de nuevo en unos segundos.');
    }
  }
})();
</script>

</body>
</html>
