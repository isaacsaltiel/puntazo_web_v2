<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/" />
<title>Jugador · Puntazo</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7HTMSTJ035"></script>
<script>
  window.dataLayer=window.dataLayer||[];
  function gtag(){dataLayer.push(arguments);}
  gtag('js',new Date()); gtag('config','G-7HTMSTJ035');
</script>

<meta name="theme-color" content="#050914" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="assets/estilo.css" />
<link rel="stylesheet" href="/assets/card.css" />
<link rel="stylesheet" href="/assets/reactions.css" />

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-core.js"></script>
<script src="/assets/reactions.js"></script>
<script src="/assets/card.js"></script>

<style>
  .player-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header del jugador */
  .player-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.10);
  }

  .player-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    background: rgba(0,79,200,.35);
    border: 2px solid rgba(255,255,255,.14);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 900;
    color: #fff;
    overflow: hidden;
  }

  .player-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .player-name {
    font-size: 1.35rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }

  .player-sub {
    color: rgba(234,242,255,.55);
    font-size: 0.84rem;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 800;
    color: rgba(234,242,255,.75);
    margin-bottom: 16px;
    letter-spacing: 0.2px;
  }

  /* Skeleton del header */
  .player-header-skeleton {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    animation: pz-shimmer 1.6s infinite;
    margin-bottom: 28px;
  }

  .player-header-skeleton .sk-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
    flex-shrink: 0;
  }

  .player-header-skeleton .sk-lines { flex: 1; }
  .player-header-skeleton .sk-line {
    height: 14px; border-radius: 6px;
    background: rgba(255,255,255,.07);
    margin-bottom: 10px;
  }
  .player-header-skeleton .sk-line.short { width: 55%; }

  @media (max-width: 480px) {
    .player-header { flex-direction: column; text-align: center; }
    .player-header { align-items: center; }
  }
</style>
</head>
<body>

<div class="page-bg"></div>

<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="site-content fade-in">
  <div class="player-wrap">

    <!-- Skeleton mientras carga -->
    <div id="headerSkeleton" class="player-header-skeleton">
      <div class="sk-avatar"></div>
      <div class="sk-lines">
        <div class="sk-line"></div>
        <div class="sk-line short"></div>
      </div>
    </div>

    <!-- Header del jugador (oculto hasta cargar) -->
    <div id="playerHeader" class="player-header" style="display:none">
      <div id="playerAvatar" class="player-avatar"></div>
      <div>
        <div id="playerName" class="player-name">Jugador</div>
        <div id="playerSub" class="player-sub">Perfil público · Puntazo</div>
      </div>
    </div>

    <!-- Error / no encontrado -->
    <div id="playerError" class="empty-state" style="display:none">
      <div class="empty-icon">🕵️</div>
      <h3>Perfil no encontrado</h3>
      <p>Este jugador no tiene apariciones públicas todavía.</p>
    </div>

    <!-- Grid de apariciones -->
    <div id="appearancesSection" style="display:none">
      <p class="section-title">🥷 Apariciones</p>
      <div id="appearancesGrid" class="cards-grid"></div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-redes">
    <a href="https://tiktok.com/@puntazoclips" target="_blank" rel="noopener">TikTok</a>
    <a href="https://instagram.com/puntazoclips" target="_blank" rel="noopener">Instagram</a>
  </div>
  <p class="footer-copy">© 2026 Puntazo</p>
</footer>

<script>
(async function () {
  'use strict';

  const uid = new URLSearchParams(location.search).get('uid') || '';

  const $headerSkeleton   = document.getElementById('headerSkeleton');
  const $playerHeader     = document.getElementById('playerHeader');
  const $playerAvatar     = document.getElementById('playerAvatar');
  const $playerName       = document.getElementById('playerName');
  const $playerSub        = document.getElementById('playerSub');
  const $playerError      = document.getElementById('playerError');
  const $appearSection    = document.getElementById('appearancesSection');
  const $grid             = document.getElementById('appearancesGrid');

  function showError(msg) {
    $headerSkeleton.style.display = 'none';
    $playerError.style.display = 'block';
    if (msg) $playerError.querySelector('p').textContent = msg;
  }

  if (!uid) { showError('UID no especificado'); return; }

  // Esperar deps
  async function waitFor(check, retries) {
    for (let i=0; i<(retries||40); i++) {
      if (check()) return true;
      await new Promise(r=>setTimeout(r,200));
    }
    return false;
  }

  const ready = await waitFor(()=> window.PuntazoCard && window.PuntazoFirebase?.db, 40);
  if (!ready) { showError('Error cargando dependencias'); return; }

  const db = PuntazoCard.getDb();
  if (!db) { showError(); return; }

  try {
    // Query participaciones de este usuario
    const snap = await db.collectionGroup('participants')
      .where('uid', '==', uid)
      .orderBy('claimedAt', 'desc')
      .limit(30)
      .get();

    $headerSkeleton.style.display = 'none';

    if (snap.empty) { showError('Este jugador no tiene apariciones públicas todavía.'); return; }

    // Datos del jugador del primer doc
    const firstData = snap.docs[0].data();
    const playerName  = firstData.displayName || 'Jugador';
    const playerPhoto = firstData.photoURL     || '';

    document.title = `${playerName} · Puntazo`;

    // Renderizar header
    if (playerPhoto) {
      $playerAvatar.innerHTML = `<img src="${PuntazoCard.escapeHTML(playerPhoto)}" alt="${PuntazoCard.escapeHTML(playerName)}" />`;
    } else {
      $playerAvatar.textContent = playerName.charAt(0).toUpperCase();
    }
    $playerName.textContent = playerName;
    $playerSub.textContent  = `${snap.size} aparición${snap.size !== 1 ? 'es' : ''} · Perfil público`;
    $playerHeader.style.display = 'flex';

    // Para cada aparición, obtener metadata del video
    $appearSection.style.display = 'block';

    for (const doc of snap.docs) {
      const p = doc.data();
      if (!p.videoId) continue;

      // Obtener datos del video desde reactions doc
      let entry = {
        nombre:  p.videoId,
        url:     '',
        club:    '',
        cancha:  '',
        lado:    '',
        fecha:   '',
      };

      try {
        const rxDoc = await db.collection('reactions').doc(p.videoId).get();
        if (rxDoc.exists) {
          const d = rxDoc.data();
          entry.url    = d.videoUrl || '';
          entry.club   = d.club     || '';
          entry.cancha = d.cancha   || '';
          entry.lado   = d.lado     || '';
          entry.fecha  = d.fecha    || '';
        }
      } catch {}

      if (!entry.url) continue; // sin URL no podemos mostrar el video

      PuntazoCard.buildAndAppend(entry, {
        showSave: true, showShare: true, showFullscreen: true,
        showClaim: false,          // no puede reclamar en el perfil de otro
        showReactions: true,
        showComments: false,       // mantener perfil limpio
        showClubInfo: true,
      }, $grid);
    }

    if (!$grid.children.length) {
      showError('No encontramos videos con URL disponible para este jugador.');
    }

  } catch (err) {
    console.error('[jugador]', err);
    showError('Error cargando el perfil. Intenta de nuevo.');
  }
})();
</script>

</body>
</html>
