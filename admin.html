<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/" />
<title>Admin · Puntazo</title>
<meta name="robots" content="noindex,nofollow" />

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-core.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:#050914; --card:rgba(255,255,255,.06); --border:rgba(255,255,255,.10);
  --text:#eaf2ff; --muted:rgba(234,242,255,.50); --blue:#004FC8; --blue2:#0B7CFF;
  --gold:#ffe066; --green:#22c55e; --red:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--text);}
a{color:inherit;}

/* ── Layout ── */
.page{max-width:1140px;margin:0 auto;padding:24px 16px 80px;}

/* ── Header ── */
.dash-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:28px;
  padding:16px 20px;border-radius:18px;background:var(--card);border:1px solid var(--border);
}
.dash-header h1{font-size:1.3rem;font-weight:900;}
.dash-header .sub{color:var(--muted);font-size:0.78rem;margin-top:4px;}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);
  font-family:inherit;font-size:0.80rem;font-weight:700;cursor:pointer;transition:all .15s;
  text-decoration:none;white-space:nowrap;
}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.24);}
.btn.primary{background:rgba(0,79,200,.22);border-color:rgba(11,124,255,.40);}
.btn.primary:hover{background:rgba(0,79,200,.34);}
.btn.sm{padding:5px 12px;font-size:0.75rem;}
.btn.active{background:rgba(0,79,200,.30);border-color:rgba(11,124,255,.55);color:#fff;}

/* ── Time filter bar ── */
.time-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:24px;padding:12px 16px;border-radius:14px;
  background:var(--card);border:1px solid var(--border);
}
.time-bar label{font-size:0.76rem;font-weight:700;color:var(--muted);margin-right:4px;}
.time-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
.time-nav .nav-val{
  min-width:120px;text-align:center;font-size:0.84rem;font-weight:800;color:#fff;
  padding:5px 12px;border-radius:10px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
}
.time-nav .nav-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);color:var(--text);font-size:1rem;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.time-nav .nav-btn:hover{background:rgba(255,255,255,.14);}

/* ── KPI grid ── */
.kpi-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;margin-bottom:32px;
}
.kpi{
  padding:16px 14px;border-radius:16px;background:var(--card);
  border:1px solid var(--border);text-align:center;
}
.kpi-value{font-size:1.75rem;font-weight:900;color:#fff;line-height:1;}
.kpi-label{font-size:0.70rem;color:var(--muted);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;}
.kpi.hl  {border-color:rgba(11,124,255,.32);background:rgba(0,79,200,.12);}
.kpi.gold{border-color:rgba(255,190,0,.28);background:rgba(255,190,0,.08);}
.kpi.gold .kpi-value{color:var(--gold);}
.kpi.green{border-color:rgba(34,197,94,.22);background:rgba(34,197,94,.06);}
.kpi.green .kpi-value{color:#86efac;}

/* ── Tabs ── */
.tabs{
  display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);padding-bottom:1px;
}
.tab-btn{
  padding:8px 16px;border-radius:999px 999px 0 0;border:1px solid transparent;
  background:transparent;color:var(--muted);font-family:inherit;font-size:0.82rem;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:#fff;background:rgba(0,79,200,.18);border-color:rgba(11,124,255,.30);border-bottom-color:transparent;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Section ── */
.section{margin-bottom:36px;}
.section-title{
  font-size:0.95rem;font-weight:900;color:rgba(234,242,255,.80);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.badge{
  padding:2px 8px;border-radius:999px;
  background:rgba(255,255,255,.08);font-size:0.68rem;font-weight:700;color:var(--muted);
}

/* ── Tables ── */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{
  padding:9px 12px;text-align:left;font-weight:800;font-size:0.70rem;
  text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
  background:rgba(255,255,255,.04);border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.025);}

.td-rank{font-size:1.05rem;width:36px;text-align:center;}
.td-name{font-weight:700;color:#fff;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-name small{display:block;font-weight:400;color:var(--muted);font-size:0.70rem;margin-top:2px;}
.td-num{font-weight:800;color:#fff;text-align:right;white-space:nowrap;}
.td-bar{min-width:80px;}

.bar{height:5px;border-radius:999px;background:rgba(255,255,255,.06);}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue2),var(--blue));transition:width .5s ease;}
.bar-fill.gold{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.bar-fill.green{background:linear-gradient(90deg,#34d399,#10b981);}
.bar-fill.red{background:linear-gradient(90deg,#f87171,#ef4444);}

/* ── Pills ── */
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:700;white-space:nowrap;}
.pill-blue {background:rgba(0,79,200,.22);color:#7eb8ff;}
.pill-gold {background:rgba(255,190,0,.18);color:var(--gold);}
.pill-green{background:rgba(34,197,94,.18);color:#86efac;}
.pill-red  {background:rgba(239,68,68,.18);color:#fca5a5;}
.pill-muted{background:rgba(255,255,255,.08);color:var(--muted);}

/* ── Club acordeón ── */
.club-block{
  margin-bottom:16px;border-radius:14px;border:1px solid var(--border);overflow:hidden;
}
.club-block-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:rgba(255,255,255,.04);cursor:pointer;gap:12px;
  transition:background .15s;
}
.club-block-header:hover{background:rgba(255,255,255,.07);}
.club-block-name{font-weight:900;font-size:0.95rem;color:#fff;}
.club-block-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.club-block-body{display:none;padding:0 0 12px;}
.club-block.open .club-block-body{display:block;}
.club-block.open .club-toggle{transform:rotate(180deg);}
.club-toggle{transition:transform .2s;font-size:0.8rem;color:var(--muted);}

.cancha-sub{
  margin:8px 12px 0;border-radius:10px;border:1px solid rgba(255,255,255,.06);overflow:hidden;
}
.cancha-sub-header{
  padding:8px 12px;background:rgba(255,255,255,.03);font-size:0.78rem;font-weight:800;
  color:rgba(234,242,255,.70);display:flex;align-items:center;gap:8px;
}

/* ── Nota informativa ── */
.info-box{
  padding:14px 16px;border-radius:12px;margin-bottom:16px;
  background:rgba(255,190,0,.06);border:1px solid rgba(255,190,0,.18);
  font-size:0.80rem;color:rgba(234,242,255,.72);line-height:1.6;
}
.info-box strong{color:var(--gold);}
.info-box a{color:#7eb8ff;}

/* ── Loading / empty ── */
.loading{display:flex;align-items:center;gap:10px;padding:24px;color:var(--muted);font-size:0.85rem;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.12);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-note{padding:24px;color:var(--muted);font-size:0.85rem;text-align:center;}

/* ── Auth wall ── */
#accessDenied{display:none;text-align:center;padding:80px 20px;}
#accessDenied h2{font-size:1.4rem;font-weight:900;margin-bottom:12px;}
#accessDenied p{color:var(--muted);margin-bottom:24px;}
#accessDenied input{
  padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:inherit;font-size:14px;
  width:240px;outline:none;
}
#accessDenied input:focus{border-color:rgba(11,124,255,.50);}

@media(max-width:640px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  th,td{padding:7px 8px;}
  .time-bar{gap:6px;}
}
</style>
</head>
<body>

<!-- ── Auth wall ── -->
<div id="accessDenied">
  <div style="font-size:52px;margin-bottom:16px">🔐</div>
  <h2>Acceso restringido</h2>
  <p>Panel de administración de Puntazo.</p>
  <input type="password" id="pwInput" placeholder="Contraseña" />
  <br/><br/>
  <button class="btn primary" onclick="checkPw()">Entrar</button>
</div>

<!-- ── Dashboard ── -->
<div id="mainContent" style="display:none">
<div class="page">

  <!-- Header -->
  <div class="dash-header">
    <div>
      <h1>📊 Dashboard Puntazo</h1>
      <div class="sub" id="lastUpdated">Cargando…</div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="refreshAll()">↺ Actualizar</button>
      <button class="btn primary" onclick="exportCSV()">⬇ Exportar CSV</button>
      <a class="btn" href="https://console.firebase.google.com" target="_blank">Firebase Console ↗</a>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi hl"><div class="kpi-value" id="kpiViews">—</div><div class="kpi-label">Reproducciones</div></div>
    <div class="kpi gold"><div class="kpi-value" id="kpiReactions">—</div><div class="kpi-label">Reacciones</div></div>
    <div class="kpi"><div class="kpi-value" id="kpiVideos">—</div><div class="kpi-label">Videos rastreados</div></div>
    <div class="kpi green"><div class="kpi-value" id="kpiSaves">—</div><div class="kpi-label">Guardados</div></div>
    <div class="kpi"><div class="kpi-value" id="kpiShares">—</div><div class="kpi-label">Compartidos</div></div>
    <div class="kpi"><div class="kpi-value" id="kpiComments">—</div><div class="kpi-label">Comentarios</div></div>
    <div class="kpi"><div class="kpi-value" id="kpiClaims">—</div><div class="kpi-label">Claims "Soy yo"</div></div>
    <div class="kpi gold"><div class="kpi-value" id="kpiImmortals">—</div><div class="kpi-label">Inmortales</div></div>
    <div class="kpi green"><div class="kpi-value" id="kpiUsers">—</div><div class="kpi-label">Usuarios activos*</div></div>
    <div class="kpi"><div class="kpi-value" id="kpiClubs">—</div><div class="kpi-label">Clubes</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="clubs">🏢 Clubes</button>
    <button class="tab-btn" data-tab="views">▶ Reproducciones</button>
    <button class="tab-btn" data-tab="reactions">🔥 Reacciones</button>
    <button class="tab-btn" data-tab="saves">💾 Guardados</button>
    <button class="tab-btn" data-tab="players">🥷 Jugadores</button>
    <button class="tab-btn" data-tab="users">👤 Usuarios</button>
    <button class="tab-btn" data-tab="recent">🕐 Reciente</button>
  </div>

  <div id="tab-clubs"     class="tab-pane active"></div>
  <div id="tab-views"     class="tab-pane"></div>
  <div id="tab-reactions" class="tab-pane"></div>
  <div id="tab-saves"     class="tab-pane"></div>
  <div id="tab-players"   class="tab-pane"></div>
  <div id="tab-users"     class="tab-pane"></div>
  <div id="tab-recent"    class="tab-pane"></div>

</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const ADMIN_KEY = 'puntazo2025';

// ============================================================
// STATE
// ============================================================
let _allDocs   = [];   // reactions docs
let _players   = [];   // {uid, displayName, photoURL, count}
let _users     = [];   // {uid, ...guardados info}
let _timeMode  = 'today'; // today | week | month | year
let _timeOffset = 0;   // cuántos periodos hacia atrás

// ============================================================
// ACCESO
// ============================================================
function checkPw() {
  const val = document.getElementById('pwInput').value.trim();
  if (val === ADMIN_KEY) {
    document.getElementById('accessDenied').style.display = 'none';
    document.getElementById('mainContent').style.display  = 'block';
    init();
  } else {
    const inp = document.getElementById('pwInput');
    inp.style.borderColor = '#ef4444';
    setTimeout(()=>{ inp.style.borderColor=''; }, 1200);
  }
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPw(); });

(function autoAuth() {
  const key = new URLSearchParams(location.search).get('key') || new URLSearchParams(location.search).get('admin');
  if (key === ADMIN_KEY) {
    document.getElementById('accessDenied').style.display = 'none';
    document.getElementById('mainContent').style.display  = 'block';
    if (document.readyState !== 'loading') init();
    else document.addEventListener('DOMContentLoaded', init);
  } else {
    document.getElementById('accessDenied').style.display = 'block';
  }
})();

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ============================================================
// TIEMPO
// ============================================================
function getDateRange() {
  const now = new Date();
  let start, end, label;

  if (_timeMode === 'today') {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - _timeOffset);
    start = end = fmtDate(d);
    label = _timeOffset===0 ? 'Hoy' : d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
  } else if (_timeMode === 'week') {
    const day = now.getDay() || 7;
    const monday = new Date(now); monday.setDate(now.getDate() - day + 1 - _timeOffset*7);
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    start = fmtDate(monday); end = fmtDate(sunday);
    label = _timeOffset===0 ? 'Esta semana' : `${monday.toLocaleDateString('es-MX',{day:'numeric',month:'short'})} – ${sunday.toLocaleDateString('es-MX',{day:'numeric',month:'short'})}`;
  } else if (_timeMode === 'month') {
    const d = new Date(now.getFullYear(), now.getMonth() - _timeOffset, 1);
    const last = new Date(d.getFullYear(), d.getMonth()+1, 0);
    start = fmtDate(d); end = fmtDate(last);
    label = _timeOffset===0 ? 'Este mes' : d.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  } else { // year
    const yr = now.getFullYear() - _timeOffset;
    start = `${yr}-01-01`; end = `${yr}-12-31`;
    label = _timeOffset===0 ? 'Este año' : String(yr);
  }
  return { start, end, label };
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function inRange(fecha, start, end) {
  if (!fecha) return false;
  return fecha >= start && fecha <= end;
}

function filteredDocs() {
  const { start, end } = getDateRange();
  return _allDocs.filter(d => inRange(d.fecha||'', start, end));
}

// ============================================================
// TIME BAR BUILDER
// ============================================================
function buildTimeBar(tabId) {
  const { label } = getDateRange();
  return `
    <div class="time-bar" id="timebar-${tabId}">
      <label>Período:</label>
      ${['today','week','month','year'].map(m=>`
        <button class="btn sm ${_timeMode===m?'active':''}" onclick="setTimeMode('${m}','${tabId}')">${{today:'Hoy',week:'Semana',month:'Mes',year:'Año'}[m]}</button>
      `).join('')}
      <div class="time-nav">
        <button class="nav-btn" onclick="shiftTime(-1,'${tabId}')">‹</button>
        <div class="nav-val" id="timeLabel-${tabId}">${label}</div>
        <button class="nav-btn" onclick="shiftTime(1,'${tabId}')" ${_timeOffset===0?'disabled style="opacity:.3;cursor:default"':''}>›</button>
      </div>
    </div>`;
}

function setTimeMode(mode, tabId) {
  _timeMode = mode;
  _timeOffset = 0;
  renderTab(tabId);
}

function shiftTime(dir, tabId) {
  _timeOffset = Math.max(0, _timeOffset - dir);
  renderTab(tabId);
}

function renderTab(tabId) {
  if (tabId === 'clubs')     renderClubs();
  if (tabId === 'views')     renderTopTable('tab-views','views','▶ Top videos por reproducciones','');
  if (tabId === 'reactions') renderTopTable('tab-reactions','total','🔥 Top videos por reacciones','gold');
  if (tabId === 'saves')     renderTopTable('tab-saves','saves','💾 Top videos por guardados','green');
}

// ============================================================
// FIREBASE / INIT
// ============================================================
async function waitForFirebase(n) {
  for(let i=0;i<(n||40);i++){
    if(window.PuntazoFirebase&&typeof window.PuntazoFirebase.db==='function') return true;
    await sleep(200);
  }
  return false;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function init() {
  const ok = await waitForFirebase(40);
  if (!ok) { document.getElementById('lastUpdated').textContent='Error: Firebase no disponible'; return; }
  await refreshAll();
}

async function refreshAll() {
  document.getElementById('lastUpdated').textContent = 'Cargando…';
  const db = window.PuntazoFirebase.db();

  try {
    // 1. Reactions (todos los videos rastreados)
    const snap = await db.collection('reactions').limit(500).get();
    _allDocs = [];
    snap.forEach(doc => _allDocs.push(doc.data()));

    // 2. Usuarios (colección raíz — proxy de usuarios con actividad)
    try {
      const uSnap = await db.collection('usuarios').limit(500).get();
      const uMap = new Map();
      for (const doc of uSnap.docs) {
        uMap.set(doc.id, { uid: doc.id, saves: 0 });
      }
      // Contar guardados por usuario (subcollection query no disponible directamente)
      // Usamos participants para enriquecer
      _users = Array.from(uMap.values());
    } catch(e) {
      console.warn('[admin users]', e);
      _users = [];
    }

    // 3. Jugadores (collectionGroup participants)
    try {
      const pSnap = await db.collectionGroup('participants').limit(500).get();
      const pMap  = new Map();
      pSnap.forEach(doc => {
        const d = doc.data();
        if (!d.uid) return;
        const prev = pMap.get(d.uid) || { uid:d.uid, displayName:d.displayName||'', photoURL:d.photoURL||'', claims:0 };
        prev.claims++;
        if (d.displayName && !prev.displayName) prev.displayName = d.displayName;
        pMap.set(d.uid, prev);
      });
      _players = Array.from(pMap.values()).sort((a,b)=>b.claims-a.claims);
    } catch(e) {
      console.warn('[admin players]', e);
      _players = [];
    }

    renderKPIs();
    renderClubs();
    renderTopTable('tab-views','views','▶ Top videos por reproducciones','');
    renderTopTable('tab-reactions','total','🔥 Top videos por reacciones','gold');
    renderTopTable('tab-saves','saves','💾 Top videos por guardados','green');
    renderPlayers();
    renderUsers();
    renderRecent();

    document.getElementById('lastUpdated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-MX');
  } catch(e) {
    console.error('[admin]', e);
    document.getElementById('lastUpdated').textContent = 'Error: ' + e.message;
  }
}

// ============================================================
// KPIs GLOBALES
// ============================================================
function renderKPIs() {
  const t = _allDocs.reduce((a,d)=>({
    views:     a.views     + (d.views||0),
    reactions: a.reactions + (d.total||0),
    saves:     a.saves     + (d.saves||0),
    shares:    a.shares    + (d.shares||0),
    comments:  a.comments  + (d.comments_count||0),
    claims:    a.claims    + (d.claims_count||0),
    immortals: a.immortals + (d.immortal?1:0),
  }), {views:0,reactions:0,saves:0,shares:0,comments:0,claims:0,immortals:0});

  const clubs = new Set(_allDocs.map(d=>d.club).filter(Boolean));

  s('kpiViews',     fmt(t.views));
  s('kpiReactions', fmt(t.reactions));
  s('kpiVideos',    fmt(_allDocs.length));
  s('kpiSaves',     fmt(t.saves));
  s('kpiShares',    fmt(t.shares));
  s('kpiComments',  fmt(t.comments));
  s('kpiClaims',    fmt(t.claims));
  s('kpiImmortals', fmt(t.immortals));
  s('kpiUsers',     fmt(_users.length));
  s('kpiClubs',     fmt(clubs.size));
}

// ============================================================
// TAB CLUBES
// ============================================================
function renderClubs() {
  const $pane = document.getElementById('tab-clubs');
  const docs  = filteredDocs();
  const { label, start, end } = getDateRange();

  // Agrupar por club → cancha → videos
  const clubMap = new Map();
  for (const d of docs) {
    const club   = d.club   || '(Sin club)';
    const cancha = d.cancha || '(Sin cancha)';
    if (!clubMap.has(club)) clubMap.set(club, { name:club, views:0, reactions:0, canchas:new Map() });
    const clubObj = clubMap.get(club);
    clubObj.views     += (d.views||0);
    clubObj.reactions += (d.total||0);
    if (!clubObj.canchas.has(cancha)) clubObj.canchas.set(cancha, []);
    clubObj.canchas.get(cancha).push(d);
  }

  // Ordenar clubes por vistas desc
  const sorted = Array.from(clubMap.values()).sort((a,b)=>b.views-a.views);
  const maxViews = sorted[0]?.views || 1;

  if (sorted.length === 0) {
    $pane.innerHTML = buildTimeBar('clubs') + `<div class="empty-note">Sin videos en este período.</div>`;
    return;
  }

  const blocks = sorted.map((club, ci) => {
    const canchaRows = Array.from(club.canchas.entries()).map(([cancha, vids]) => {
      const vidsSorted = [...vids].sort((a,b)=>(b.views||0)-(a.views||0));
      const maxV = vidsSorted[0]?.views || 1;
      const rows = vidsSorted.slice(0,10).map((d,i)=>{
        const pct  = Math.round(((d.views||0)/maxV)*100);
        const link = d.videoId ? `/clip.html?videoId=${encodeURIComponent(d.videoId)}` : '#';
        return `<tr>
          <td class="td-rank" style="font-size:.85rem">${i+1}</td>
          <td class="td-name">
            <a href="${link}" target="_blank" style="text-decoration:none;color:#eaf2ff">
              ${videoLabel(d)}
              ${d.immortal?'<span class="pill pill-gold" style="margin-left:4px">⭐</span>':''}
            </a>
          </td>
          <td class="td-bar"><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></td>
          <td class="td-num">${fmt(d.views||0)} 👁</td>
          <td class="td-num">${fmt(d.total||0)} rxn</td>
        </tr>`;
      }).join('');

      return `<div class="cancha-sub">
        <div class="cancha-sub-header">
          🎾 Cancha: <strong style="color:#fff">${esc(cancha)}</strong>
          <span class="badge">${vidsSorted.length} video${vidsSorted.length!==1?'s':''}</span>
        </div>
        <table>
          <thead><tr><th>#</th><th>Video</th><th></th><th>Vistas</th><th>Reacciones</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');

    const pct = Math.round((club.views/maxViews)*100);
    return `<div class="club-block" id="club-${ci}">
      <div class="club-block-header" onclick="toggleClub('club-${ci}')">
        <div>
          <div class="club-block-name">${esc(club.name)}</div>
        </div>
        <div class="club-block-meta">
          <span class="pill pill-blue">${fmt(club.views)} vistas</span>
          <span class="pill pill-gold">${fmt(club.reactions)} reacciones</span>
          <span class="pill pill-muted">${Array.from(clubMap.get(club.name).canchas.keys()).length} cancha${Array.from(clubMap.get(club.name).canchas.keys()).length!==1?'s':''}</span>
          <span class="club-toggle">▼</span>
        </div>
      </div>
      <div class="club-block-body">${canchaRows}</div>
    </div>`;
  }).join('');

  $pane.innerHTML = buildTimeBar('clubs') + `
    <div class="section">
      <div class="section-title">🏢 Videos por club — ${esc(label)} <span class="badge">${sorted.length} clubs · ${docs.length} videos</span></div>
      ${blocks}
    </div>`;

  // Auto-abrir el primer club
  if (sorted.length > 0) toggleClub('club-0');
}

function toggleClub(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ============================================================
// TOP TABLE GENÉRICA (filtrada por tiempo)
// ============================================================
function renderTopTable(tabId, field, title, colorClass) {
  const $pane = document.getElementById(tabId);
  const docs  = filteredDocs().filter(d=>(d[field]||0)>0).sort((a,b)=>(b[field]||0)-(a[field]||0)).slice(0,25);
  const { label } = getDateRange();
  const maxVal = docs[0]?.[field] || 1;

  let html = buildTimeBar(tabId);

  if (docs.length === 0) {
    $pane.innerHTML = html + `<div class="empty-note">Sin datos para este período.</div>`;
    return;
  }

  const rows = docs.map((d,i)=>{
    const pct  = Math.round(((d[field]||0)/maxVal)*100);
    const link = d.videoId ? `/clip.html?videoId=${encodeURIComponent(d.videoId)}` : '#';
    return `<tr>
      <td class="td-rank">${rankEmoji(i)}</td>
      <td class="td-name">
        <a href="${link}" target="_blank" style="color:#eaf2ff;text-decoration:none">
          ${videoLabel(d)}
          <small>${esc(d.club||'')} ${d.cancha?'· '+esc(d.cancha):''} ${d.fecha?'· '+d.fecha:''}</small>
        </a>
        ${d.immortal?'<span class="pill pill-gold" style="margin-left:4px">⭐ Inmortal</span>':''}
      </td>
      <td class="td-bar"><div class="bar"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div></td>
      <td class="td-num">${fmt(d[field]||0)}</td>
    </tr>`;
  }).join('');

  $pane.innerHTML = html + `
    <div class="section">
      <div class="section-title">${title} — ${esc(label)} <span class="badge">${docs.length} videos</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Video</th><th style="min-width:80px"></th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ============================================================
// JUGADORES
// ============================================================
function renderPlayers() {
  const $pane = document.getElementById('tab-players');

  if (!_players.length) {
    $pane.innerHTML = `<div class="info-box">
      <strong>Índice pendiente.</strong> El índice de <code>collectionGroup: participants · claimedAt asc</code>
      puede tardar hasta 3 minutos en estar listo. Si ya lo creaste, actualiza la página.
    </div>`;
    return;
  }

  const maxC = _players[0]?.claims || 1;
  const rows = _players.slice(0,25).map((p,i)=>{
    const pct  = Math.round((p.claims/maxC)*100);
    const link = `/jugador.html?uid=${encodeURIComponent(p.uid)}`;
    const av   = p.photoURL
      ? `<img src="${esc(p.photoURL)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px">`
      : `<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(0,79,200,.4);font-weight:900;font-size:11px;margin-right:8px;vertical-align:middle;flex-shrink:0">${(p.displayName||'?')[0].toUpperCase()}</span>`;
    return `<tr>
      <td class="td-rank">${rankEmoji(i)}</td>
      <td class="td-name">
        <a href="${link}" target="_blank" style="color:#eaf2ff;text-decoration:none;display:flex;align-items:center">
          ${av}${esc(p.displayName||'Anónimo')}
        </a>
      </td>
      <td class="td-bar"><div class="bar"><div class="bar-fill green" style="width:${pct}%"></div></div></td>
      <td class="td-num">${p.claims} claim${p.claims!==1?'s':''}</td>
    </tr>`;
  }).join('');

  $pane.innerHTML = `
    <div class="info-box">
      Jugadores rankeados por número de videos donde dijeron "🥷 Soy yo".<br>
      <strong>Nota:</strong> Las reacciones (🔥😂) son anónimas/localStorage y no se guardan por uid —
      para trackearlas por usuario se necesitaría modificar la arquitectura de <code>reactions.js</code>.
    </div>
    <div class="section">
      <div class="section-title">🥷 Top jugadores por apariciones <span class="badge">${_players.length} jugadores</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Jugador</th><th></th><th>Apariciones</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ============================================================
// USUARIOS
// ============================================================
function renderUsers() {
  const $pane = document.getElementById('tab-users');

  const authLink = `https://console.firebase.google.com/project/_/authentication/users`;

  // Cruzar _players con _users para enriquecer
  const pByUid = new Map(_players.map(p=>[p.uid, p]));

  // Todos los uids conocidos: de players + de users
  const allUids = new Set([..._players.map(p=>p.uid), ..._users.map(u=>u.uid)]);

  const userRows = Array.from(allUids).map(uid => {
    const p = pByUid.get(uid);
    const u = _users.find(x=>x.uid===uid);
    return {
      uid,
      displayName: p?.displayName || '',
      photoURL:    p?.photoURL    || '',
      claims:      p?.claims      || 0,
      // saves: no podemos obtenerlo sin N queries — se muestra en nota
    };
  }).sort((a,b)=>b.claims-a.claims).slice(0,30);

  if (!userRows.length) {
    $pane.innerHTML = `<div class="empty-note">Sin datos de usuarios todavía.</div>`;
    return;
  }

  const rows = userRows.map((u,i)=>{
    const link = `/jugador.html?uid=${encodeURIComponent(u.uid)}`;
    const av   = u.photoURL
      ? `<img src="${esc(u.photoURL)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px">`
      : `<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(0,79,200,.40);font-weight:900;font-size:11px;margin-right:8px;vertical-align:middle">${(u.displayName||'?')[0].toUpperCase()}</span>`;
    return `<tr>
      <td class="td-rank" style="font-size:.85rem">${i+1}</td>
      <td class="td-name">
        <a href="${link}" target="_blank" style="color:#eaf2ff;text-decoration:none;display:flex;align-items:center">
          ${av}${esc(u.displayName||'Usuario')}
        </a>
        <small style="color:var(--muted);font-size:.68rem">${esc(u.uid.slice(0,12))}…</small>
      </td>
      <td class="td-num"><span class="pill pill-green">${u.claims} clip${u.claims!==1?'s':''} reclamados</span></td>
    </tr>`;
  }).join('');

  $pane.innerHTML = `
    <div class="info-box">
      <strong>* Usuarios con actividad:</strong> ${_users.length} usuarios tienen documentos en Firestore (hicieron guardados o acciones).<br>
      <strong>Total de usuarios con Google Sign-In:</strong> solo visible en
      <a href="${authLink}" target="_blank">Firebase Console → Authentication ↗</a> (requiere Admin SDK para obtenerlo desde código).<br>
      <strong>Guardados por usuario:</strong> requeriría N queries en paralelo — se puede agregar como una pantalla de detalle por usuario.
    </div>
    <div class="section">
      <div class="section-title">👤 Usuarios conocidos <span class="badge">${allUids.size} usuarios</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Usuario</th><th>Actividad</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ============================================================
// RECIENTE
// ============================================================
function renderRecent() {
  const $pane = document.getElementById('tab-recent');
  const recent = [..._allDocs]
    .filter(d=>d.lastInteractionAt?.seconds)
    .sort((a,b)=>(b.lastInteractionAt?.seconds||0)-(a.lastInteractionAt?.seconds||0))
    .slice(0,20);

  if (!recent.length) {
    $pane.innerHTML = `<div class="empty-note">Sin actividad reciente rastreada.</div>`; return;
  }

  const rows = recent.map((d,i)=>{
    const ts   = new Date(d.lastInteractionAt.seconds*1000).toLocaleString('es-MX');
    const link = d.videoId ? `/clip.html?videoId=${encodeURIComponent(d.videoId)}` : '#';
    const emojis = ['🔥','😂','😡','🎉','😮'];
    const rxnStr = ['fuego','risa','enojo','diversion','sorpresa']
      .map((k,i2)=>(d[k]||0)>0?`${emojis[i2]}${d[k]}`:'').filter(Boolean).join(' ');
    return `<tr>
      <td class="td-rank" style="font-size:.85rem">${i+1}</td>
      <td class="td-name">
        <a href="${link}" target="_blank" style="color:#eaf2ff;text-decoration:none">
          ${videoLabel(d)}
          <small>${esc(d.club||'')} ${d.cancha?'· '+esc(d.cancha):''}</small>
        </a>
      </td>
      <td><span style="color:var(--muted);font-size:.76rem">${ts}</span></td>
      <td class="td-num" style="font-size:.88rem">${rxnStr||'—'}</td>
    </tr>`;
  }).join('');

  $pane.innerHTML = `
    <div class="section">
      <div class="section-title">🕐 Actividad reciente <span class="badge">${recent.length} docs</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Video</th><th>Última actividad</th><th>Reacciones</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ============================================================
// EXPORT CSV
// ============================================================
function exportCSV() {
  if (!_allDocs.length) { alert('Sin datos'); return; }
  const cols = ['videoId','club','cancha','lado','fecha','views','total','saves','shares','comments_count','claims_count','immortal'];
  const csv  = [cols.join(','), ..._allDocs.map(d=>cols.map(c=>JSON.stringify(d[c]??'')).join(','))].join('\n');
  const a    = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
    download: `puntazo_${new Date().toISOString().slice(0,10)}.csv`,
  });
  document.body.appendChild(a); a.click(); a.remove();
}

// ============================================================
// HELPERS
// ============================================================
function fmt(n) {
  if (n==null||isNaN(n)) return '—';
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000)    return (n/1000).toFixed(1)+'K';
  return String(n);
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rankEmoji(i) {
  return i===0?'🥇':i===1?'🥈':i===2?'🥉':String(i+1);
}

function s(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function videoLabel(d) {
  const m = String(d.videoId||'').match(/_(\d{2})(\d{2})\d{2}\.mp4$/i);
  const t = m ? `${parseInt(m[1])%12||12}:${m[2]} ${parseInt(m[1])>=12?'PM':'AM'}` : '';
  return `${t?`<strong>${esc(t)}</strong>`:''} ${d.club?`· ${esc(d.club)}`:''} ${d.cancha?`· ${esc(d.cancha)}`:''}`;
}
