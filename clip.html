<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clip · Puntazo</title>
  <meta name="description" content="Ver clip en Puntazo" />

  <link rel="stylesheet" href="/assets/reactions.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/assets/firebase-core.js"></script>
  <script src="/assets/reactions.js"></script>
  <script src="/assets/clip.js" defer></script>

  <style>
    :root{--bg:#050914;--card:rgba(255,255,255,.06);--text:#eaf2ff}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .wrap{max-width:900px;margin:12px auto;padding:16px}
    header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .back{color:#cfe;opacity:.9;text-decoration:none}
    .card{background:var(--card);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.06)}
    video{width:100%;height:auto;border-radius:8px;background:#000}
    .actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--text);font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="/inicio.html">← Inicio</a>
      <h1 style="font-size:18px;margin:0">Clip</h1>
    </header>

    <div id="clipRoot" class="card">
      <div id="loading">Cargando clip…</div>
      <div id="clipContainer" style="display:none">
        <video id="clipVideo" controls playsinline preload="metadata"></video>
        <div class="actions">
          <button id="shareBtn" class="btn">🔗 Compartir</button>
          <button id="saveBtn" class="btn">💾 Guardar</button>
          <button id="fullBtn" class="btn">⛶ Expandir</button>
        </div>

        <div id="reactionsTarget" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
</body>
</html>
