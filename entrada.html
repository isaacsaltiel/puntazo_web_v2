<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<base href="/" />
<title>Entrada · Puntazo</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
<meta name="theme-color" content="#050914" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/assets/estilo.css" />

<!-- Firebase compat SDK (misma versión que lado.html / admin.html) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Módulos Puntazo -->
<script src="/assets/firebase-core.js"></script>
<script src="/assets/auth.js"></script>
<script src="/assets/matches.js"></script>
<script src="/assets/match-expiration.js"></script>
<!-- F122: aviso "tu puntazo ya está listo" cuando uno o más pulsos del
     user pasan de pending a ready desde la última visita. -->
<script src="/assets/pending-pulse-watcher.js"></script>
<script src="/assets/match-confirm-watcher.js"></script>
<script src="/assets/clubs-catalog.js"></script>
<script src="/assets/court-svg.js"></script>

<style>
  /* Etapa 16.4 F30: fondo con el ícono hex de la cancha (solo en vista ready) */
  .entrada-court-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-position: center;
    background-size: cover;
    opacity: 0;
    transition: opacity 0.45s ease;
    filter: blur(16px) saturate(1.05);
    transform: scale(1.08);
  }
  .entrada-court-bg.is-active { opacity: 0.72; }
  .entrada-court-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(2,6,16,0.62) 0%, rgba(2,6,16,0.32) 35%, rgba(2,6,16,0.32) 65%, rgba(2,6,16,0.82) 100%);
  }

  .entrada-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 80px 20px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .entrada-topbar { z-index: 3; }

  /* Etapa 16.4 F47: header replica del FS marcador (logo izq + venue centro + ✕ der) */
  .entrada-fs-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    padding: 18px 16px 16px;
    margin-bottom: 28px;
    background: rgba(8, 14, 28, 0.62);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-bottom: 1px solid rgba(11, 124, 255, 0.32);
    border-radius: 18px;
    backdrop-filter: blur(16px);
    box-shadow: 0 10px 32px rgba(0, 0, 0, 0.42);
  }
  .entrada-fs-brand {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }
  .entrada-fs-logo {
    height: 38px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
  }
  .entrada-fs-header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
    text-align: center;
  }
  .entrada-fs-title {
    font-size: 0.62rem;
    font-weight: 800;
    color: rgba(11, 124, 255, 0.95);
    letter-spacing: 1.8px;
    line-height: 1;
  }
  .entrada-fs-venue {
    font-size: 1.15rem;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .entrada-fs-sub {
    font-size: 0.80rem;
    font-weight: 700;
    color: rgba(207, 226, 255, 0.85);
    line-height: 1;
  }
  .entrada-fs-back {
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 1.10rem;
    font-weight: 700;
    cursor: pointer;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.14s ease, transform 0.10s ease;
    flex-shrink: 0;
  }
  .entrada-fs-back:hover { background: rgba(255, 255, 255, 0.16); }
  .entrada-fs-back:active { transform: scale(0.94); }
  .entrada-logo {
    /* El PNG real es horizontal (~1.82:1). Dejamos que el aspect ratio
       mande: damos un ancho objetivo y altura auto, con tope de alto
       para que no se vuelva enorme en pantallas chicas. */
    width: 220px;
    max-width: 75%;
    height: auto;
    max-height: 110px;
    margin: 0 auto 18px;
    display: block;
    object-fit: contain;
  }
  @media (max-width: 480px) {
    .entrada-logo { width: 200px; max-height: 96px; }
  }

  .entrada-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: linear-gradient(180deg, rgba(2,6,16,0.85), rgba(2,6,16,0));
    pointer-events: none;
  }
  .entrada-topbar a, .entrada-topbar button {
    pointer-events: auto;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(207,226,255,.75);
    text-decoration: none;
    background: rgba(11,80,200,0.18);
    border: 1px solid rgba(11,124,255,.25);
    border-radius: 999px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all .14s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1;
  }
  .entrada-topbar a:hover, .entrada-topbar button:hover {
    color: #fff;
    background: rgba(11,124,255,0.32);
    border-color: rgba(11,124,255,.55);
  }
  .entrada-topbar .tb-right {
    display: flex;
    gap: 8px;
  }

  /* F42: jerarquía: "ESTÁS EN" pill chico + nombre HUGE + cancha medio */
  .entrada-title {
    display: inline-block;
    font-size: 0.70rem;
    font-weight: 800;
    color: rgba(11, 124, 255, 0.92);
    letter-spacing: 2.0px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(11, 124, 255, 0.12);
    border: 1px solid rgba(11, 124, 255, 0.35);
  }

  .entrada-loc-name {
    font-size: 2.30rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.8px;
    line-height: 1.05;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
  }

  .entrada-sub {
    font-size: 1.05rem;
    font-weight: 700;
    color: rgba(234, 242, 255, 0.78);
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* (2026-06-13) Link sutil "Cambiar cancha" en la pantalla de opciones. */
  .entrada-change-court {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: rgba(234, 242, 255, 0.80);
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: all .15s ease;
  }
  .entrada-change-court:hover {
    background: rgba(11, 124, 255, 0.16);
    border-color: rgba(11, 124, 255, 0.45);
    color: #fff;
  }

  .entrada-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 22px;
  }

  .btn-primary {
    width: 100%;
    min-height: 56px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 1.05rem;
    color: #fff;
    background: linear-gradient(135deg, var(--blue2), var(--blue));
    border: 1px solid rgba(11, 124, 255, 0.55);
    box-shadow: 0 0 22px rgba(0, 79, 200, 0.30), 0 8px 22px rgba(0, 0, 0, 0.30);
    transition: all .2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(11,124,255,.40), 0 10px 26px rgba(0,0,0,.34); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary[disabled] { opacity: .65; cursor: wait; transform: none; }

  /* R7c — Pickleball: "GRABAR PARTIDO COMPLETO" como acción PRINCIPAL en la
     pantalla de la cancha. Rojo + letra blanca gruesa + punto pulsante. Mismo
     lenguaje visual que el hero de mi-partido.html (acceso directo al flujo
     que ya muestra ahí el botón rojo). Solo se muestra en canchas de pickleball. */
  .btn-rec-full {
    width: 100%;
    min-height: 64px;
    border: 1px solid rgba(255, 90, 80, 0.6);
    border-radius: 18px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 1.12rem;
    letter-spacing: 0.4px;
    color: #fff;
    background: linear-gradient(135deg, #ff3b30, #cf1b12);
    box-shadow: 0 0 26px rgba(255, 59, 48, 0.34), 0 10px 26px rgba(0, 0, 0, 0.32);
    transition: all .18s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    text-align: center;
    text-transform: uppercase;
  }
  .btn-rec-full:hover { transform: translateY(-1px); box-shadow: 0 0 34px rgba(255,59,48,.46), 0 12px 30px rgba(0,0,0,.36); }
  .btn-rec-full:active { transform: scale(0.98); }
  .btn-rec-full[disabled] { opacity: .65; cursor: wait; transform: none; }
  .btn-rec-full .rec-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    animation: recPulse 1.4s infinite;
  }
  @keyframes recPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.65); }
    70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

  .btn-google {
    width: 100%;
    min-height: 52px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    font-size: 0.98rem;
    color: #09111f;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, .30);
    transition: transform .18s ease, box-shadow .18s ease;
  }

  .btn-google:hover { transform: translateY(-1px); box-shadow: 0 14px 32px rgba(0,0,0,.36); }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-secondary {
    width: 100%;
    min-height: 48px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 999px;
    color: rgba(234, 242, 255, 0.80);
    font-family: inherit;
    font-weight: 700;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all .18s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.10);
    border-color: rgba(255, 255, 255, 0.22);
    color: #fff;
  }

  /* F119: link sutil a /herramientas con loc+can. Estilo muy bajo perfil
     para no competir con los CTAs primarios. */
  .entrada-tools-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-decoration: none;
    padding: 10px 12px 6px;
    margin-top: 4px;
    border-radius: 12px;
    transition: background .15s;
  }
  .entrada-tools-link span {
    font-size: 0.74rem;
    color: rgba(234, 242, 255, 0.46);
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
  }
  .entrada-tools-link strong {
    font-size: 0.82rem;
    color: #6fb2ff;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .entrada-tools-link:hover {
    background: rgba(11, 124, 255, 0.06);
  }
  .entrada-tools-link:hover strong {
    color: #9fcfff;
  }

  .entrada-footer {
    margin-top: 26px;
    text-align: center;
    font-size: 0.82rem;
    color: rgba(234, 242, 255, 0.50);
  }

  .entrada-footer .session-email { color: rgba(234, 242, 255, 0.78); font-weight: 700; }
  .entrada-footer a {
    color: rgba(11, 124, 255, 0.85);
    text-decoration: none;
    font-weight: 700;
    margin-left: 4px;
    cursor: pointer;
  }
  .entrada-footer a:hover { color: var(--blue3); text-decoration: underline; }

  .entrada-msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }
  .entrada-msg.is-visible { display: block; }
  .entrada-msg.error {
    background: rgba(255, 80, 80, .10);
    border: 1px solid rgba(255, 80, 80, .25);
    color: #ffd5d5;
  }
  .entrada-msg.info {
    background: rgba(11, 124, 255, .10);
    border: 1px solid rgba(11, 124, 255, .25);
    color: #cfe2ff;
  }

  .entrada-error-card {
    text-align: center;
    padding: 30px 20px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 80, 80, 0.18);
  }
  .entrada-error-card .icon { font-size: 38px; margin-bottom: 12px; }
  .entrada-error-card h2 { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .entrada-error-card p { color: rgba(234, 242, 255, .65); margin-bottom: 18px; font-size: 0.92rem; }

  .entrada-loading {
    text-align: center;
    color: rgba(234, 242, 255, 0.55);
    font-size: 0.95rem;
    padding: 30px 0;
  }

  /* ── Selector visual (QR genérico / sin params) ── */
  .selector-wrap { display: block; }
  .selector-header {
    text-align: center;
    margin-bottom: 22px;
  }
  .selector-title {
    font-size: 1.45rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.4px;
    line-height: 1.2;
  }
  .selector-sub {
    font-size: 0.92rem;
    color: rgba(234, 242, 255, 0.62);
    margin-top: 6px;
  }
  .selector-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    padding: 6px 12px 6px 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.10);
    color: rgba(234, 242, 255, 0.78);
    font-size: 0.84rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all .18s ease;
  }
  .selector-back:hover {
    background: rgba(255, 255, 255, 0.10);
    color: #fff;
  }

  .selector-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 360px) {
    .selector-grid { grid-template-columns: 1fr; }
  }
  .selector-grid.one-col { grid-template-columns: 1fr; }

  .sel-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all .18s ease;
    color: #fff;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 110px;
  }
  .sel-card:hover {
    border-color: rgba(11, 124, 255, 0.55);
    background: rgba(0, 79, 200, 0.10);
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(0, 79, 200, 0.18);
  }
  .sel-card:active { transform: scale(0.98); }
  .sel-card .emoji {
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 8px;
  }
  /* Etapa 16.4 F4 — logo real de club (mismo footprint visual que .emoji) */
  .sel-card .logo {
    width: auto;
    height: 48px;
    max-width: 90%;
    object-fit: contain;
    margin: 0 auto 8px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
  }
  /* F143: BreakPoint es un logo cuadrado y detallado; a 48px se ve chico
     frente a los wordmark horizontales. Solo a él lo agrandamos. */
  .sel-card .logo--breakpoint {
    height: 84px;
    max-width: 100%;
  }
  /* Etapa 16.4 F4 — ícono hex neón por cancha (B1..B8 generados con AI) */
  .sel-card--cancha {
    padding: 12px 10px 14px;
  }
  .sel-card .court-icon {
    width: 96px;
    height: 96px;
    max-width: 100%;
    object-fit: contain;
    margin: 0 auto 6px;
    display: block;
    border-radius: 18px;
  }
  .sel-card .name {
    font-size: 1rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .sel-card .meta {
    font-size: 0.75rem;
    color: rgba(234, 242, 255, 0.55);
    margin-top: 4px;
    font-weight: 600;
  }
  .sel-card.is-disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }
  .sel-card.is-disabled:hover {
    border-color: rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.04);
    transform: none;
    box-shadow: none;
  }
  .sel-card .badge-soon {
    margin-top: 6px;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.66rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: rgba(250, 204, 21, 0.12);
    border: 1px solid rgba(250, 204, 21, 0.30);
    color: #fde047;
  }

  .selector-msg {
    margin-bottom: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.86rem;
    line-height: 1.45;
    background: rgba(250, 204, 21, .08);
    border: 1px solid rgba(250, 204, 21, .25);
    color: #fde68a;
  }

  .selector-empty {
    text-align: center;
    padding: 30px 16px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px dashed rgba(255, 255, 255, 0.14);
    color: rgba(234, 242, 255, 0.65);
    font-size: 0.92rem;
    line-height: 1.55;
  }

  @media (max-width: 480px) {
    .entrada-wrap { padding-top: 50px; }
    .entrada-loc-name { font-size: 1.85rem; }
    .selector-title { font-size: 1.3rem; }
    .entrada-header { padding: 22px 18px 20px; }
  }
</style>
</head>
<body>

<div class="page-bg"></div>

<!-- Etapa 16.4 F30: fondo dinámico con el ícono hex de la cancha cuando la
     vista ready (loc+can+lado resueltos) está activa. Lo controla el JS. -->
<div id="entradaCourtBg" class="entrada-court-bg" aria-hidden="true"></div>

<!-- Etapa 16.4 F49: header consistente con mi-partido (header.js variant internal) -->
<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="entrada-wrap">

  <div id="entradaLoading" class="entrada-loading">⏳ Cargando…</div>

  <!-- Selector visual (club → cancha → lado) -->
  <div id="entradaSelector" class="selector-wrap" style="display:none">
    <button id="selBack" class="selector-back" type="button" style="display:none">← Atrás</button>
    <div id="selMsg" class="selector-msg" style="display:none"></div>

    <div class="selector-header">
      <img class="entrada-logo" src="/assets/logo.png" alt="Puntazo" onerror="this.style.display='none'">
      <div id="selTitle" class="selector-title">Elige tu club</div>
      <div id="selSub" class="selector-sub">Para iniciar tu partido</div>
    </div>

    <div id="selGrid" class="selector-grid"></div>
  </div>

  <!-- Vista de entrada lista (con loc/can/lado ya resueltos) -->
  <div id="entradaContent" style="display:none">
    <!-- Etapa 16.4 F49: restaurado el CARD bonito que le gustó al usuario -->
    <div class="entrada-header">
      <img class="entrada-logo" src="/assets/logo.png" alt="Puntazo" onerror="this.style.display='none'">
      <div class="entrada-title">📍 Estás en</div>
      <div id="locName" class="entrada-loc-name">…</div>
      <div id="locSub" class="entrada-sub"></div>
      <!-- (2026-06-13) Link para cambiar de cancha desde la pantalla de
           opciones. Va a modo=canchas → al elegir cancha vuelve aquí mismo
           (a las 3 opciones) con la nueva cancha. -->
      <a id="lnkCambiarCancha" class="entrada-change-court" href="#">↺ Cambiar cancha</a>
    </div>

    <div id="actionsAuthed" class="entrada-actions" style="display:none">
      <!-- R7c — Pickleball: GRABAR PARTIDO COMPLETO como acción PRINCIPAL (rojo,
           1º). Solo visible en canchas de pickleball (lo controla el JS). Va al
           flujo de partido nuevo, que ya muestra el botón rojo del hero. -->
      <a id="lnkRecFullAuthed" class="btn-rec-full" href="#" style="display:none">
        <span class="rec-dot" aria-hidden="true"></span>
        Grabar partido completo
      </a>
      <!-- (2026-06-13) Jerarquía base (clubs no-pickle):
           1º Ir al botón (principal) · 2º Ver clips · 3º Configurar partido. -->
      <!-- PRINCIPAL en no-pickle / 2º en pickleball: ir al botón. -->
      <a id="lnkRegistrarAuthed" class="btn-primary" href="#" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;">
        <img src="/assets/img/puntazo_boton_redondo.webp" alt="" aria-hidden="true" style="width:30px;height:30px;flex-shrink:0;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 10px rgba(255,255,255,.45));">
        Ir al botón
      </a>
      <!-- 2º — Ver clips. -->
      <a id="lnkSoloClips" class="btn-secondary" href="#">🎬 Ver clips</a>
      <!-- 3º — Configurar partido (la menos prioritaria ahora). -->
      <button id="btnIniciar" class="btn-secondary" type="button">🎾 Configurar partido →</button>
      <!-- F119: link sutil a herramientas (sortear, marcador, torneo 5, etc).
           Pasa loc+can para que herramientas propague el contexto a los
           modos que lo entienden (Torneo 5 muestra botón Puntazo round). -->
      <a id="lnkHerramientas" class="entrada-tools-link" href="#">
        <span>¿Sortear parejas, llevar marcador o armar un torneo?</span>
        <strong>Ver herramientas →</strong>
      </a>
    </div>

    <div id="actionsGuest" class="entrada-actions" style="display:none">
      <!-- R7c — Pickleball: GRABAR PARTIDO COMPLETO también para invitados (1º).
           Al tocarlo pide login (popup Google) y continúa al flujo de partido. -->
      <a id="lnkRecFullGuest" class="btn-rec-full" href="#" style="display:none">
        <span class="rec-dot" aria-hidden="true"></span>
        Grabar partido completo
      </a>
      <!-- (2026-06-13) Misma jerarquía que el bloque authed:
           1º Ir al botón · 2º Ver clips · 3º Iniciar sesión. -->
      <!-- PRINCIPAL en no-pickle / 2º en pickleball: ir al botón. -->
      <a id="lnkRegistrarGuest" class="btn-primary" href="#" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;">
        <img src="/assets/img/puntazo_boton_redondo.webp" alt="" aria-hidden="true" style="width:30px;height:30px;flex-shrink:0;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 10px rgba(255,255,255,.45));">
        Ir al botón
      </a>
      <!-- 2º — Ver clips (como invitado). -->
      <a id="lnkInvitado" class="btn-secondary" href="#">🎬 Ver clips</a>
      <button id="btnLogin" class="btn-google" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.239 36 24 36c-6.627 0-12-5.373-12-12S17.373 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.272 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 19.003 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.272 4 24 4c-7.682 0-14.347 4.337-17.694 10.691z"/>
          <path fill="#4CAF50" d="M24 44c5.169 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.144 35.091 26.688 36 24 36c-5.218 0-9.62-3.329-11.283-7.946l-6.522 5.025C9.5 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.084 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        <span>Iniciar sesión / crear cuenta</span>
      </button>
    </div>

    <div id="entradaMsg" class="entrada-msg"></div>

    <div id="footerAuthed" class="entrada-footer" style="display:none">
      Sesión: <span id="sessionEmail" class="session-email"></span>
      · <a id="lnkSignOut" href="#">cerrar sesión</a>
    </div>
  </div>

</main>

<script>
(function () {
  "use strict";

  // ---------- helpers ----------
  function getQueryParams() {
    const params = {};
    window.location.search.substring(1).split("&").forEach(pair => {
      const [k, v] = pair.split("=");
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || "");
    });
    return params;
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- DOM refs ----------
  const $loading = document.getElementById("entradaLoading");
  const $selector = document.getElementById("entradaSelector");
  const $selBack = document.getElementById("selBack");
  const $selMsg = document.getElementById("selMsg");
  const $selTitle = document.getElementById("selTitle");
  const $selSub = document.getElementById("selSub");
  const $selGrid = document.getElementById("selGrid");

  const $content = document.getElementById("entradaContent");
  const $locName = document.getElementById("locName");
  const $locSub = document.getElementById("locSub");
  const $authed = document.getElementById("actionsAuthed");
  const $guest = document.getElementById("actionsGuest");
  const $btnIniciar = document.getElementById("btnIniciar");
  const $lnkSoloClips = document.getElementById("lnkSoloClips");
  const $lnkInvitado = document.getElementById("lnkInvitado");
  const $btnLogin = document.getElementById("btnLogin");
  const $msg = document.getElementById("entradaMsg");
  const $footerAuthed = document.getElementById("footerAuthed");
  const $sessionEmail = document.getElementById("sessionEmail");
  const $lnkSignOut = document.getElementById("lnkSignOut");

  function hideAll() {
    $loading.style.display = "none";
    $selector.style.display = "none";
    $content.style.display = "none";
  }
  function showSelector() { hideAll(); $selector.style.display = "block"; applyCourtBgEntrada(false); }
  function showContent()  { hideAll(); $content.style.display = "block"; applyCourtBgEntrada(true); }
  function showLoading()  { hideAll(); $loading.style.display = "block"; applyCourtBgEntrada(false); }

  // Etapa 16.4 F30: fondo dinámico con el ícono hex de la cancha. Activo solo
  // en la vista ready (cuando hay loc+can resueltos).
  function applyCourtBgEntrada(active) {
    const bg = document.getElementById("entradaCourtBg");
    if (!bg) return;
    if (!active || !can) { bg.classList.remove("is-active"); return; }
    // Íconos por club (pickleball usa arte propio; resto cae al global).
    if (window.PuntazoClubs && PuntazoClubs.applyCourtIcon) {
      PuntazoClubs.applyCourtIcon(bg, loc, can, "bg");
    } else {
      const m = String(can).match(/(\d+)/);
      let n = m ? parseInt(m[1], 10) : 1;
      if (!Number.isFinite(n) || n < 1) n = 1;
      const idx = ((n - 1) % 8) + 1;
      bg.style.backgroundImage = "url('/assets/court-icons/B" + idx + ".webp')";
    }
    bg.classList.add("is-active");
  }

  function showMsg(text, type) {
    $msg.textContent = text || "";
    $msg.className = "entrada-msg";
    if (text) {
      $msg.classList.add("is-visible");
      $msg.classList.add(type || "info");
    }
  }

  function setSelMsg(text) {
    if (!text) {
      $selMsg.style.display = "none";
      $selMsg.textContent = "";
    } else {
      $selMsg.textContent = text;
      $selMsg.style.display = "block";
    }
  }

  // ---------- query params ----------
  const params = getQueryParams();
  const loc = (params.loc || "").trim();
  const can = (params.can || "").trim();
  const lado = (params.lado || "").trim();
  const qrCode = (params.qr || "").trim();
  // R5: ?modo=boton → selector reusable que termina en /boton.html
  // (registrar puntazos sin crear partido).
  const modoBoton = (params.modo || "").trim().toLowerCase() === "boton";
  // F111-B: ?modo=clips → mismo selector visual pero termina en /lado.html
  // (ver clips ya capturados, sin crear partido ni botón).
  const modoClips = (params.modo || "").trim().toLowerCase() === "clips";
  // F135 (Fix 4): ?modo=canchas&loc=X → selector que ARRANCA en el paso de
  // canchas del club X (para "cambiar cancha" desde lado.html). Termina en
  // /lado.html igual que modoClips.
  const modoCanchas = (params.modo || "").trim().toLowerCase() === "canchas";

  // Si el QR físico viejo apunta sin un lado pero con loc/can, tratamos como
  // selector parcial. Más limpio para el caso real: si vienen los 3 → flow viejo.
  // En modo boton/clips/canchas ignoramos hasFullParams (siempre pasa por el selector).
  const hasFullParams = !modoBoton && !modoClips && !modoCanchas && loc && can && lado;

  // ---------- SELECTOR FLOW ----------
  //
  // Estados del selector:
  //   "clubs"   → lista de todos los clubs activos
  //   "canchas" → lista de canchas del club elegido
  //   "lados"   → lista de lados de la cancha elegida
  //
  // Cuando el usuario elige un lado, redirigimos a entrada.html?loc=X&can=Y&lado=Z
  // para mantener una URL canónica (sirve si refresca la página o comparte).

  const selectorState = {
    step: "clubs",
    catalog: null,         // { clubs: [...] }
    selectedClub: null,    // club object
    selectedCancha: null   // cancha object
  };

  async function loadCatalogSafe() {
    if (selectorState.catalog) return selectorState.catalog;
    if (!window.PuntazoClubs || typeof window.PuntazoClubs.getCatalog !== "function") {
      console.error("[entrada] PuntazoClubs no disponible");
      selectorState.catalog = { clubs: [] };
      return selectorState.catalog;
    }
    try {
      selectorState.catalog = await window.PuntazoClubs.getCatalog();
    } catch (e) {
      console.error("[entrada] error cargando catálogo", e);
      selectorState.catalog = { clubs: [] };
    }
    return selectorState.catalog;
  }

  function renderSelector() {
    showSelector();
    $selGrid.innerHTML = "";
    $selGrid.classList.remove("one-col");

    if (selectorState.step === "clubs") {
      $selBack.style.display = "none";
      // Copy distinto según modo
      if (modoBoton) {
        $selTitle.textContent = "Elige tu club";
        $selSub.textContent = "Para registrar puntazos sin crear partido";
      } else if (modoClips) {
        $selTitle.textContent = "¿Dónde están tus clips?";
        $selSub.textContent = "Elige el club donde jugaste";
      } else {
        $selTitle.textContent = "Elige tu club";
        $selSub.textContent = "Toca el club donde estás jugando";
      }

      const clubs = (selectorState.catalog && selectorState.catalog.clubs) || [];
      if (clubs.length === 0) {
        $selGrid.classList.add("one-col");
        const empty = document.createElement("div");
        empty.className = "selector-empty";
        empty.innerHTML = "Todavía no hay clubs configurados.<br>Contacta a Puntazo.";
        $selGrid.appendChild(empty);
        return;
      }

      clubs.forEach(club => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sel-card";
        if (club.status === "soon") card.classList.add("is-disabled");
        // Etapa 16.4 F4: logo real si está disponible, fallback al emoji
        // F143: clase por-club (ej. logo--breakpoint) para poder ajustar el
        // tamaño de un logo específico sin afectar a los demás.
        const _logoCls = 'logo logo--' + String(club.id || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        const visual = club.logoUrl
          ? '<img class="' + _logoCls + '" src="' + escapeHtml(club.logoUrl) + '" alt="' + escapeHtml(club.nombre) + '" onerror="this.outerHTML=\'<div class=&quot;emoji&quot;>' + escapeHtml(club.emoji || "🎾") + '</div>\'">'
          : '<div class="emoji">' + escapeHtml(club.emoji || "🎾") + '</div>';
        const inner = [
          visual,
          '<div class="name">' + escapeHtml(club.nombre) + '</div>'
        ];
        if (club.status === "soon") {
          inner.push('<div class="badge-soon">Próximamente</div>');
        } else {
          const numCan = (club.canchas || []).length;
          inner.push('<div class="meta">' + numCan + ' cancha' + (numCan === 1 ? '' : 's') + '</div>');
        }
        card.innerHTML = inner.join("");
        if (club.status !== "soon") {
          card.addEventListener("click", async function () {
            // Gate de club (ej. Scorpion): pide contraseña antes de entrar.
            if (!(await pzClubGate(club.id))) return;
            selectorState.selectedClub = club;
            selectorState.step = "canchas";
            setSelMsg("");
            renderSelector();
          });
        }
        $selGrid.appendChild(card);
      });

      // F135 (Fix 6): se QUITÓ "Solo registrar puntazos" de esta 1ª pantalla
      // (se prestaba a que alguien fuera del club registrara). Ahora vive en el
      // ready flow, tras elegir club+cancha (#actionsAuthed / #actionsGuest).
      // Orden de las extras restantes (pedido por Isaac):
      //   1) "¿Sin Puntazo en tu cancha?" → ARRIBA (modos juego standalone).
      //   2) "¿Se te escapó un puntazo?" → abajo (con 🔍 en lugar de flecha).
      if (!modoBoton) {
        const extras = document.createElement("div");
        extras.style.cssText = "grid-column: 1 / -1; display:flex; flex-direction:column; gap:8px; margin-top:8px;";
        extras.innerHTML =
          // ① ¿Sin Puntazo en tu cancha? — arriba, card destacada morada
          '<a href="/herramientas.html" class="sel-card" style="text-decoration:none; min-height:auto; padding:14px 16px; flex-direction:row; align-items:center; justify-content:space-between; gap:12px; border-color:rgba(180,120,255,.32); background:linear-gradient(180deg, rgba(180,120,255,.10), rgba(11,124,255,.04));">' +
            '<span style="display:flex; flex-direction:column; align-items:flex-start; text-align:left; gap:2px; flex:1; min-width:0;">' +
              '<span class="name" style="font-size:.92rem;">¿Sin Puntazo en tu cancha?</span>' +
              '<span class="meta" style="margin-top:0;">Prueba los modos de juego — Torneo, Americano, King, Marcador libre…</span>' +
            '</span>' +
            '<span style="font-size:1.45rem; opacity:.9; line-height:1;">🎲</span>' +
          '</a>' +
          // ② ¿Se te escapó un puntazo? — abajo con 🔍 (buscar)
          '<a href="/recuperar.html" class="sel-card" style="text-decoration:none; min-height:auto; padding:14px 16px; flex-direction:row; align-items:center; justify-content:space-between; gap:12px;">' +
            '<span style="display:flex; flex-direction:column; align-items:flex-start; text-align:left; gap:2px; flex:1; min-width:0;">' +
              '<span class="name" style="font-size:.92rem;">¿Se te escapó un puntazo?</span>' +
              '<span class="meta" style="margin-top:0;">Recupéralo de las últimas 24h</span>' +
            '</span>' +
            '<span style="font-size:1.45rem; opacity:.9; line-height:1;">🔍</span>' +
          '</a>';
        $selGrid.appendChild(extras);
      }
      return;
    }

    if (selectorState.step === "canchas") {
      const club = selectorState.selectedClub;
      $selBack.style.display = "inline-flex";
      $selTitle.textContent = club.nombre;
      $selSub.textContent = "Elige tu cancha";

      const canchas = club.canchas || [];
      if (canchas.length === 0) {
        $selGrid.classList.add("one-col");
        const empty = document.createElement("div");
        empty.className = "selector-empty";
        empty.innerHTML = "Este club todavía no tiene canchas configuradas.";
        $selGrid.appendChild(empty);
        return;
      }

      canchas.forEach((cancha, canchaIdx) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sel-card sel-card--cancha";
        // F76 fix: el ícono hex se elige por el NÚMERO REAL de la cancha
        // (extraído de cancha.id, ej. "Cancha4" → 4 → B4.png), NO por su
        // índice en el array. Antes Interpadel mostraba B1 en Cancha 3
        // porque idx=0 ⇒ B1. Ahora cada cancha muestra su número real.
        const canMatch = String(cancha.id || "").match(/(\d+)/);
        const canNum = canMatch ? parseInt(canMatch[1], 10) : (canchaIdx + 1);
        const iconNum = (((canNum - 1) % 8) + 8) % 8 + 1; // [1..8] safe
        // Default = ícono global (mantiene el fallback a emoji vía onerror);
        // si el club tiene arte propio (pickleball), se hace upgrade abajo.
        const _icons = (window.PuntazoClubs && PuntazoClubs.courtIconUrls)
          ? PuntazoClubs.courtIconUrls(club && club.id, cancha.id)
          : { clubUrl: "/assets/court-icons/B" + iconNum + ".webp", globalUrl: "/assets/court-icons/B" + iconNum + ".webp" };
        const iconSrc = _icons.globalUrl;
        card.innerHTML =
          '<img class="court-icon" src="' + iconSrc + '" alt="' + escapeHtml(cancha.nombre) + '" onerror="this.outerHTML=\'<div class=&quot;emoji&quot;>🎾</div>\'">' +
          '<div class="name">' + escapeHtml(cancha.nombre) + '</div>';
        if (_icons.clubUrl !== _icons.globalUrl) {
          const _imgEl = card.querySelector("img.court-icon");
          if (_imgEl) {
            const _probe = new Image();
            _probe.onload = function () { _imgEl.src = _icons.clubUrl; };
            _probe.src = _icons.clubUrl;
          }
        }
        card.addEventListener("click", function () {
          selectorState.selectedCancha = cancha;
          // Siempre elegimos el primer lado automáticamente (el concepto "lado" es
          // interno; el usuario nunca lo ve). Si la cancha no tuviera lados (caso
          // raro), caemos a un objeto mínimo con id LadoA como fallback.
          const ld = (cancha.lados && cancha.lados[0]) || { id: "LadoA", nombre: "" };
          commitSelection(club, cancha, ld);
        });
        $selGrid.appendChild(card);
      });
      return;
    }

    if (selectorState.step === "lados") {
      const club = selectorState.selectedClub;
      const cancha = selectorState.selectedCancha;
      $selBack.style.display = "inline-flex";
      $selTitle.textContent = club.nombre + " · " + cancha.nombre;
      $selSub.textContent = "Elige el lado de la cancha";

      const lados = cancha.lados || [];
      if (lados.length === 0) {
        $selGrid.classList.add("one-col");
        const empty = document.createElement("div");
        empty.className = "selector-empty";
        empty.innerHTML = "Esta cancha todavía no tiene lados configurados.";
        $selGrid.appendChild(empty);
        return;
      }

      lados.forEach(ld => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sel-card";
        card.innerHTML =
          '<div class="emoji">🎯</div>' +
          '<div class="name">' + escapeHtml(ld.nombre) + '</div>';
        card.addEventListener("click", function () {
          commitSelection(club, cancha, ld);
        });
        $selGrid.appendChild(card);
      });
      return;
    }
  }

  function commitSelection(club, cancha, ld) {
    // R5: en modoBoton, saltamos el flow de partido y vamos directo a
    // /boton.html (que ya acepta ?loc=&can= para auto-entrar al view del botón).
    if (modoBoton) {
      const qs = "?loc=" + encodeURIComponent(club.id) +
                 "&can=" + encodeURIComponent(cancha.id);
      window.location.href = "/boton.html" + qs;
      return;
    }
    // (2026-06-13) modoCanchas = "cambiar cancha" (← Regresar / breadcrumbs de
    // lado.html, "Cambiar cancha" de boton.html). ANTES caía directo a
    // /lado.html (clips) y el usuario quedaba atrapado: nunca volvía a la
    // pantalla con las 3 opciones. Ahora aterriza en la vista READY de entrada
    // (Ir al botón / Ver clips / Configurar partido) para la cancha elegida.
    if (modoCanchas) {
      const qs = "?loc=" + encodeURIComponent(club.id) +
                 "&can=" + encodeURIComponent(cancha.id) +
                 "&lado=" + encodeURIComponent(ld.id);
      window.location.href = "/entrada.html" + qs;
      return;
    }
    // F111-B: modoClips → directo a /lado.html (atajo "solo ver clips" / QR /
    // redirects legacy de cancha/explorar/locacion). El primer lado de la
    // cancha es el default (internamente todas tienen 1 lado salvo Scorpion).
    if (modoClips) {
      const qs = "?loc=" + encodeURIComponent(club.id) +
                 "&can=" + encodeURIComponent(cancha.id) +
                 "&lado=" + encodeURIComponent(ld.id) +
                 "&pg=0";
      window.location.href = "/lado.html" + qs;
      return;
    }
    // Flow normal: URL canónica para entrada.html.
    const qs = "?loc=" + encodeURIComponent(club.id) +
               "&can=" + encodeURIComponent(cancha.id) +
               "&lado=" + encodeURIComponent(ld.id);
    window.location.href = "/entrada.html" + qs;
  }

  $selBack.addEventListener("click", function () {
    if (selectorState.step === "lados") {
      selectorState.step = "canchas";
      renderSelector();
      return;
    }
    if (selectorState.step === "canchas") {
      // Si vinimos de un QR de club, no podemos volver al selector de clubs;
      // mejor mostramos otra vez el de canchas pero permitimos elegir club si
      // el usuario no llegó vía QR.
      if (qrCode) {
        // Limpiamos qr y vamos a selector de clubs completo
        selectorState.selectedClub = null;
        selectorState.step = "clubs";
        // Actualizamos URL sin recargar (quitamos ?qr=…) para coherencia
        try { window.history.replaceState({}, "", "/entrada.html"); } catch (e) {}
        renderSelector();
        return;
      }
      selectorState.selectedClub = null;
      selectorState.step = "clubs";
      renderSelector();
      return;
    }
  });

  // ---------- READY FLOW (loc+can+lado en URL) ----------
  async function resolveNames() {
    let locNombre = loc, canNombre = can, ladoNombre = lado;
    try {
      const cat = await loadCatalogSafe();
      const L = (cat.clubs || []).find(x => x.id === loc);
      if (L) {
        locNombre = L.nombre || loc;
        const C = (L.canchas || []).find(x => x.id === can);
        if (C) {
          canNombre = C.nombre || can;
          const Ld = (C.lados || []).find(x => x.id === lado);
          if (Ld) ladoNombre = Ld.nombre || lado;
        }
      }
    } catch (e) {
      console.warn("[entrada] No se pudieron resolver nombres legibles:", e);
    }
    $locName.textContent = locNombre;
    $locSub.textContent = canNombre;
  }

  function renderForUser(user) {
    showContent();
    if (user) {
      $authed.style.display = "flex";
      $guest.style.display = "none";
      $footerAuthed.style.display = "block";
      $sessionEmail.textContent = user.email || "(sin email)";
    } else {
      $authed.style.display = "none";
      $guest.style.display = "flex";
      $footerAuthed.style.display = "none";
    }
  }

  // ---------- handlers de la vista ready ----------

  // R7c — Botón rojo "GRABAR PARTIDO COMPLETO" (pickleball). Maneja también el
  // caso INVITADO: si no hay sesión, pide login (popup Google, no recarga) y
  // continúa. Reusa el guard de "ya tienes un partido activo" (F105 Issue 8).
  // El botón rojo va a mi-partido.html?nueva=1, que ya detecta pickleball y
  // muestra el hero rojo + la grabación marcada por defecto.
  const $recAuthed = document.getElementById("lnkRecFullAuthed");
  const $recGuest = document.getElementById("lnkRecFullGuest");

  async function handleStartMatchClick(btn) {
    let user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
    if (!user) {
      if (!window.PuntazoAuth || typeof window.PuntazoAuth.signIn !== "function") {
        showMsg("Módulo de auth no disponible.", "error");
        return;
      }
      if (btn) btn.disabled = true;
      showMsg("Iniciando sesión…", "info");
      try {
        const res = await window.PuntazoAuth.signIn();
        user = (res && res.user) || (window.PuntazoAuth && window.PuntazoAuth.currentUser);
      } catch (e) {
        console.warn("[entrada] signIn falló:", e && e.code ? e.code : e);
      }
      if (btn) btn.disabled = false;
      if (!user) { showMsg("Necesitas iniciar sesión para crear el partido.", "error"); return; }
      showMsg("", "info");
    }

    if (btn) btn.disabled = true;
    // F105 Issue 8: bloquear 2do partido activo del mismo usuario.
    try {
      const D = window.PuntazoFirebase && window.PuntazoFirebase.db && window.PuntazoFirebase.db();
      if (D) {
        const snap = await D.collection("matches")
          .where("userId", "==", user.uid)
          .where("status", "==", "active")
          .orderBy("startedAt", "desc")
          .limit(1).get();
        if (!snap.empty) {
          const activeDoc = snap.docs[0];
          const ok = window.confirm(
            "Ya tienes un partido activo. ¿Qué quieres hacer?\n\n" +
            "OK = Volver a tu partido activo\n" +
            "Cancelar = Quedarme aquí (termina el otro antes de crear uno nuevo)"
          );
          if (btn) btn.disabled = false;
          if (ok) window.location.href = "/mi-partido.html?matchId=" + encodeURIComponent(activeDoc.id);
          return;
        }
      }
    } catch (e) {
      console.warn("[entrada] check active falló (no bloqueo):", e && e.code ? e.code : e);
    }
    const qs = "?nueva=1&loc=" + encodeURIComponent(loc) +
               "&can=" + encodeURIComponent(can) +
               "&lado=" + encodeURIComponent(lado);
    window.location.href = "/mi-partido.html" + qs;
  }

  if ($recAuthed) $recAuthed.addEventListener("click", function (e) { e.preventDefault(); handleStartMatchClick($recAuthed); });
  if ($recGuest) $recGuest.addEventListener("click", function (e) { e.preventDefault(); handleStartMatchClick($recGuest); });

  $btnIniciar.addEventListener("click", async function () {
    const user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
    if (!user) {
      showMsg("Necesitas iniciar sesión primero.", "error");
      return;
    }
    $btnIniciar.disabled = true;
    $btnIniciar.textContent = "Verificando…";
    showMsg("", "info");

    // F105 Issue 8: bloquear 2do partido activo. Si ya hay uno active del
    // user, pedir confirmación antes de crear otro o llevarlo de vuelta.
    try {
      const D = window.PuntazoFirebase && window.PuntazoFirebase.db && window.PuntazoFirebase.db();
      if (D) {
        const snap = await D.collection("matches")
          .where("userId", "==", user.uid)
          .where("status", "==", "active")
          .orderBy("startedAt", "desc")
          .limit(1).get();
        if (!snap.empty) {
          const activeDoc = snap.docs[0];
          const ok = window.confirm(
            "Ya tienes un partido activo. ¿Qué quieres hacer?\n\n" +
            "OK = Volver a tu partido activo\n" +
            "Cancelar = Quedarme aquí (termina el otro antes de crear uno nuevo)"
          );
          $btnIniciar.disabled = false;
          $btnIniciar.textContent = "🎾 Configurar partido →";
          if (ok) {
            window.location.href = "/mi-partido.html?matchId=" + encodeURIComponent(activeDoc.id);
          }
          return;
        }
      }
    } catch (e) {
      console.warn("[entrada] check active fallo (no bloqueo):", e && e.code ? e.code : e);
      // Si la query falla por índice, seguimos al flow normal — no bloqueamos.
    }

    $btnIniciar.textContent = "Abriendo…";
    const qs = "?nueva=1&loc=" + encodeURIComponent(loc) +
               "&can=" + encodeURIComponent(can) +
               "&lado=" + encodeURIComponent(lado);
    window.location.href = "/mi-partido.html" + qs;
  });

  $btnLogin.addEventListener("click", async function () {
    if (!window.PuntazoAuth || typeof window.PuntazoAuth.signIn !== "function") {
      showMsg("Módulo de auth no disponible.", "error");
      return;
    }
    try {
      await window.PuntazoAuth.signIn();
    } catch (e) {
      console.error("[entrada] signIn failed", e);
      showMsg("No se pudo iniciar sesión.", "error");
    }
  });

  $lnkSignOut.addEventListener("click", async function (e) {
    e.preventDefault();
    if (!window.PuntazoAuth || typeof window.PuntazoAuth.signOut !== "function") return;
    try {
      await window.PuntazoAuth.signOut();
    } catch (err) {
      console.error("[entrada] signOut failed", err);
    }
  });

  // ---------- ROUTER ----------
  async function startReadyFlow() {
    // Flujo viejo intacto: loc+can+lado en URL
    const ladoQuery = "?loc=" + encodeURIComponent(loc) +
                      "&can=" + encodeURIComponent(can) +
                      "&lado=" + encodeURIComponent(lado);
    $lnkSoloClips.href = "/lado.html" + ladoQuery;
    $lnkInvitado.href = "/lado.html" + ladoQuery;

    // F135 (Fix 6): registrar puntazos directo (ya hay loc+can) → /boton.html.
    const botonQuery = "?loc=" + encodeURIComponent(loc) + "&can=" + encodeURIComponent(can);
    const $lnkRegA = document.getElementById("lnkRegistrarAuthed");
    const $lnkRegG = document.getElementById("lnkRegistrarGuest");
    if ($lnkRegA) $lnkRegA.href = "/boton.html" + botonQuery;
    if ($lnkRegG) $lnkRegG.href = "/boton.html" + botonQuery;

    // F119: link a herramientas con loc+can (sin lado — herramientas no
    // necesita lado, solo el contexto de club/cancha para que el botón
    // Puntazo round funcione en Torneo 5 / tablero).
    const $lnkHerramientas = document.getElementById("lnkHerramientas");
    if ($lnkHerramientas) {
      $lnkHerramientas.href = "/herramientas.html?loc=" + encodeURIComponent(loc) +
                              "&can=" + encodeURIComponent(can);
    }

    // (2026-06-13) "Cambiar cancha" → selector de canchas del club actual.
    // modo=canchas regresa a ESTA pantalla de opciones con la nueva cancha.
    const $lnkCambiarCancha = document.getElementById("lnkCambiarCancha");
    if ($lnkCambiarCancha) {
      $lnkCambiarCancha.href = "/entrada.html?modo=canchas&loc=" + encodeURIComponent(loc);
    }

    // R7c — Canchas de pickleball: surge el botón rojo "GRABAR PARTIDO COMPLETO"
    // como acción PRINCIPAL (arriba) y se oculta el "🎾 Configurar partido →"
    // (redundante: el botón rojo lleva al mismo flujo nueva, que ya muestra el
    // hero). El deporte sale del catálogo (fuente de verdad), no se hardcodea.
    const _isPickle = !!(window.PuntazoClubs && PuntazoClubs.sportForLoc &&
                         PuntazoClubs.sportForLoc(loc) === "pickleball");
    if (_isPickle) {
      if ($recAuthed) $recAuthed.style.display = "inline-flex";
      if ($recGuest) $recGuest.style.display = "inline-flex";
      if ($btnIniciar) $btnIniciar.style.display = "none";
    }

    // Etapa 16.4 F44: mostrar el contenedor INMEDIATAMENTE (header + bg cancha)
    // sin esperar a auth. Antes el header solo se renderizaba después del
    // evento puntazo:auth-ready, que podía tardar 3s+ — el usuario veía
    // "⏳ Cargando…" sin header nuevo. Ahora el header aparece desde el frame 1.
    showContent();
    $authed.style.display = "none";
    $guest.style.display = "none";

    // Resolver nombres en paralelo (popula locName/locSub del header)
    resolveNames();

    let authReady = false;
    function handleAuthState() {
      const user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
      renderForUser(user || null);
    }

    window.addEventListener("puntazo:auth-ready", function () {
      authReady = true;
      handleAuthState();
    });
    window.addEventListener("puntazo:auth-changed", function () {
      if (authReady) handleAuthState();
    });

    // Etapa 16.4 F44: fallback más rápido — 800ms (era 3100ms). El header ya
    // está visible desde el frame 1, este solo controla la visibilidad de
    // las acciones (Iniciar partido vs Invitado).
    setTimeout(function () {
      if (!authReady) {
        authReady = true;
        handleAuthState();
      }
    }, 800);
  }

  async function startSelectorFlow(opts) {
    opts = opts || {};
    await loadCatalogSafe();

    // F135 (Fix 4): ?modo=canchas&loc=X → arrancar directo en el paso de
    // canchas del club X (preseleccionado). Si el club no existe en el
    // catálogo, caemos al selector de clubs normal.
    if (opts.directLoc) {
      const cat = selectorState.catalog || { clubs: [] };
      const club = cat.clubs.find(c => c.id === opts.directLoc);
      if (club && club.status !== "soon") {
        selectorState.selectedClub = club;
        selectorState.step = "canchas";
        renderSelector();
        return;
      }
      // Club no disponible → selector de clubs completo
      selectorState.step = "clubs";
      renderSelector();
      return;
    }

    // ¿Vino con ?qr=CODE?
    if (opts.qrCode) {
      const resolved = window.PuntazoClubs && window.PuntazoClubs.resolveQrCode
        ? window.PuntazoClubs.resolveQrCode(opts.qrCode)
        : null;

      if (resolved) {
        // Buscar el club en el catálogo
        const cat = selectorState.catalog || { clubs: [] };
        const club = cat.clubs.find(c => c.id === resolved.locId);
        if (club && club.status !== "soon") {
          selectorState.selectedClub = club;
          selectorState.step = "canchas";
          renderSelector();
          return;
        }
        if (club && club.status === "soon") {
          setSelMsg("Este club aún no está activo. Elige otro o contacta a Puntazo.");
          selectorState.step = "clubs";
          renderSelector();
          return;
        }
        // QR válido pero club no está en catálogo cargado
        setSelMsg("Club del QR no disponible. Selecciona manualmente.");
        selectorState.step = "clubs";
        renderSelector();
        return;
      }
      // QR no reconocido
      setSelMsg("QR no reconocido, selecciona manualmente.");
      selectorState.step = "clubs";
      renderSelector();
      return;
    }

    // Sin params → selector completo
    selectorState.step = "clubs";
    renderSelector();
  }

  // (2026-06-12) Gate de club (ej. Scorpion): una contraseña para TODO el club.
  // Soft-gate, fail-open si passwords.json no carga (igual que el gate por-cancha
  // de script.js). Comparte la llave de localStorage 'gate:club:<loc>' con
  // script.js → si ya la metiste aquí, las galerías no la vuelven a pedir.
  async function pzClubGate(clubId) {
    if (!clubId) return true;
    try {
      const r = await fetch('/data/passwords.json?cb=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return true;
      const cfg = await r.json();
      const rule = (cfg.clubs || []).find(function (x) { return x.loc === clubId && x.enabled; });
      if (!rule) return true;
      const k = 'gate:club:' + clubId;
      try { const o = JSON.parse(localStorage.getItem(k) || 'null'); if (o && o.ok && typeof o.exp === 'number' && Date.now() < o.exp) return true; } catch (e) {}
      const sha = async function (t) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t)); return [...new Uint8Array(b)].map(function (x) { return x.toString(16).padStart(2, '0'); }).join(''); };
      for (let i = 0; i < 3; i++) {
        const inp = window.prompt('Este club requiere contraseña para ver sus puntazos.');
        if (inp === null) return false;
        if (await sha(inp) === rule.sha256) {
          const rem = (Number(rule.remember_hours) > 0 ? Number(rule.remember_hours) : 24) * 3600000;
          localStorage.setItem(k, JSON.stringify({ ok: true, exp: Date.now() + rem }));
          return true;
        }
        alert('Contraseña incorrecta. Inténtalo de nuevo.');
      }
      return false;
    } catch (e) { return true; } // fail-open
  }

  // ---------- ENTRYPOINT ----------
  (async function () {
    // Si la URL trae un club protegido (loc=Scorpion en cualquier modo: ready,
    // canchas, qr), pídelo ANTES de cualquier flujo. El flujo manual (sin loc)
    // se gatea en el click del club.
    if (loc && !(await pzClubGate(loc))) { window.location.href = "/index.html"; return; }
    if (hasFullParams) {
      startReadyFlow();
    } else if (modoCanchas && loc) {
      // F135 (Fix 4): "cambiar cancha" → directo al paso de canchas del club.
      startSelectorFlow({ directLoc: loc });
    } else if (qrCode) {
      startSelectorFlow({ qrCode: qrCode });
    } else {
      startSelectorFlow({});
    }
  })();
})();
</script>

<!-- Intro animada — F72: speed 1.5x + sessionStorage flag para que no se
     repita al re-cargar entrada.html con loc/can ya seleccionados.
     Si el user llega DIRECTO (link/QR) con loc/can sin haber visto la
     intro en esta sesion, sí se reproduce. -->
<script src="/assets/puntazo-intro.js?v=F74clip"></script>
<script>
  (function () {
    try {
      if (sessionStorage.getItem("pz_intro_seen") === "1") return;
    } catch (_) {}
    if (!window.PuntazoIntro || typeof PuntazoIntro.overlay !== "function") return;
    PuntazoIntro.overlay({
      speed: 1.5,
      onDone: function () {
        try { sessionStorage.setItem("pz_intro_seen", "1"); } catch (_) {}
      },
    });
    // Si el browser no soporta sessionStorage (Safari incógnito viejo, etc.)
    // el flag no persiste — la intro se vería en cada nav. Aceptable fallback.
  })();
</script>
