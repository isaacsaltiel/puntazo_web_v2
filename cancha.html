<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<base href="/" />
<title>Puntazo · Lados</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />

<!-- F111-B: cancha.html legacy redirect → selector visual nuevo en
     entrada.html?modo=clips. Si vienen loc+can, intenta saltar
     directo al primer lado vía lado.html (flow más rápido). -->
<script>
(function () {
  try {
    var p = new URLSearchParams(window.location.search);
    var loc = p.get("loc"), can = p.get("can");
    if (loc && can) {
      window.location.replace(
        "/lado.html?loc=" + encodeURIComponent(loc) +
        "&can=" + encodeURIComponent(can) +
        "&lado=LadoA&pg=0"
      );
      return;
    }
    var qs = "?modo=clips";
    if (loc) qs += "&loc=" + encodeURIComponent(loc);
    window.location.replace("/entrada.html" + qs);
  } catch (e) {
    window.location.replace("/entrada.html?modo=clips");
  }
})();
</script>
<meta http-equiv="refresh" content="0; url=/entrada.html?modo=clips" />
</head>
<body style="background:#050914;color:#eaf2ff;font-family:system-ui;text-align:center;padding:60px 20px;">
  <p>Redirigiendo… si no carga, <a href="/entrada.html?modo=clips" style="color:#6fb2ff">toca aquí</a>.</p>
</body>
</html>
