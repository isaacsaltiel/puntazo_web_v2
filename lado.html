<!-- ── Performance patches ── -->
<script>
(function() {
  'use strict';
  window._puntazoDownloading = false;
  var container = document.getElementById('videos-container');
  if (!container) return;

  // Pausar previews cuando hay real playing
  container.addEventListener('play', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    document.querySelectorAll('video.video-preview').forEach(function(prev) {
      try { prev.pause(); if (prev.src && !prev.dataset.pausedSrc) { prev.dataset.pausedSrc = prev.src; prev.removeAttribute('src'); prev.load(); } } catch(err) {}
    });
    document.querySelectorAll('video.real').forEach(function(other) {
      if (other !== target) { try { other.pause(); } catch(err) {} }
    });
  }, true);

  container.addEventListener('pause', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    var anyPlaying = Array.from(document.querySelectorAll('video.real')).some(function(v) { return !v.paused; });
    if (anyPlaying) return;
    document.querySelectorAll('video.video-preview').forEach(function(prev) {
      if (prev.dataset.pausedSrc) { prev.src = prev.dataset.pausedSrc; delete prev.dataset.pausedSrc; }
    });
  }, true);

  container.addEventListener('ended', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    target.dispatchEvent(new Event('pause', { bubbles: false }));
  }, true);

  // Override preview play para respetar real activo
  var lastActivePreview = null;
  var origPlay = HTMLVideoElement.prototype.play;
  HTMLVideoElement.prototype.play = function() {
    if (this.classList.contains('video-preview')) {
      if (window._puntazoDownloading || Array.from(document.querySelectorAll('video.real')).some(function(v) { return !v.paused; })) {
        return Promise.resolve();
      }
      if (lastActivePreview && lastActivePreview !== this) { try { lastActivePreview.pause(); } catch(e) {} }
      lastActivePreview = this;
    }
    return origPlay.call(this);
  };
})();
</script>

<!-- ── Badge Top 3 del mes ── -->
<script>
(function(){
  function waitForDeps(fn, retries) {
    if (window.PuntazoReactions && window.PuntazoReactions.db) return fn();
    if ((retries || 0) <= 0) return;
    setTimeout(function() { waitForDeps(fn, (retries || 40) - 1); }, 200);
  }

  function getCurrentMonthKey() {
    var d = new Date(), y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0');
    return y + '-' + m;
  }

  function normalizeUrl(raw) {
    if (!raw) return '';
    try { var u = new URL(raw, window.location.origin); return (u.origin + u.pathname).replace(/\/+$/, '').toLowerCase(); } catch(e) { return String(raw).split('?')[0].replace(/\/+$/, '').toLowerCase(); }
  }

  waitForDeps(function() {
    var db = PuntazoReactions.db();
    var MIN = PuntazoReactions.MIN_FOR_BEST || 3;
    var monthKey = getCurrentMonthKey();
    var topEntries = [];
    var container = document.getElementById('videos-container');
    if (!container) return;

    function buildTop3() {
      db.collection('reactions').where('total', '>=', MIN).orderBy('total', 'desc').limit(50).get().then(function(snapshot) {
        var docs = [];
        snapshot.forEach(function(doc) {
          var d = doc.data() || {};
          if (d.fecha && String(d.fecha).startsWith(monthKey)) docs.push(d);
        });
        if (!docs.length) snapshot.forEach(function(doc) { docs.push(doc.data() || {}); });
        topEntries = docs.slice(0, 3).map(function(d, idx) {
          return { rank: idx + 1, videoId: String(d.videoId || '').trim(), videoUrl: normalizeUrl(d.videoUrl || '') };
        });
        annotateAll();
        new MutationObserver(function() { annotateAll(); }).observe(container, { childList: true, subtree: true });
        setTimeout(annotateAll, 800); setTimeout(annotateAll, 2000);
      }).catch(function() {});
    }

    function getRankForCard(card) {
      if (!topEntries.length) return null;
      var candidates = [];
      var vids = card.querySelectorAll('video[src],source[src]');
      vids.forEach(function(v) { var s = v.getAttribute('src'); if (s) candidates.push(normalizeUrl(s)); });
      var vid = card.getAttribute('id') || card.dataset.videoId;
      if (vid) candidates.push('id:' + String(vid).trim());

      for (var i = 0; i < topEntries.length; i++) {
        var t = topEntries[i];
        var idToken = t.videoId ? 'id:' + t.videoId : '';
        for (var j = 0; j < candidates.length; j++) {
          var c = candidates[j];
          if (idToken && c === idToken) return t;
          if (t.videoUrl && c && (c === t.videoUrl || c.indexOf(t.videoUrl) !== -1)) return t;
        }
      }
      return null;
    }

    function annotateAll() {
      Array.from(container.children).forEach(function(card) {
        if (card.querySelector('.pz-top-month-badge')) return;
        var info = getRankForCard(card);
        if (!info) return;
        var badge = document.createElement('div');
        var icons = ['🥇','🥈','🥉'];
        badge.className = 'pz-top-month-badge rank-' + info.rank;
        badge.innerHTML = '<span>' + icons[info.rank - 1] + '</span><small>Top ' +
