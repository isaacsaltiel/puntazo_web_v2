/* F122 (era F111-A): fondo POR CANCHA — B{n}.webp dinámico cargado vía
   JS desde clubs-catalog (mismo mapping que mi-partido). Diferencias vs
   mi-partido: NO se blurea (Isaac quiere ver la cancha nítida) y la
   opacidad es más alta (0.62 vs 0.78 con blur). La animación de
   respiración (scale 1↔1.04) se queda — se siente vivo sin distraer.
   Fallback: si no hay loc+can en URL, .lado-court-bg queda hidden y
   .page-bg (el linear-gradient base) cubre todo. */
.page-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(180deg, rgba(2,6,16,0.78) 0%, rgba(2,6,16,0.55) 40%, rgba(2,6,16,0.85) 100%);
}
.lado-court-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 0.6s ease;
  animation: ladoBgBreathe 18s ease-in-out infinite;
  /* Sin blur. Saturate ligero para que el color de la cancha resalte. */
  filter: saturate(1.08);
}
.lado-court-bg.is-active { opacity: 0.62; }
/* Overlay vertical encima del fondo de cancha — oscuro arriba/abajo,
   medio más translúcido — para que título y cards siempre tengan contraste. */
.lado-court-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(2,6,16,0.65) 0%,
    rgba(2,6,16,0.20) 30%,
    rgba(2,6,16,0.20) 65%,
    rgba(2,6,16,0.80) 100%);
}
@keyframes ladoBgBreathe {
  0%, 100% { transform: scale(1.00); }
  50%      { transform: scale(1.04); }
}

<!-- F122: fondo dinámico con el ícono de la cancha (B{n}.webp). Se activa
     vía JS cuando hay loc+can en el URL. Hereda el mapping de clubs-catalog
     (mismo que mi-partido) — incluyendo arte por club (pickleball usa su
     propio set de íconos). Fallback: si no hay loc+can o falla la imagen,
     queda inactivo (opacity 0) y se ve solo el linear-gradient base. -->
<div id="ladoCourtBg" class="lado-court-bg" aria-hidden="true"></div>
<script>
(function () {
  "use strict";
  try {
    var p = new URLSearchParams(window.location.search);
    var loc = (p.get("loc") || "").trim();
    var can = (p.get("can") || "").trim();
    var bg = document.getElementById("ladoCourtBg");
    if (!bg || (!loc && !can)) return;
    function apply() {
      if (window.PuntazoClubs && typeof PuntazoClubs.applyCourtIcon === "function") {
        PuntazoClubs.applyCourtIcon(bg, loc || null, can || null, "bg");
      } else {
        // Fallback inline si clubs-catalog aún no carga: usa el global.
        var m = String(can || "").match(/(\d+)/);
        var n = m ? parseInt(m[1], 10) : 1;
        if (!Number.isFinite(n) || n < 1) n = 1;
        var idx = (((n - 1) % 8) + 8) % 8 + 1;
        bg.style.backgroundImage = "url('/assets/court-icons/B" + idx + ".webp')";
      }
      bg.classList.add("is-active");
    }
    if (window.PuntazoClubs) apply();
    else window.addEventListener("DOMContentLoaded", apply, { once: true });
  } catch (e) { /* silencioso, el fondo base sigue siendo OK */ }
})();
</script>

<!-- ── Performance patches ── -->
<script>
(function() {
  'use strict';
  window._puntazoDownloading = false;
  var container = document.getElementById('videos-container');
  if (!container) return;

  // Pausar previews cuando hay real playing
  container.addEventListener('play', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    document.querySelectorAll('video.video-preview').forEach(function(prev) {
      try { prev.pause(); if (prev.src && !prev.dataset.pausedSrc) { prev.dataset.pausedSrc = prev.src; prev.removeAttribute('src'); prev.load(); } } catch(err) {}
    });
    document.querySelectorAll('video.real').forEach(function(other) {
      if (other !== target) { try { other.pause(); } catch(err) {} }
    });
  }, true);

  container.addEventListener('pause', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    var anyPlaying = Array.from(document.querySelectorAll('video.real')).some(function(v) { return !v.paused; });
    if (anyPlaying) return;
    document.querySelectorAll('video.video-preview').forEach(function(prev) {
      if (prev.dataset.pausedSrc) { prev.src = prev.dataset.pausedSrc; delete prev.dataset.pausedSrc; }
    });
  }, true);

  container.addEventListener('ended', function(e) {
    var target = e.target;
    if (!target || !target.classList.contains('real')) return;
    target.dispatchEvent(new Event('pause', { bubbles: false }));
  }, true);

  // Override preview play para respetar real activo
  var lastActivePreview = null;
  var origPlay = HTMLVideoElement.prototype.play;
  HTMLVideoElement.prototype.play = function() {
    if (this.classList.contains('video-preview')) {
      if (window._puntazoDownloading || Array.from(document.querySelectorAll('video.real')).some(function(v) { return !v.paused; })) {
        return Promise.resolve();
      }
      if (lastActivePreview && lastActivePreview !== this) { try { lastActivePreview.pause(); } catch(e) {} }
      lastActivePreview = this;
    }
    return origPlay.call(this);
  };
})();
</script>

<script>
(function () {
  "use strict";

  function getQueryParams() {
    var params = {};
    window.location.search.substring(1).split("&").forEach(function (pair) {
      var i = pair.indexOf("=");
      if (i < 0) { if (pair) params[decodeURIComponent(pair)] = ""; return; }
      var k = decodeURIComponent(pair.substring(0, i));
      var v = decodeURIComponent(pair.substring(i + 1) || "");
      if (k) params[k] = v;
    });
    return params;
  }

  function safe(fn) { try { return fn(); } catch (e) { console.warn("[pz-banner]", e); return null; } }

  function renderContinuar(matchId) {
    try {
      var host = document.getElementById("pz-match-banner");
      if (!host) return;
      host.innerHTML = "";
      var a = document.createElement("a");
      a.className = "pz-mb continuar";
      a.href = "/mi-partido.html?matchId=" + encodeURIComponent(matchId);
      a.innerHTML = '<span class="pz-mb-text">🎾 Tienes un partido en curso aquí</span><span class="pz-mb-cta">Continuar →</span>';
      host.appendChild(a);
    } catch (e) { console.warn("[pz-banner] renderContinuar", e); }
  }

  // (2026-07-13) El banner "Inicia un partido para guardar tus puntazos aquí"
  // se retiró: el flujo de iniciar partido está en pausa. Solo se conserva el
  // banner "Tienes un partido en curso aquí → Continuar" (renderContinuar),
  // que únicamente aparece cuando el usuario YA tiene un partido activo.

  function clearBanner() {
    try {
      var host = document.getElementById("pz-match-banner");
      if (host) host.innerHTML = "";
    } catch (e) {}
  }

  async function evaluate() {
    try {
      var params = getQueryParams();
      var loc = (params.loc || "").trim();
      var can = (params.can || "").trim();
      var lado = (params.lado || "").trim();
      if (!loc || !can || !lado) { clearBanner(); return; }

      var user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
      if (!user) { clearBanner(); return; }

      if (!window.PuntazoMatches || typeof window.PuntazoMatches.getActiveForUser !== "function") {
        clearBanner();
        return;
      }

      var active = null;
      try {
        active = await window.PuntazoMatches.getActiveForUser(user.uid);
      } catch (e) {
        console.warn("[pz-banner] getActiveForUser failed (no banner):", e);
        clearBanner();
        return;
      }

      if (active && active.loc === loc && active.can === can && active.lado === lado) {
        renderContinuar(active.id);
      } else {
        // (2026-07-13) Antes: renderIniciar(...). El banner de iniciar partido
        // está en pausa; no mostramos nada si no hay un partido activo aquí.
        clearBanner();
      }
    } catch (e) {
      console.warn("[pz-banner] evaluate failed (no banner):", e);
      clearBanner();
    }
  }

  function init() {
    try {
      // Espera a que auth esté listo antes de decidir qué renderizar
      var fired = false;
      function go() { if (fired) return; fired = true; evaluate(); }

      window.addEventListener("puntazo:auth-ready", function () { go(); });
      window.addEventListener("puntazo:auth-changed", function () {
        // Re-evalúa cuando cambia la sesión
        evaluate();
      });

      // Fallback: si auth-ready ya disparó antes de que cargáramos el listener,
      // o si tarda demasiado, intentamos evaluar tras un timeout.
      setTimeout(function () { go(); }, 3500);
    } catch (e) {
      console.warn("[pz-banner] init failed:", e);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<!-- ── Banner de filtro por matchId (Etapa 5) — IIFE defensiva ── -->
<style>
  #pz-match-filter-banner {

  .pz-mf {

  .pz-mf-cta:hover {

  }
  #pz-match-filter-empty {
    margin: 16px 0;
    padding: 22px 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px dashed rgba(255, 255, 255, 0.14);
    color: rgba(234, 242, 255, 0.70);
    text-align: center;
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.5;
  }
  @media (max-width: 480px) {
    #pz-match-filter-banner { margin-left: 12px; margin-right: 12px; }
    .pz-mf { font-size: 0.84rem; padding: 10px 12px; }
    .pz-mf-cta { font-size: 0.78rem; padding: 6px 11px; }
  }
</style>
<script>
(function () {
  "use strict";

  function getQueryParams() {
    var params = {};
    window.location.search.substring(1).split("&").forEach(function (pair) {
      var i = pair.indexOf("=");
      if (i < 0) { if (pair) params[decodeURIComponent(pair)] = ""; return; }
      var k = decodeURIComponent(pair.substring(0, i));
      var v = decodeURIComponent(pair.substring(i + 1) || "");
      if (k) params[k] = v;
    });
    return params;
  }

  var _validIds = null;
  var _matchInfo = null; // { id, status }
  var _observer = null;
  var _emptyEl = null;
  var _stabilizeTimer = null;
  var _started = false;

  function ensureEmptyMessage(container) {
    if (_emptyEl && _emptyEl.parentNode) return _emptyEl;
    try {
      var el = document.createElement("div");
      el.id = "pz-match-filter-empty";
      el.textContent = "Aún no hay clips de tu partido — el video tarda hasta 60s tras pulsar el botón.";
      el.style.display = "none";
      if (container && container.parentNode) {
        container.parentNode.insertBefore(el, container.nextSibling);
      } else {
        document.body.appendChild(el);
      }
      _emptyEl = el;
      return el;
    } catch (e) {
      console.warn("[pz-filter] ensureEmptyMessage", e);
      return null;
    }
  }

  function buildAllClipsUrl() {
    var p = getQueryParams();
    var qs = "?loc=" + encodeURIComponent(p.loc || "") +
             "&can=" + encodeURIComponent(p.can || "") +
             "&lado=" + encodeURIComponent(p.lado || "");
    return "/lado.html" + qs;
  }

  function renderBanner(visible, total) {
    try {
      var host = document.getElementById("pz-match-filter-banner");
      if (!host || !_matchInfo) return;
      host.innerHTML = "";
      var wrap = document.createElement("div");
      var isActive = _matchInfo.status === "active";
      wrap.className = "pz-mf " + (isActive ? "active" : "ended");
      var txt = document.createElement("span");
      txt.className = "pz-mf-text";
      txt.textContent = isActive
        ? "📺 Clips de tu partido en curso — actualizando…"
        : "📺 Clips de tu partido — " + visible + " de " + total + " de la cancha";
      wrap.appendChild(txt);
      var cta = document.createElement("a");
      cta.className = "pz-mf-cta";
      cta.href = buildAllClipsUrl();
      cta.textContent = "Ver todos";
      wrap.appendChild(cta);
      host.appendChild(wrap);
    } catch (e) { console.warn("[pz-filter] renderBanner", e); }
  }

  function applyFilter(container) {
    try {
      if (!_validIds || !container) return;
      var cards = container.querySelectorAll(".video-card");
      var visible = 0;
      var total = cards.length;
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        var vid = c.id;
        if (vid && _validIds.has(vid)) {
          c.style.display = "";
          visible++;
        } else {
          c.style.display = "none";
        }
      }
      renderBanner(visible, total);
      var empty = ensureEmptyMessage(container);
      if (empty) {
        empty.style.display = (total > 0 && visible === 0) ? "block" : "none";
      }
    } catch (e) { console.warn("[pz-filter] applyFilter", e); }
  }

  function scheduleApply(container) {
    if (_stabilizeTimer) clearTimeout(_stabilizeTimer);
    _stabilizeTimer = setTimeout(function () {
      _stabilizeTimer = null;
      applyFilter(container);
    }, 500);
  }

  function setupObserver(container) {
    try {
      if (_observer || !window.MutationObserver) return;
      _observer = new MutationObserver(function (muts) {
        var changed = false;
        for (var i = 0; i < muts.length; i++) {
          if (muts[i].type === "childList") { changed = true; break; }
        }
        if (changed) scheduleApply(container);
      });
      _observer.observe(container, { childList: true });
    } catch (e) { console.warn("[pz-filter] setupObserver", e); }
  }

  function waitForCards(container, maxMs) {
    return new Promise(function (resolve) {
      var start = Date.now();
      function check() {
        if (!container) { resolve(false); return; }
        var cards = container.querySelectorAll(".video-card");
        if (cards.length > 0) { resolve(true); return; }
        if (Date.now() - start >= maxMs) { resolve(false); return; }
        setTimeout(check, 200);
      }
      check();
    });
  }

  async function init() {
    if (_started) return;
    _started = true;
    try {
      var params = getQueryParams();
      var matchId = (params.matchId || "").trim();
      if (!matchId) return;

      if (!window.PuntazoMatches ||
          typeof window.PuntazoMatches.get !== "function" ||
          typeof window.PuntazoMatches.findClipsForMatch !== "function") {
        return;
      }

      var matchDoc = null;
      try {
        matchDoc = await window.PuntazoMatches.get(matchId);
      } catch (e) {
        console.warn("[pz-filter] get failed, no aplicar filtro:", e);
        return;
      }
      if (!matchDoc) return;

      var user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
      var isOwn = !!(user && matchDoc.userId === user.uid);
      // Permite read si es del user actual O si está ended (resúmenes públicos).
      if (!isOwn && matchDoc.status !== "ended") {
        try { var host = document.getElementById("pz-match-filter-banner"); if (host) host.innerHTML = ""; } catch (_) {}
        return;
      }

      _matchInfo = { id: matchId, status: matchDoc.status };

      var clips = [];
      try {
        clips = await window.PuntazoMatches.findClipsForMatch(matchDoc);
      } catch (e) {
        console.warn("[pz-filter] findClipsForMatch failed:", e);
        clips = [];
      }
      _validIds = new Set();
      for (var i = 0; i < clips.length; i++) {
        if (clips[i] && clips[i].videoId) _validIds.add(clips[i].videoId);
      }

      // Banner inicial (counts provisional 0/0; se reescriben tras aplicar filtro).
      renderBanner(0, 0);

      var container = document.getElementById("videos-container");
      if (!container) return;

      var had = await waitForCards(container, 8000);
      if (had) {
        scheduleApply(container);
      } else {
        var empty = ensureEmptyMessage(container);
        if (empty) empty.style.display = "block";
        renderBanner(0, 0);
      }
      setupObserver(container);
    } catch (e) {
      console.warn("[pz-filter] init failed:", e);
    }
  }

  function bootstrap() {
    try {
      var fired = false;
      function go() { if (fired) return; fired = true; init(); }
      window.addEventListener("puntazo:auth-ready", function () { go(); });
      // Fallback: si auth-ready ya pasó o tarda demasiado, arrancamos solos.
      // Matches ended son públicos por rules, así que init puede leerlos sin auth.
      setTimeout(go, 3500);
    } catch (e) {
      console.warn("[pz-filter] bootstrap failed:", e);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", bootstrap);
  } else {
    bootstrap();
  }
})();
</script>

<!-- F126: inicialización del refresh-bar de lado.html.
     Inserta la barra arriba de #videos-container con el panel
     desplegable de pulsos pendientes del user en esta cancha/lado. -->
<script>
(function () {
  "use strict";
  function paramsFromQuery() {
    var o = {};
    try {
      var p = new URLSearchParams(window.location.search);
      o.loc = (p.get("loc") || "").trim();
      o.can = (p.get("can") || "").trim();
      o.lado = (p.get("lado") || "").trim();
    } catch (_) {}
    return o;
  }

  function init() {
    if (!window.PuntazoRefreshBar) return;
    var host = document.getElementById("pz-rb-host");
    if (!host) return;
    var p = paramsFromQuery();
    if (!p.loc || !p.can || !p.lado) return; // sin contexto, no tiene sentido.

    // F129: heartbeat watcher para mostrar banner si las cámaras del
    // club están temporalmente fuera de línea.
    try {
      var hbHost = document.getElementById("pz-hb-host");
      if (hbHost && window.PuntazoHeartbeatWatcher) {
        window.PuntazoHeartbeatWatcher.watch(p.loc, hbHost);
      }
    } catch (_) {}

    window.__pzLadoBar = window.PuntazoRefreshBar.attach(host, {
      label: "Actualizado",
      auto: 0, // sin auto-refresh agresivo — solo manual.
      showPending: true,
      context: { loc: p.loc, can: p.can, lado: p.lado },
      refreshOnInit: false, // populateVideos ya corre en page boot; no
                            // queremos disparar otra vez al milisegundo.
      onRefresh: async function () {
        if (typeof window.PuntazoLadoReload === "function") {
          await window.PuntazoLadoReload();
        }
      },
    });

    // (2026-07-13) F145: la pill de estado del club ("Cámaras del club en
    // línea" / "fuera de línea") ahora se monta DENTRO de la barra
    // "Actualizado hace X", en el mismo renglón que el botón Actualizar /
    // pendientes (como una chip más), para no ocupar su propio espacio.
    try {
      var rbEl = host.querySelector(".pz-rb");
      if (rbEl && window.PuntazoHeartbeatWatcher && window.PuntazoHeartbeatWatcher.statusPill) {
        window.PuntazoHeartbeatWatcher.statusPill(p.loc, rbEl);
        var pillEl = rbEl.querySelector(".pz-hb-pill");
        var rbRefreshBtn = rbEl.querySelector("[data-refresh]");
        // La ponemos justo antes del botón Actualizar (queda pegada a la
        // derecha del texto "Actualizado hace X").
        if (pillEl && rbRefreshBtn) rbEl.insertBefore(pillEl, rbRefreshBtn);
      }
    } catch (_) {}
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
