<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<base href="/" />
<title>Mi perfil · Puntazo</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-icon-180x180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/estilo.css" />
<link rel="stylesheet" href="/assets/card.css" />
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/assets/firebase-core.js"></script>
<script src="/assets/card.js"></script>
<style>
  .perfil-wrap { max-width:860px; margin:0 auto; padding:24px 16px 60px; }

  .perfil-header {
    display:flex; align-items:center; gap:18px; margin-bottom:28px;
    padding:20px; border-radius:18px;
    background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.10);
  }
  .perfil-avatar {
    width:76px; height:76px; border-radius:50%;
    background:rgba(0,79,200,.35); border:2px solid rgba(255,255,255,.14);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:1.7rem; font-weight:900; color:#fff; overflow:hidden;
  }
  .perfil-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .perfil-info { flex:1; min-width:0; }
  .perfil-name { font-size:1.35rem; font-weight:900; color:#fff; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .login-required { text-align:center; padding:60px 20px; }
  .login-required .icon { font-size:52px; margin-bottom:16px; }
  .login-required h2 { font-size:1.25rem; font-weight:900; color:#eaf2ff; margin-bottom:10px; }
  .login-required p { color:rgba(234,242,255,.60); margin-bottom:24px; }
  .login-required button {
    display:inline-flex; align-items:center; gap:8px;
    padding:.85rem 1.6rem; border-radius:999px;
    border:1px solid rgba(11,124,255,.40); background:rgba(0,79,200,.18);
    color:#eaf2ff; font-family:inherit; font-size:.95rem; font-weight:800; cursor:pointer; transition:all .18s;
  }
  .login-required button:hover { background:rgba(0,79,200,.28); border-color:rgba(11,124,255,.55); }

  @media(max-width:480px) {
    .perfil-header { flex-direction:column; text-align:center; align-items:center; }
  }
</style>
</head>
<body>
<div class="page-bg"></div>
<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="site-content fade-in">
  <div class="perfil-wrap">

    <div id="perfilLoading" class="empty-state">
      <div class="empty-icon">⏳</div>
      <h3>Cargando tu perfil…</h3>
    </div>

    <div id="loginRequired" class="login-required" style="display:none">
      <div class="icon">🔐</div>
      <h2>Inicia sesión para ver tu perfil</h2>
      <p>Guarda tus puntazos favoritos y lleva un registro de tus apariciones.</p>
      <button id="loginBtn">Iniciar sesión</button>
    </div>

    <div id="perfilContent" style="display:none">

      <div class="perfil-header">
        <div id="perfilAvatar" class="perfil-avatar"></div>
        <div class="perfil-info">
          <div id="perfilName" class="perfil-name">Mi perfil</div>
        </div>
      </div>

      <div id="savedGrid" class="cards-grid"></div>
      <div id="savedEmpty" class="empty-state" style="display:none">
        <div class="empty-icon">📂</div>
        <h3>Sin videos guardados</h3>
        <p>Toca 💾 en cualquier video para guardarlo aquí.</p>
      </div>
      <div id="savedLoading" class="empty-state">
        <div class="empty-icon">⏳</div>
        <h3>Cargando tus guardados…</h3>
      </div>

    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-redes">
    <a href="https://tiktok.com/@puntazoclips" target="_blank" rel="noopener">TikTok</a>
    <a href="https://instagram.com/puntazoclips" target="_blank" rel="noopener">Instagram</a>
    <a href="https://wa.me/522206804856" target="_blank" rel="noopener">WhatsApp</a>
  </div>
  <p class="footer-copy">© 2026 Puntazo</p>
</footer>

<script>
(function () {
  'use strict';

  let _user = null;
  let _videoIndex = {};

  const $loading       = document.getElementById('perfilLoading');
  const $loginReq      = document.getElementById('loginRequired');
  const $content       = document.getElementById('perfilContent');
  const $loginBtn      = document.getElementById('loginBtn');
  const $perfilAvatar  = document.getElementById('perfilAvatar');
  const $perfilName    = document.getElementById('perfilName');
  const $savedGrid     = document.getElementById('savedGrid');
  const $savedEmpty    = document.getElementById('savedEmpty');
  const $savedLoading  = document.getElementById('savedLoading');

  fetch('/data/videos_index.json?cb='+Date.now(), { cache:'no-store' })
    .then(r=>r.ok?r.json():null).then(idx=>{ if(idx) _videoIndex=idx.videos||{}; }).catch(()=>{});

  $loginBtn.addEventListener('click', function() {
    if (window.PuntazoAuth && typeof window.PuntazoAuth.signIn==='function') window.PuntazoAuth.signIn();
  });

  function showLoginRequired() { $loading.style.display='none'; $loginReq.style.display='block'; }

  function escapeHTML(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderProfile(user) {
    _user = user;
    $loading.style.display = 'none'; $loginReq.style.display='none'; $content.style.display='block';
    if (user.photoURL) {
      $perfilAvatar.innerHTML = `<img src="${escapeHTML(user.photoURL)}" alt="${escapeHTML(user.displayName||'')}" />`;
    } else {
      $perfilAvatar.textContent = (user.displayName||user.email||'P').charAt(0).toUpperCase();
    }
    $perfilName.textContent = user.displayName || user.email || 'Mi perfil';
    loadSaved(user);
  }

  function buildSavedCard(entry, onUnsave) {
    if (!window.PuntazoCard) return null;
    return window.PuntazoCard.build(entry, {
      showSave:true, showShare:true, showFullscreen:true,
      showClubInfo:true,
      topLabel: entry.club || '',
      onUnsave: onUnsave || null,
    });
  }

  function getEntryUrl(videoId) {
    const hit = _videoIndex[videoId];
    if (hit && hit.url) return hit;
    return null;
  }

  async function loadSaved(user) {
    const db = window.PuntazoCard?.getDb();
    if (!db) { $savedLoading.style.display='none'; $savedEmpty.style.display='block'; return; }
    $savedLoading.style.display='block'; $savedEmpty.style.display='none';
    try {
      const snap = await db.collection('usuarios').doc(user.uid).collection('guardados')
        .orderBy('savedAt','desc').limit(50).get();
      $savedLoading.style.display='none';
      if (snap.empty) { $savedEmpty.style.display='block'; return; }

      for (const doc of snap.docs) {
        const d = doc.data();
        if (!d.videoId) continue;

        let url    = d.videoUrl || '';
        let club   = d.club     || '';
        let cancha = d.cancha   || '';
        let lado   = d.lado     || '';
        let fecha  = d.fecha    || '';

        if (!url) {
          const hit = getEntryUrl(d.videoId);
          if (!hit || !hit.url) continue;
          url=hit.url; club=hit.club||''; cancha=hit.cancha||''; lado=hit.lado||''; fecha=hit.fecha||'';
        }

        const entry = { nombre:d.videoId, url, club, cancha, lado, fecha };
        const card  = buildSavedCard(entry, function() {
          card.style.opacity='0.4';
          setTimeout(()=>{ card.remove(); }, 300);
          if(window.PuntazoCard) window.PuntazoCard.toast('Quitado de guardados');
        });
        if (!card) continue;
        $savedGrid.appendChild(card);
      }

      if (!$savedGrid.children.length) $savedEmpty.style.display='block';
    } catch(e) {
      console.error('[perfil saved]', e);
      $savedLoading.style.display='none'; $savedEmpty.style.display='block';
    }
  }

  // ── Esperar auth ──
  function initAuth() {
    const user = window.PuntazoAuth && window.PuntazoAuth.currentUser;
    if (user) { renderProfile(user); return; }
    window.addEventListener('puntazo:auth-changed', function handler(e) {
      const u = e.detail && e.detail.user;
      window.removeEventListener('puntazo:auth-changed', handler);
      if (u) renderProfile(u); else showLoginRequired();
    });
    setTimeout(function() {
      if ($loading.style.display !== 'none') {
        const u2 = window.PuntazoAuth && window.PuntazoAuth.currentUser;
        if (u2) renderProfile(u2); else showLoginRequired();
      }
    }, 4500);
  }

  if (window.__PZ_HEADER_LOADED__) {
    setTimeout(initAuth, 100);
  } else {
    window.addEventListener('puntazo:header-rendered', function() { setTimeout(initAuth, 150); });
    setTimeout(initAuth, 1500);
  }
})();
</script>

</body>
</html>
