<style>
  body {
    margin: 0;
    background: #050914;
    color: #eaf2ff;
    font-family: 'Montserrat', system-ui, sans-serif;
    min-height: 100vh;
  }
  *, *::before, *::after { box-sizing: border-box; }

  .rec-wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 16px 60px;
  }

  /* Header del card */
  .rec-hero {
    text-align: center;
    margin: 18px 0 22px;
  }
  .rec-hero h1 {
    font-size: 1.55rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.4px;
    margin: 0 0 8px;
    line-height: 1.2;
  }
  .rec-hero p {
    font-size: 0.95rem;
    color: rgba(234, 242, 255, 0.65);
    margin: 0;
    line-height: 1.5;
  }

  /* Selector reusa patron de entrada.html */
  .selector-wrap { display: block; }
  .selector-header { text-align: center; margin-bottom: 18px; }
  .selector-title {
    font-size: 1.30rem; font-weight: 900; color: #fff;
    letter-spacing: -0.3px; line-height: 1.2;
  }
  .selector-sub {
    font-size: 0.90rem;
    color: rgba(234, 242, 255, 0.62);
    margin-top: 6px;
  }
  .selector-back {
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 14px; padding: 6px 12px 6px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.10);
    color: rgba(234,242,255,.78);
    font-size: 0.84rem; font-weight: 700;
    cursor: pointer; text-decoration: none;
    transition: all .18s ease;
  }
  .selector-back:hover { background: rgba(255,255,255,.10); color: #fff; }

  .selector-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 360px) { .selector-grid { grid-template-columns: 1fr; } }
  .selector-grid.one-col { grid-template-columns: 1fr; }

  .sel-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all .18s ease;
    color: #fff;
    font-family: inherit;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 110px;
  }
  .sel-card:hover {
    border-color: rgba(11,124,255,.55);
    background: rgba(0,79,200,.10);
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(0,79,200,.18);
  }
  .sel-card:active { transform: scale(.98); }
  .sel-card .emoji { font-size: 2rem; line-height: 1; margin-bottom: 8px; }
  .sel-card .logo {
    width: auto; height: 48px; max-width: 90%;
    object-fit: contain; margin: 0 auto 8px; display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.35));
  }
  .sel-card--cancha { padding: 12px 10px 14px; }
  .sel-card .court-icon {
    width: 96px; height: 96px; max-width: 100%;
    object-fit: contain; margin: 0 auto 6px; display: block;
    border-radius: 18px;
  }
  .sel-card .name { font-size: 1rem; font-weight: 800; color: #fff; line-height: 1.2; }
  .sel-card .meta { font-size: 0.75rem; color: rgba(234,242,255,.55); margin-top: 4px; font-weight: 600; }
  .sel-card.is-disabled { cursor: not-allowed; opacity: .55; }
  .sel-card.is-disabled:hover {
    border-color: rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
    transform: none; box-shadow: none;
  }
  .sel-card .badge-soon {
    margin-top: 6px; display: inline-block;
    padding: 2px 8px; border-radius: 999px;
    font-size: 0.66rem; font-weight: 800;
    background: rgba(255,255,255,.10); color: rgba(234,242,255,.70);
  }

  /* Form de recuperación */
  .rec-form {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 18px;
    padding: 20px 18px;
    margin-top: 14px;
  }
  .rec-form-context {
    font-size: 0.86rem;
    color: rgba(234,242,255,.72);
    margin-bottom: 16px;
    text-align: center;
  }
  .rec-form-context strong { color: #fff; font-weight: 800; }

  .rec-field { margin-bottom: 16px; }
  .rec-field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 800;
    color: rgba(234,242,255,.75);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .rec-field input[type="datetime-local"] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.25);
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
    color-scheme: dark;
  }
  .rec-field input[type="datetime-local"]:focus {
    border-color: rgba(11,124,255,.65);
    box-shadow: 0 0 0 3px rgba(11,124,255,.18);
  }
  .rec-field .hint {
    margin-top: 6px;
    font-size: 0.78rem;
    color: rgba(234,242,255,.50);
    line-height: 1.4;
  }

  .rec-banner {
    margin-top: 8px;
    margin-bottom: 14px;
    padding: 11px 13px;
    border-radius: 12px;
    font-size: 0.86rem;
    line-height: 1.5;
  }
  .rec-banner.info {
    background: rgba(11,124,255,.10);
    border: 1px solid rgba(11,124,255,.28);
    color: #cfe2ff;
  }
  .rec-banner.warn {
    background: rgba(255,180,60,.10);
    border: 1px solid rgba(255,180,60,.28);
    color: #ffe6b8;
  }
  .rec-banner a {
    color: inherit;
    text-decoration: underline;
    font-weight: 700;
  }

  .rec-submit {
    width: 100%;
    min-height: 54px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 1.02rem;
    color: #fff;
    background: linear-gradient(135deg, #0B7CFF, #004FC8);
    border: 1px solid rgba(11,124,255,.55);
    box-shadow: 0 0 22px rgba(0,79,200,.30), 0 8px 22px rgba(0,0,0,.30);
    transition: all .18s ease;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .rec-submit:hover:not([disabled]) {
    transform: translateY(-1px);
    box-shadow: 0 0 30px rgba(11,124,255,.42), 0 10px 26px rgba(0,0,0,.34);
  }
  .rec-submit:active:not([disabled]) { transform: scale(.985); }
  .rec-submit[disabled] { opacity: .55; cursor: not-allowed; transform: none; filter: grayscale(.3); }

  .rec-feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 0.92rem;
    line-height: 1.5;
    text-align: center;
  }
  .rec-feedback.is-visible { display: block; }
  .rec-feedback.ok  { background: rgba(34,197,94,.10);  border: 1px solid rgba(34,197,94,.30);  color: #c8f7dc; }
  .rec-feedback.bad { background: rgba(255,80,80,.10);  border: 1px solid rgba(255,80,80,.25);  color: #ffd5d5; }

  /* Boton "pedir otro" tras success */
  .rec-after {
    margin-top: 14px;
    text-align: center;
  }
  .rec-after button {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    color: #eaf2ff;
    border-radius: 999px;
    padding: 9px 16px;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.86rem;
    cursor: pointer;
  }
  .rec-after button:hover {
    background: rgba(11,124,255,.16);
    border-color: rgba(11,124,255,.45);
  }
</style>
</head>

<body>

<div id="nav-root" data-nav-variant="internal"></div>
<script src="/assets/header.js"></script>

<main class="rec-wrap">

  <div class="rec-hero">
    <h1>Recupera tu puntazo</h1>
    <p>¿Se te escapó? Dinos cuándo y en qué cancha, lo buscamos en la grabación.</p>
  </div>

  <!-- Selector de club / cancha (reusa patron entrada.html) -->
  <div id="recSelector" class="selector-wrap">
    <button id="recSelBack" type="button" class="selector-back" style="display:none">← Atrás</button>
    <div class="selector-header">
      <div id="recSelTitle" class="selector-title">Elige tu club</div>
      <div id="recSelSub" class="selector-sub">Toca el club donde jugaste</div>
    </div>
    <div id="recSelGrid" class="selector-grid"></div>
  </div>

  <!-- Form (solo visible cuando club+cancha elegidos) -->
  <div id="recForm" class="rec-form" style="display:none">
    <button id="recFormBack" type="button" class="selector-back">← Cambiar cancha</button>
    <div id="recFormContext" class="rec-form-context"></div>

    <div id="recAuthBanner" class="rec-banner info" style="display:none"></div>

    <div class="rec-field">
      <label for="recDateTime">¿Cuándo fue el puntazo?</label>
      <input id="recDateTime" type="datetime-local" />
      <div class="hint">Pon la hora aproximada. Buscaremos 90 segundos antes y 90 después.</div>
    </div>

    <button id="recSubmit" class="rec-submit" type="button">Pedir recuperación</button>

    <div id="recFeedback" class="rec-feedback"></div>

    <div id="recAfter" class="rec-after" style="display:none">
      <button id="recAnother" type="button">Pedir otro</button>
    </div>
  </div>

</main>

<script>
(function () {
  "use strict";

  const $selector = document.getElementById("recSelector");
  const $selTitle = document.getElementById("recSelTitle");
  const $selSub   = document.getElementById("recSelSub");
  const $selGrid  = document.getElementById("recSelGrid");
  const $selBack  = document.getElementById("recSelBack");

  const $form      = document.getElementById("recForm");
  const $formBack  = document.getElementById("recFormBack");
  const $formCtx   = document.getElementById("recFormContext");
  const $authBanner= document.getElementById("recAuthBanner");
  const $datetime  = document.getElementById("recDateTime");
  const $submit    = document.getElementById("recSubmit");
  const $feedback  = document.getElementById("recFeedback");
  const $after     = document.getElementById("recAfter");
  const $another   = document.getElementById("recAnother");

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ── Estado ─────────────────────────────────────────────────────
  const state = {
    step: "clubs",            // 'clubs' | 'canchas' | 'form'
    catalog: null,
    selectedClub: null,
    selectedCancha: null,
  };

  // ── Throttle anónimo: 1 recuperación / 24h ────────────────────
  const ANON_THROTTLE_KEY = "pz_recovery_last_anon_ts";
  const ANON_THROTTLE_MS  = 24 * 60 * 60 * 1000;

  function isAnonUser(user) {
    return !!(user && user.isAnonymous);
  }

  function canSendAnon() {
    try {
      const last = Number(localStorage.getItem(ANON_THROTTLE_KEY) || 0);
      if (!last) return { allowed: true };
      const elapsed = Date.now() - last;
      if (elapsed >= ANON_THROTTLE_MS) return { allowed: true };
      const remainingMs = ANON_THROTTLE_MS - elapsed;
      const hours = Math.ceil(remainingMs / (60 * 60 * 1000));
      return { allowed: false, hoursLeft: hours };
    } catch (_) {
      return { allowed: true };
    }
  }

  function markAnonSent() {
    try { localStorage.setItem(ANON_THROTTLE_KEY, String(Date.now())); } catch (_) {}
  }

  // ── Auth: garantizar al menos sesión anónima ──────────────────
  async function ensureAuthReady() {
    if (!window.firebase || !firebase.auth) return null;
    const auth = firebase.auth();
    if (auth.currentUser) return auth.currentUser;
    return new Promise((resolve) => {
      const unsub = auth.onAuthStateChanged((u) => {
        unsub();
        if (u) { resolve(u); return; }
        auth.signInAnonymously()
          .then(cred => resolve(cred.user))
          .catch(err => {
            console.error("[recuperar] signInAnonymously falló", err);
            resolve(null);
          });
      });
    });
  }

  // ── Catálogo de clubs (mismo que entrada.html) ────────────────
  async function loadCatalogSafe() {
    if (state.catalog) return state.catalog;
    if (!window.PuntazoClubs || typeof window.PuntazoClubs.getCatalog !== "function") {
      console.error("[recuperar] PuntazoClubs no disponible");
      state.catalog = { clubs: [] };
      return state.catalog;
    }
    try {
      state.catalog = await window.PuntazoClubs.getCatalog();
    } catch (e) {
      console.error("[recuperar] error cargando catálogo", e);
      state.catalog = { clubs: [] };
    }
    return state.catalog;
  }

  // ── Render selector (club → cancha) ───────────────────────────
  function renderSelector() {
    $selector.style.display = "block";
    $form.style.display = "none";
    $selGrid.innerHTML = "";
    $selGrid.classList.remove("one-col");

    if (state.step === "clubs") {
      $selBack.style.display = "none";
      $selTitle.textContent = "Elige tu club";
      $selSub.textContent = "Toca el club donde jugaste";

      const clubs = (state.catalog && state.catalog.clubs) || [];
      if (!clubs.length) {
        $selGrid.classList.add("one-col");
        $selGrid.innerHTML = '<div style="color:#fff;text-align:center;padding:20px">No hay clubs configurados.</div>';
        return;
      }

      clubs.forEach(club => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sel-card";
        if (club.status === "soon") card.classList.add("is-disabled");
        const visual = club.logoUrl
          ? '<img class="logo" src="' + escapeHtml(club.logoUrl) + '" alt="' + escapeHtml(club.nombre) + '" onerror="this.outerHTML=\'<div class=&quot;emoji&quot;>' + escapeHtml(club.emoji || "🎾") + '</div>\'">'
          : '<div class="emoji">' + escapeHtml(club.emoji || "🎾") + '</div>';
        const inner = [visual, '<div class="name">' + escapeHtml(club.nombre) + '</div>'];
        if (club.status === "soon") {
          inner.push('<div class="badge-soon">Próximamente</div>');
        } else {
          const numCan = (club.canchas || []).length;
          inner.push('<div class="meta">' + numCan + ' cancha' + (numCan === 1 ? '' : 's') + '</div>');
        }
        card.innerHTML = inner.join("");
        if (club.status !== "soon") {
          card.addEventListener("click", function () {
            state.selectedClub = club;
            state.step = "canchas";
            renderSelector();
          });
        }
        $selGrid.appendChild(card);
      });
      return;
    }

    if (state.step === "canchas") {
      const club = state.selectedClub;
      $selBack.style.display = "inline-flex";
      $selTitle.textContent = club.nombre;
      $selSub.textContent = "Elige tu cancha";

      const canchas = club.canchas || [];
      if (!canchas.length) {
        $selGrid.classList.add("one-col");
        $selGrid.innerHTML = '<div style="color:#fff;text-align:center;padding:20px">Este club todavía no tiene canchas configuradas.</div>';
        return;
      }

      canchas.forEach((cancha, idx) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sel-card sel-card--cancha";
        const iconNum = (idx % 8) + 1;
        const iconSrc = "/assets/court-icons/B" + iconNum + ".webp";
        card.innerHTML =
          '<img class="court-icon" src="' + iconSrc + '" alt="' + escapeHtml(cancha.nombre) + '" onerror="this.outerHTML=\'<div class=&quot;emoji&quot;>🎾</div>\'">' +
          '<div class="name">' + escapeHtml(cancha.nombre) + '</div>';
        card.addEventListener("click", function () {
          state.selectedCancha = cancha;
          enterFormStep();
        });
        $selGrid.appendChild(card);
      });
      return;
    }
  }

  $selBack.addEventListener("click", function () {
    if (state.step === "canchas") {
      state.selectedClub = null;
      state.step = "clubs";
      renderSelector();
    }
  });

  $formBack.addEventListener("click", function () {
    state.step = "canchas";
    clearFeedback();
    $after.style.display = "none";
    renderSelector();
  });

  // ── Entrar al form (paso 3) ────────────────────────────────────
  function enterFormStep() {
    state.step = "form";
    $selector.style.display = "none";
    $form.style.display = "block";

    const club = state.selectedClub;
    const cancha = state.selectedCancha;
    $formCtx.innerHTML = "Recuperar puntazo en <strong>" + escapeHtml(club.nombre) +
      "</strong> · <strong>" + escapeHtml(cancha.nombre) + "</strong>";

    // F129: si las cámaras del club están temporalmente fuera de línea,
    // mostrar banner pasivo arriba del form. El user igual puede pedir
    // la recuperación — el doc se queda en cola y la NUC lo procesa
    // cuando vuelva. El banner solo le pre-aclara la espera.
    try {
      var hbHost = document.getElementById("pz-hb-host");
      if (!hbHost) {
        hbHost = document.createElement("div");
        hbHost.id = "pz-hb-host";
        $form.insertBefore(hbHost, $form.firstChild);
      }
      if (window.PuntazoHeartbeatWatcher) {
        window.PuntazoHeartbeatWatcher.watch(club.id, hbHost);
      }
    } catch (_) {}

    // Default datetime: ahora menos 5 min, con paso 1 min
    const d = new Date();
    d.setMinutes(d.getMinutes() - 5);
    $datetime.value = toLocalDateTimeInputValue(d);

    // Max: ahora (no se puede pedir un puntazo futuro)
    // Min: 30 días atrás
    const maxD = new Date();
    const minD = new Date(); minD.setDate(minD.getDate() - 30);
    $datetime.max = toLocalDateTimeInputValue(maxD);
    $datetime.min = toLocalDateTimeInputValue(minD);

    refreshAuthBanner();
  }

  function toLocalDateTimeInputValue(d) {
    const pad = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate())
      + "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  // ── Banner según estado de auth ───────────────────────────────
  function refreshAuthBanner() {
    const user = (window.firebase && firebase.auth) ? firebase.auth().currentUser : null;
    if (!user) {
      $authBanner.style.display = "none";
      return;
    }
    if (isAnonUser(user)) {
      const status = canSendAnon();
      if (status.allowed) {
        $authBanner.className = "rec-banner info";
        $authBanner.style.display = "block";
        $authBanner.innerHTML = "Como invitado puedes pedir <strong>1 recuperación cada 24h</strong>. <a href=\"#\" id=\"recSignInLink\">Inicia sesión</a> para pedir más.";
      } else {
        $authBanner.className = "rec-banner warn";
        $authBanner.style.display = "block";
        $authBanner.innerHTML = "Ya pediste una recuperación como invitado. Vuelve en <strong>~" + status.hoursLeft + "h</strong> o <a href=\"#\" id=\"recSignInLink\">inicia sesión</a> para pedir más.";
        $submit.disabled = true;
      }
      const link = document.getElementById("recSignInLink");
      if (link) link.addEventListener("click", function (e) {
        e.preventDefault();
        if (window.PuntazoAuth && typeof PuntazoAuth.signIn === "function") {
          PuntazoAuth.signIn();
        }
      });
    } else {
      $authBanner.style.display = "none";
      $submit.disabled = false;
    }
  }

  // ── Submit ─────────────────────────────────────────────────────
  function setFeedback(msg, cls) {
    $feedback.className = "rec-feedback is-visible " + (cls || "");
    $feedback.textContent = msg || "";
  }
  function clearFeedback() {
    $feedback.className = "rec-feedback";
    $feedback.textContent = "";
  }

  $submit.addEventListener("click", async function () {
    clearFeedback();
    $after.style.display = "none";

    const club = state.selectedClub;
    const cancha = state.selectedCancha;
    if (!club || !cancha) {
      setFeedback("Falta seleccionar club o cancha.", "bad");
      return;
    }

    const dtVal = $datetime.value;
    if (!dtVal) {
      setFeedback("Selecciona la fecha y hora del puntazo.", "bad");
      return;
    }
    const eventAt = new Date(dtVal);
    if (isNaN(eventAt.getTime())) {
      setFeedback("Fecha/hora inválida.", "bad");
      return;
    }
    const now = new Date();
    if (eventAt.getTime() > now.getTime() + 60 * 1000) {
      setFeedback("La hora no puede ser en el futuro.", "bad");
      return;
    }
    const thirtyDays = 30 * 24 * 60 * 60 * 1000;
    if (now.getTime() - eventAt.getTime() > thirtyDays) {
      setFeedback("Solo se pueden recuperar puntazos de los últimos 30 días.", "bad");
      return;
    }

    // Re-check auth + throttle justo antes de enviar
    const user = (window.firebase && firebase.auth) ? firebase.auth().currentUser : null;
    if (!user) {
      setFeedback("No se pudo iniciar sesión. Recarga e intenta de nuevo.", "bad");
      return;
    }
    if (isAnonUser(user)) {
      const status = canSendAnon();
      if (!status.allowed) {
        setFeedback("Como invitado ya pediste una recuperación. Vuelve en ~" + status.hoursLeft + "h o inicia sesión.", "bad");
        return;
      }
    }

    $submit.disabled = true;
    setFeedback("Enviando…", "");
    $feedback.className = "rec-feedback is-visible";
    $feedback.style.color = "rgba(234,242,255,.78)";

    try {
      const result = await window.PuntazoPulses.requestPulse({
        loc: club.id,
        can: cancha.id,
        // lado: undefined → pulses.js manda null para recovery; la NUC decide
        source: "recovery",
        event_at: eventAt,
      });

      if (isAnonUser(user)) markAnonSent();

      $feedback.style.color = "";
      setFeedback("✅ Listo. Tu clip estará disponible en ~7 minutos.", "ok");
      $after.style.display = "block";
      // No reseteamos el form para que vea qué pidió.
    } catch (err) {
      console.error("[recuperar] requestPulse falló", err);
      $feedback.style.color = "";
      const msg = (err && err.message) ? err.message : "Error desconocido";
      setFeedback("No se pudo enviar: " + msg + ". Intenta de nuevo.", "bad");
      $submit.disabled = false;
    }
  });

  $another.addEventListener("click", function () {
    $after.style.display = "none";
    clearFeedback();
    state.step = "canchas";
    renderSelector();
  });

  // ── Init ───────────────────────────────────────────────────────
  (async function init() {
    await Promise.all([
      loadCatalogSafe(),
      ensureAuthReady(),
    ]);
    renderSelector();
    refreshAuthBanner();

    // Re-evaluar banner cuando cambia auth (login/logout)
    if (window.firebase && firebase.auth) {
      firebase.auth().onAuthStateChanged(function () {
        if (state.step === "form") refreshAuthBanner();
      });
    }
  })();
})();
</script>

</body>
</html>
